<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>山手線ゲーム</title>

  <style>
    :root {
      --bg: #f4f5f7;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #2563eb;
      --danger: #dc2626;
      --money: #047857;
      --shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    input,
    select {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 10px;
      background: #fff;
      color: var(--text);
      width: 100%;
    }

    .app {
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .game-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .small-text {
      font-size: 12px;
      color: var(--muted);
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr 290px;
      gap: 12px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 12px;
    }

    .panel-title {
      font-weight: 800;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .form-row {
      margin-bottom: 10px;
    }

    .form-row label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 700;
    }

    .player-form-grid {
      display: grid;
      gap: 8px;
    }

    .player-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      background: #fafafa;
    }

    .player-card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 800;
    }

    .color-chip {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px var(--border);
      display: inline-block;
      vertical-align: middle;
    }

    .board-wrap {
      overflow: auto;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(10, minmax(72px, 1fr));
      gap: 6px;
      min-width: 760px;
    }

    .square {
      min-height: 72px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 6px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }

    .square-no {
      font-size: 10px;
      color: var(--muted);
    }

    .square-name {
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
      word-break: keep-all;
    }

    .square-type {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }

    .land-price {
      font-size: 10px;
      color: var(--money);
      font-weight: 700;
    }

    .square.land {
      border-left: 5px solid #9ca3af;
    }

    .square.settlement {
      background: #fff7ed;
      border-color: #fb923c;
    }

    .square.stock_exchange {
      background: #eff6ff;
      border-color: #60a5fa;
    }

    .square.bank {
      background: #ecfdf5;
      border-color: #34d399;
    }

    .square.card {
      background: #f5f3ff;
      border-color: #a78bfa;
    }

    .square.event {
      background: #fef2f2;
      border-color: #f87171;
    }

    .square.airport {
      background: #f0f9ff;
      border-color: #38bdf8;
    }

    .square.hotel {
      background: #fdf2f8;
      border-color: #f472b6;
    }

    .square.tax {
      background: #fefce8;
      border-color: #facc15;
    }

    .square.jail {
      background: #f3f4f6;
      border-color: #6b7280;
    }

    .square.spy {
      background: #faf5ff;
      border-color: #c084fc;
    }

    .square.contribution {
      background: #ecfeff;
      border-color: #22d3ee;
    }

    .area-list {
      display: grid;
      gap: 8px;
    }

    .area-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      background: #fafafa;
    }

    .area-title {
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .area-meta {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .notice {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e3a8a;
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .data-preview {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      background: #111827;
      color: #e5e7eb;
      padding: 10px;
      border-radius: 10px;
      overflow: auto;
      max-height: 280px;
      white-space: pre;
    }

    @media (max-width: 920px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .board {
        grid-template-columns: repeat(5, minmax(72px, 1fr));
        min-width: 380px;
      }
    }
  </style>
</head>

    const EVENT_DEFS = [
      { id: "boom", name: "景気上昇", weight: 10, description: "全エリアの株価+2万円。" },
      { id: "recession", name: "不景気", weight: 10, description: "全エリアの株価-2万円。株価下限未満にはならない。" },
      { id: "event_income", name: "臨時収入", weight: 15, description: "現在プレイヤーが現金を得る。" },
      { id: "event_expense", name: "出費", weight: 15, description: "現在プレイヤーが現金を支払う。" },

      { id: "stock_drop", name: "株価下落", weight: 8, description: "ランダム1エリアの株価-10万円。株価下限未満にはならない。" },
      { id: "spy_bust", name: "スパイ一斉摘発", weight: 7, description: "全スパイが消滅。" },

    /************************************************************
     * クラス定義
     * 保存時はプレーンオブジェクトにする。
     ************************************************************/

    class Player {
      constructor(data) {
        this.id = data.id;
        this.name = data.name;
        this.color = data.color;
        this.colorValue = data.colorValue;
        this.clientId = data.clientId || "";
        this.money = data.money ?? INITIAL_MONEY;
        this.position = data.position ?? 0;
        this.cards = data.cards || [];
        this.fame = data.fame || 0;
        this.skipTurn = data.skipTurn || false;
        this.bankrupt = data.bankrupt || false;
        this.loanPrincipal = data.loanPrincipal || 0;
        this.loanDue = data.loanDue || 0;
        this.settlementCount = data.settlementCount || 0;
      }

      toJSON() {
        return { ...this };
      }
    }

    class Land {
      constructor(def) {
        this.id = def.id;
        this.name = def.name;
        this.areaId = def.areaId;
        this.price = def.price;
        this.baseToll = def.baseToll;
        this.value = def.price;
        this.investment = 0;
        this.ownerId = null;
        this.isPrime = def.isPrime;
      }

      toJSON() {
        return { ...this };
      }
    }

    class Area {
      constructor(def, players) {
        this.id = def.id;
        this.name = def.name;
        this.initialStockPrice = def.initialStockPrice;
        this.stockPrice = def.initialStockPrice;
        this.growthType = def.growthType;
        this.description = def.description;
        this.stocks = {};

        for (const player of players) {
          this.stocks[player.id] = 0;
        }
      }

      toJSON() {
        return { ...this, stocks: { ...this.stocks } };
      }
    }

    /************************************************************
     * 純粋関数・計算系
     ************************************************************/

    function formatMoney(value) {
      const amount = Math.round(value);

      if (amount >= 10000) {
        const oku = Math.floor(amount / 10000);
        const man = amount % 10000;

        if (man === 0) {
          return `${oku}億円`;
        }

        return `${oku}億${man}万円`;
      }

      return `${amount}万円`;
    }

    function getAreaById(areaId) {
      return AREA_DEFS.find(area => area.id === areaId);
    }

    function getLandsByArea(areaId) {
      return Object.values(LAND_DEFS).filter(land => land.areaId === areaId);
    }

    function getStockFloor(initialStockPrice) {
      return Math.ceil(initialStockPrice * 0.5);
    }

    function getStockIncreaseByPurchase(areaId) {
      const area = getAreaById(areaId);
      return area && area.growthType === "fast" ? 2 : 1;
    }

    function calculateCurrentToll(land, isMonopoly) {
      const normalToll = land.baseToll + Math.floor(land.investment * 0.3);
      return isMonopoly ? normalToll * 2 : normalToll;
    }

    function calculatePrimePassFee(currentToll, isMonopoly) {
      const rate = isMonopoly ? 0.1 : 0.05;
      return Math.max(1, Math.round(currentToll * rate));
    }

    function getAreaOwnershipCount(state, playerId, areaId) {
      return state.lands.filter(land => {
        return land.areaId === areaId && land.ownerId === playerId;
      }).length;
    }

    function getAreaLandCount(areaId) {
      return getLandsByArea(areaId).length;
    }

    function calculateInvestmentLimit(state, playerId, land) {
      const ownedCount = getAreaOwnershipCount(state, playerId, land.areaId);
      const totalCount = getAreaLandCount(land.areaId);

      if (totalCount === 4) {
        if (ownedCount <= 1) return land.price * 3;
        if (ownedCount === 2) return land.price * 4;
        if (ownedCount === 3) return land.price * 5;
        return land.price * 7;
      }

      if (totalCount === 3) {
        if (ownedCount <= 1) return land.price * 3;
        if (ownedCount === 2) return land.price * 5;
        return land.price * 7;
      }

      return land.price * 3;
    }

    function calculateLandAssets(state, playerId) {
      return state.lands
        .filter(land => land.ownerId === playerId)
        .reduce((sum, land) => sum + land.value, 0);
    }

    function calculateStockAssets(state, playerId) {
      return state.areas.reduce((sum, area) => {
        const count = area.stocks[playerId] || 0;
        return sum + count * area.stockPrice;
      }, 0);
    }

    function calculateTotalAssets(state, playerId) {
      const player = state.players.find(p => p.id === playerId);
      if (!player) return 0;

      return (
        player.money +
        calculateLandAssets(state, playerId) +
        calculateStockAssets(state, playerId) -
        player.loanDue
      );
    }

    function getPassedSquares(startPosition, steps) {
      const passed = [];

      for (let i = 1; i <= steps; i++) {
        passed.push((startPosition + i) % BOARD_SIZE);
      }

      return passed;
    }

    /************************************************************
     * 初期状態生成
     ************************************************************/

    function createInitialPlayers(playerInputs) {
      return playerInputs.map((input, index) => {
        const color = PLAYER_COLOR_DEFS[index] || PLAYER_COLOR_DEFS[0];

        return new Player({
          id: `player_${index + 1}`,
          name: input.name || `プレイヤー${index + 1}`,
          color: color.id,
          colorValue: color.value,
          clientId: input.clientId || "",
          money: INITIAL_MONEY,
          position: 0
        }).toJSON();
      });
    }

    function createInitialLands() {
      return Object.values(LAND_DEFS).map(def => new Land(def).toJSON());
    }

    function createInitialAreas(players) {
      return AREA_DEFS.map(def => new Area(def, players).toJSON());
    }

    function createInitialGameState(settings, playerInputs) {
      const players = createInitialPlayers(playerInputs);
      const lands = createInitialLands();
      const areas = createInitialAreas(players);

      return {
        gameTitle: GAME_TITLE,
        status: "playing",
        phase: "before_roll",
        roomCode: settings.roomCode || "",
        settings: {
          targetAssets: settings.targetAssets,
          maxPlayers: players.length,
          createdAt: new Date().toISOString()
        },
        turnCount: 1,
        currentPlayerIndex: 0,
        players,
        lands,
        areas,
        spies: [],
        pendingAction: null,
        lastRoll: null,
        winnerId: null,
        logs: [
          "ゲームを開始しました。"
        ]
      };
    }

    /************************************************************
     * 画面描画
     ************************************************************/

    function renderPlayerForms() {
      const count = Number(document.getElementById("playerCount").value);
      const container = document.getElementById("playerForms");
      container.innerHTML = "";

      for (let i = 0; i < count; i++) {
        const color = PLAYER_COLOR_DEFS[i];

        const card = document.createElement("div");
        card.className = "player-card";

        card.innerHTML = `
          <div class="player-card-head">
            <span>プレイヤー${i + 1}</span>
            <span>
              <span class="color-chip" style="background:${color.value}"></span>
              ${color.name}
            </span>
          </div>
          <input
            type="text"
            id="playerName_${i}"
            value="プレイヤー${i + 1}"
            autocomplete="off"
          />
        `;

        container.appendChild(card);
      }
    }

    function renderBoard() {
      const board = document.getElementById("board");
      board.innerHTML = "";

      for (const square of MAP_SQUARES) {
        const el = document.createElement("div");
        el.className = `square ${square.type}`;

        let priceHtml = "";

        if (square.type === "land") {
          const land = LAND_DEFS[square.landId];
          const area = getAreaById(land.areaId);
          priceHtml = `
            <div class="land-price">
              ${formatMoney(land.price)} / 通行料 ${formatMoney(land.baseToll)}
            </div>
            <div class="square-type">${area.name}${land.isPrime ? "・特等地" : ""}</div>
          `;
          el.style.borderLeftColor = getAreaColor(land.areaId);
        } else {
          priceHtml = `<div class="square-type">${SQUARE_TYPE_LABELS[square.type] || square.type}</div>`;
        }

        el.innerHTML = `
          <div class="square-no">No.${square.id}</div>
          <div class="square-name">${square.name}</div>
          ${priceHtml}
        `;

        board.appendChild(el);
      }
    }

    function getAreaColor(areaId) {
      const colorMap = {
        central: "#f97316",
        akiba_ueno: "#8b5cf6",
        northeast: "#10b981",
        ikebukuro: "#3b82f6",
        shintoshin: "#ef4444",
        youth: "#ec4899",
        south_business: "#64748b",
        bay: "#06b6d4"
      };

      return colorMap[areaId] || "#9ca3af";
    }

    function renderAreas() {
      const container = document.getElementById("areaList");
      container.innerHTML = "";

      for (const area of AREA_DEFS) {
        const lands = getLandsByArea(area.id);
        const floor = getStockFloor(area.initialStockPrice);

        const item = document.createElement("div");
        item.className = "area-item";

        item.innerHTML = `
          <div class="area-title" style="color:${getAreaColor(area.id)}">${area.name}</div>
          <div class="area-meta">
            初期株価：${formatMoney(area.initialStockPrice)}<br>
            株価下限：${formatMoney(floor)}<br>
            成長：${area.growthType === "fast" ? "株価上昇しやすい" : "通常"}<br>
            土地：${lands.map(land => land.name).join("、")}
          </div>
        `;

        container.appendChild(item);
      }
    }

    function collectPlayerInputs() {
      const count = Number(document.getElementById("playerCount").value);
      const result = [];

      for (let i = 0; i < count; i++) {
        const input = document.getElementById(`playerName_${i}`);
        result.push({
          name: input ? input.value.trim() : `プレイヤー${i + 1}`,
          clientId: ""
        });
      }

      return result;
    }

    function renderInitialStatePreview() {
      const targetAssets = Number(document.getElementById("targetAssets").value);
      const playerInputs = collectPlayerInputs();

      const state = createInitialGameState(
        {
          targetAssets,
          roomCode: "TEST"
        },
        playerInputs
      );

      document.getElementById("statePreview").textContent = JSON.stringify(state, null, 2);
    }

    /************************************************************
     * 初期化
     ************************************************************/

    function init() {
      document.title = GAME_TITLE;
      document.getElementById("playerCount").addEventListener("change", renderPlayerForms);
      document.getElementById("createStateButton").addEventListener("click", renderInitialStatePreview);

      renderPlayerForms();
      renderBoard();
      renderAreas();
    }

    init();
  </script>
