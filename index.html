      const canOperate = isMyTurn();
      const currentPlayer = getCurrentPlayer(currentGameState);
      const candidates = getPrimeTakeoverCandidates(currentGameState, currentPlayer.id);

      if (candidates.length === 0) {
        panel.innerHTML = `
          <div class="pending-action-title">乗っ取りカード</div>
          <div class="pending-action-body">
            乗っ取り条件を満たす特等地がありません。<br>
            条件：対象エリア株を51株以上保有し、対象エリアの特等地が他人所有であること。
          </div>
          <button id="cancelTakeoverButton" type="button" class="secondary">閉じる</button>
        `;

        document.getElementById("cancelTakeoverButton")?.addEventListener("click", cancelPendingCardActionOnline);
        return;
      }

      const options = candidates.map((candidate, index) => {
        return `<option value="${index}">${escapeHtml(candidate.land.name)} / 所有者:${escapeHtml(candidate.owner.name)} / ${escapeHtml(candidate.area.name)}</option>`;
      }).join("");

      panel.innerHTML = `
        <div class="pending-action-title">乗っ取りカード</div>
        <div class="pending-action-body">条件を満たす特等地を無料で乗っ取ります。</div>

        <div class="select-box-block">
          <div class="select-box-row">
            <label for="takeoverTargetSelect">対象</label>
            <select id="takeoverTargetSelect" ${!canOperate ? "disabled" : ""}>${options}</select>
          </div>

          <button id="confirmTakeoverButton" type="button" ${!canOperate ? "disabled" : ""}>乗っ取る</button>
        </div>
      `;

      document.getElementById("confirmTakeoverButton")?.addEventListener("click", () => {
        const select = document.getElementById("takeoverTargetSelect");
        const index = Number(select ? select.value : 0);
        resolveChooseTakeoverOnline(index);
      });
    }

    function buildMoveActionQueue(state, player, passedSquares, endPosition) {
      const queue = [];

      for (const squareId of passedSquares) {
        const square = getSquareById(squareId);
        if (!square) continue;

        const isArrivalSquare = squareId === endPosition;

        if (square.type === "settlement") {
          queue.push({ type: "settlement", squareId, sourceName: square.name });
        }

        if (square.type === "stock_exchange") {
          queue.push({ type: "stock_trade", squareId, sourceName: square.name });
        }

        if (square.type === "bank") {
          queue.push({ type: "bank_repay", squareId, sourceName: square.name });
        }

        if (!isArrivalSquare && square.type === "land") {
          const land = getLandBySquareId(state, squareId);

          if (land && land.isPrime && land.ownerId && land.ownerId !== player.id) {
            queue.push({ type: "prime_pass_fee", squareId, landId: land.id, sourceName: land.name });
          }
        }
      }

      queue.push({ type: "arrival", squareId: endPosition });

      return queue;
    }

    function processNextQueuedAction(nextState) {
      if (!nextState.actionQueue) nextState.actionQueue = [];

      if (nextState.status === "game_over") {
        nextState.pendingAction = null;
        nextState.phase = "game_over";
        nextState.actionQueue = [];
        return;
      }

      if (nextState.actionQueue.length === 0) {
        nextState.pendingAction = null;
        nextState.phase = "after_roll";
        return;
      }

      const action = nextState.actionQueue.shift();
      const player = getCurrentPlayer(nextState);

      if (!player) {
        nextState.pendingAction = null;
        nextState.phase = "after_roll";
        return;
      }

      if (action.type === "settlement") {
        executeSettlement(nextState, player, action.sourceName);

        if (nextState.status === "game_over") return;

        nextState.pendingAction = {
          type: "stock_trade",
          playerId: player.id,
          source: "settlement",
          sourceName: "決算マス"
        };
        nextState.phase = "stock_decision";
        return;
      }

      if (action.type === "stock_trade") {
        nextState.pendingAction = {
          type: "stock_trade",
          playerId: player.id,
          source: "stock_exchange",
          sourceName: action.sourceName || "証券取引所"
        };
        nextState.phase = "stock_decision";
        return;
      }

      if (action.type === "bank_repay") {
        executeBankRepayment(nextState, player, action.sourceName, action.squareId);
        processNextQueuedAction(nextState);
        return;
      }

      if (action.type === "prime_pass_fee") {
        executePrimePassFee(nextState, player, action.landId);
        processNextQueuedAction(nextState);
        return;
      }

      if (action.type === "arrival") {
        processArrivalSquare(nextState, player);
        return;
      }

      processNextQueuedAction(nextState);
    }

    function executeSettlement(nextState, player, sourceName) {
      const income = calculateSettlementIncome(nextState, player.id);
      const dividend = calculateDividend(nextState, player.id);

      player.money += income;
      player.money += dividend;
      player.settlementCount += 1;

      nextState.logs.push(`${player.name} は ${sourceName || "決算マス"} を通過し、決算収入 ${formatMoney(income)} を受け取りました。`);

      if (dividend > 0) {
        nextState.logs.push(`${player.name} は株配当 ${formatMoney(dividend)} を受け取りました。`);
      }

      if (hasReachedTargetAssets(nextState, player.id)) {
        nextState.status = "game_over";
        nextState.phase = "game_over";
        nextState.winnerId = player.id;
        nextState.pendingAction = null;
        nextState.actionQueue = [];
        nextState.logs.push(`${player.name} が目標資産に到達し、決算マス通過により勝利しました。`);
      }
    }

    function executePrimePassFee(nextState, player, landId) {
      const land = findLand(nextState, landId);
      if (!land || !land.isPrime || !land.ownerId || land.ownerId === player.id) return;

      const owner = findPlayer(nextState, land.ownerId);
      if (!owner || owner.bankrupt) return;

      const monopoly = isAreaMonopoly(nextState, owner.id, land.areaId);
      const currentToll = calculateCurrentToll(land, monopoly);
      const passFee = calculatePrimePassFee(currentToll, monopoly);

      player.money -= passFee;
      owner.money += passFee;

      nextState.logs.push(`${player.name} は特等地 ${land.name} を通過し、${owner.name} に通過料 ${formatMoney(passFee)} を支払いました。`);

      if (monopoly) {
        nextState.logs.push(`${land.name} は独占中の特等地のため、通過料が現在通行料の10%になっています。`);
      }

      if (player.money < 0) {
        nextState.logs.push(`${player.name} の現金が不足しています。資産整理を行います。`);
      }
    }

    function executeBankRepayment(nextState, player, sourceName, squareId) {
      if (!player.loanDue || player.loanDue <= 0) return;

      const repayAmount = player.loanDue;
      player.money -= repayAmount;

      nextState.logs.push(`${player.name} は ${sourceName || "銀行"} を通過・到着し、借入金 ${formatMoney(repayAmount)} を返済しました。`);

      player.loanPrincipal = 0;
      player.loanDue = 0;
      player.repaidBankSquareId = squareId ?? null;

      if (player.money < 0) {
        nextState.logs.push(`${player.name} の現金が不足しています。資産整理を行います。`);
      }
    }

    function processArrivalSquare(nextState, player) {
      const square = getSquareById(player.position);

      if (!square) {
        nextState.phase = "after_roll";
        nextState.pendingAction = null;
        return;
      }

      if (square.type === "land") return processArrivalLand(nextState, player, square);
      if (square.type === "bank") return processArrivalBank(nextState, player, square);
      if (square.type === "card") return processArrivalCard(nextState, player, square);

      if (square.type === "event") {
        processArrivalEvent(nextState, player, square);
        processNextQueuedAction(nextState);
        return;
      }

      if (square.type === "hotel") {
        processArrivalHotel(nextState, player, square);
        processNextQueuedAction(nextState);
        return;
      }

      if (square.type === "tax") {
        processArrivalTax(nextState, player, square);
        processNextQueuedAction(nextState);
        return;
      }

      if (square.type === "airport") return processArrivalAirport(nextState, player, square);

      if (square.type === "contribution") {
        processArrivalContribution(nextState, player, square);
        processNextQueuedAction(nextState);
        return;
      }

      if (square.type === "spy") return processArrivalSpy(nextState, player, square);

      if (square.type === "jail") {
        nextState.logs.push(`${player.name} は ${square.name} に到着しました。特に効果はありません。`);
        processNextQueuedAction(nextState);
        return;
      }

      if (square.type === "settlement" || square.type === "stock_exchange") {
        nextState.phase = "after_roll";
        nextState.pendingAction = null;
        return;
      }

      nextState.phase = "after_roll";
      nextState.pendingAction = null;
      nextState.logs.push(`${player.name} は ${square.name} に到着しました。`);
    }

    function processArrivalLand(nextState, player, square) {
      const land = findLand(nextState, square.landId);

      if (!land) {
        nextState.phase = "after_roll";
        nextState.pendingAction = null;
        return;
      }

      if (!land.ownerId) {
        nextState.phase = "land_decision";
        nextState.pendingAction = { type: "buy_land", playerId: player.id, landId: land.id };
        nextState.logs.push(`${player.name} は未所有の土地 ${land.name} に到着しました。`);
        return;
      }

      if (land.ownerId === player.id) {
        nextState.phase = "invest_decision";
        nextState.pendingAction = { type: "invest_land", playerId: player.id, landId: land.id };
        nextState.logs.push(`${player.name} は自分の土地 ${land.name} に到着しました。`);
        return;
      }

      payLandToll(nextState, player, land);

      nextState.phase = "after_roll";
      nextState.pendingAction = null;
    }

    function payLandToll(nextState, visitor, land) {
      const owner = findPlayer(nextState, land.ownerId);

      if (!owner || owner.bankrupt) {
        nextState.logs.push(`${visitor.name} は ${land.name} に到着しましたが、所有者がいないため通行料は発生しません。`);
        return;
      }

      const monopoly = isAreaMonopoly(nextState, owner.id, land.areaId);
      const toll = calculateCurrentToll(land, monopoly);

      if (visitor.freeTollActive) {
        visitor.freeTollActive = false;
        nextState.logs.push(`${visitor.name} は通行料無視カードの効果で、${owner.name} の土地 ${land.name} の通行料 ${formatMoney(toll)} を0円にしました。`);
        return;
      }

      visitor.money -= toll;
      owner.money += toll;

      nextState.logs.push(`${visitor.name} は ${owner.name} の土地 ${land.name} に止まり、通行料 ${formatMoney(toll)} を支払いました。`);

      if (monopoly) nextState.logs.push(`${land.name} は独占エリアの土地のため、通行料が2倍になっています。`);

      if (visitor.money < 0) {
        nextState.logs.push(`${visitor.name} の現金が不足しています。資産整理を行います。`);
      }
    }

    function processArrivalBank(nextState, player, square) {
      if (player.repaidBankSquareId === square.id) {
        nextState.phase = "after_roll";
        nextState.pendingAction = null;
        nextState.logs.push(`${player.name} は ${square.name} で借入金を返済したため、この銀行マスでは再借入できません。`);
        return;
      }

      if (player.loanDue && player.loanDue > 0) {
        nextState.phase = "after_roll";
        nextState.pendingAction = null;
        nextState.logs.push(`${player.name} は ${square.name} に到着しましたが、未返済借入があるため追加借入はできません。`);
        return;
      }

      const borrowLimit = calculateBorrowLimit(nextState, player.id);

      if (borrowLimit <= 0) {
        nextState.phase = "after_roll";
        nextState.pendingAction = null;
        nextState.logs.push(`${player.name} は ${square.name} に到着しましたが、借入可能額がありません。`);
        return;
      }

      nextState.phase = "bank_decision";
      nextState.pendingAction = {
        type: "borrow_bank",
        playerId: player.id,
        squareId: square.id,
        sourceName: square.name
      };

      nextState.logs.push(`${player.name} は ${square.name} に到着しました。銀行から借入できます。`);
    }

    function processArrivalCard(nextState, player, square) {
      const newCard = drawRandomCard(player);

      nextState.logs.push(`${player.name} は ${square.name} に到着し、${newCard.name} を引きました。`);

      if (player.cards.length < 5) {
        player.cards.push(newCard);
        nextState.logs.push(`${newCard.name} を手札に加えました。`);
        processNextQueuedAction(nextState);
        return;
      }

      nextState.phase = "card_full_decision";
      nextState.pendingAction = {
        type: "card_full",
        playerId: player.id,
        squareId: square.id,
        newCard
      };

      nextState.logs.push(`${player.name} の手札がいっぱいです。捨てるカードを選んでください。`);
    }

    function processArrivalEvent(nextState, player, square) {
      const event = pickWeighted(EVENT_DEFS, item => item.weight);

      if (!event) {
        nextState.logs.push(`${player.name} は ${square.name} に到着しましたが、イベントは発生しませんでした。`);
        return;
      }

      nextState.logs.push(`${player.name} は ${square.name} に到着しました。イベント：${event.name}`);
      executeEvent(nextState, player, event);
    }

    function executeEvent(nextState, player, event) {
      if (event.id === "boom") {
        for (const area of nextState.areas) area.stockPrice += 2;
        nextState.logs.push("景気上昇により、全エリアの株価が2万円上がりました。");
        return;
      }

      if (event.id === "recession") {
        for (const area of nextState.areas) {
          const floor = getStockFloor(area.initialStockPrice);
          area.stockPrice = Math.max(floor, area.stockPrice - 2);
        }
        nextState.logs.push("不景気により、全エリアの株価が2万円下がりました。");
        return;
      }

      if (event.id === "event_income") {
        const amount = calculateEventIncome(nextState);
        player.money += amount;
        nextState.logs.push(`${player.name} は臨時収入 ${formatMoney(amount)} を得ました。`);
        return;
      }

      if (event.id === "event_expense") {
        const amount = calculateEventExpense(nextState);
        player.money -= amount;
        nextState.logs.push(`${player.name} は出費 ${formatMoney(amount)} を支払いました。`);
        if (player.money < 0) nextState.logs.push(`${player.name} の現金が不足しています。資産整理を行います。`);
        return;
      }

      if (event.id === "event_dividend") {
        const amount = calculateDividend(nextState, player.id) * 2;
        if (amount <= 0) {
          nextState.logs.push(`${player.name} は株を持っていないため、配当金を受け取れませんでした。`);
          return;
        }
        player.money += amount;
        nextState.logs.push(`${player.name} は特別配当 ${formatMoney(amount)} を受け取りました。`);
        return;
      }

      if (event.id === "land_value_up") {
        const land = getRandomOwnedLand(nextState, player.id);
        if (!land) {
          nextState.logs.push(`${player.name} は土地を持っていないため、土地評価上昇は発生しませんでした。`);
          return;
        }
        land.value += 100;
        nextState.logs.push(`${land.name} の土地価値が100万円上がり、${formatMoney(land.value)} になりました。`);
        return;
      }

      if (event.id === "stock_surge") {
        const area = getRandomArea(nextState);
        if (!area) return;
        area.stockPrice += 10;
        nextState.logs.push(`${area.name} の株価が急騰し、10万円上がりました。`);
        return;
      }

      if (event.id === "stock_drop") {
        const area = getRandomArea(nextState);
        if (!area) return;
        const floor = getStockFloor(area.initialStockPrice);
        area.stockPrice = Math.max(floor, area.stockPrice - 10);
        nextState.logs.push(`${area.name} の株価が下落しました。現在株価：${formatMoney(area.stockPrice)}`);
        return;
      }

      if (event.id === "spy_bust") {
        const count = nextState.spies.length;
        nextState.spies = [];
        nextState.logs.push(`スパイ一斉摘発により、${count}体のスパイが消滅しました。`);
        return;
      }

      if (event.id === "takeover_chance") {
        const candidates = getTakeoverCandidates(nextState, player.id);

        if (candidates.length === 0) {
          nextState.logs.push(`${player.name} は乗っ取り条件を満たす特等地がありませんでした。`);
          return;
        }

        const target = candidates[0];
        target.land.ownerId = player.id;
        changeAreaStockPrice(nextState, target.area.id, 5);

        nextState.logs.push(`${player.name} は乗っ取りチャンスで ${target.owner.name} の特等地 ${target.land.name} を乗っ取りました。`);
        nextState.logs.push(`${target.area.name} の株価が5万円上がりました。`);
      }
    }

    function processArrivalHotel(nextState, player, square) {
      const fee = calculateHotelFee(nextState, player.id);
      player.money -= fee;
      nextState.logs.push(`${player.name} は ${square.name} に宿泊し、宿泊費 ${formatMoney(fee)} を支払いました。`);
      if (player.money < 0) nextState.logs.push(`${player.name} の現金が不足しています。資産整理を行います。`);
    }

    function processArrivalTax(nextState, player, square) {
      const taxGuard = player.cards.find(card => card.id === "tax_guard");

      if (taxGuard) {
        removeOneCardById(player, "tax_guard");
        nextState.logs.push(`${player.name} は税金回避カードを使用し、${square.name} の税金を無効化しました。`);
        return;
      }

      const amount = calculateTaxAmount(nextState, player.id);
      player.money -= amount;
      nextState.logs.push(`${player.name} は ${square.name} で税金 ${formatMoney(amount)} を支払いました。`);
      if (player.money < 0) nextState.logs.push(`${player.name} の現金が不足しています。資産整理を行います。`);
    }

    function processArrivalAirport(nextState, player, square) {
      const otherAirport = getOtherAirportSquare(square.id);

      if (!otherAirport) {
        nextState.logs.push(`${player.name} は ${square.name} に到着しましたが、移動先の空港がありません。`);
        processNextQueuedAction(nextState);
        return;
      }

      nextState.phase = "airport_decision";
      nextState.pendingAction = {
        type: "airport_choice",
        playerId: player.id,
        squareId: square.id,
        sourceName: square.name,
        targetSquareId: otherAirport.id
      };

      nextState.logs.push(`${player.name} は ${square.name} に到着しました。空港を利用できます。`);
    }

    function processArrivalContribution(nextState, player, square) {
      const amount = 300;

      if (player.money < amount) {
        nextState.logs.push(`${player.name} は ${square.name} に到着しましたが、現金不足のため国際貢献できませんでした。`);
        return;
      }

      player.money -= amount;
      player.fame += 1;
      nextState.logs.push(`${player.name} は ${square.name} で ${formatMoney(amount)} を寄付し、名声ポイントを1獲得しました。`);
    }

    function processArrivalSpy(nextState, player, square) {
      const fee = 300;

      if (player.money < fee) {
        nextState.logs.push(`${player.name} は ${square.name} に到着しましたが、現金不足のためスパイを雇用できません。`);
        processNextQueuedAction(nextState);
        return;
      }

      nextState.phase = "spy_decision";
      nextState.pendingAction = {
        type: "hire_spy",
        playerId: player.id,
        squareId: square.id,
        sourceName: square.name
      };

      nextState.logs.push(`${player.name} は ${square.name} に到着しました。スパイを雇用できます。`);
    }

    async function rollDiceOnline() {
      if (!currentGameState) return;

      if (!isMyTurn()) {
        alert("現在はあなたの手番ではありません。");
        return;
      }

      if (currentGameState.phase !== "before_roll") {
        alert("今はルーレットを回せません。");
        return;
      }

      const nextState = cloneState(currentGameState);
      const player = getCurrentPlayer(nextState);

      if (!player) return;

      if (player.skipTurn) {
        player.skipTurn = false;
        player.usedCardThisTurn = false;
        clearMoveCard(player);

        nextState.logs.push(`${player.name} は1回休みでした。`);
        nextState.phase = "after_roll";
        nextState.pendingAction = null;
        nextState.actionQueue = [];

        await saveGameStateOnline(nextState);
        return;
      }

      let roll = 0;
      let rollText = "";

      if (player.nextMoveCard && player.nextMoveCard.type === "fixed_roll") {
        roll = player.nextMoveCard.value;
        rollText = `${player.nextMoveCard.name} により出目 ${roll}`;
      } else if (player.nextMoveCard && player.nextMoveCard.type === "dice_count") {
        const diceCount = player.nextMoveCard.diceCount;
        const results = [];

        for (let i = 0; i < diceCount; i++) {
          results.push(Math.floor(Math.random() * 6) + 1);
        }

        roll = results.reduce((sum, value) => sum + value, 0);
        rollText = `${player.nextMoveCard.name} により ${diceCount}個の出目 ${results.join("+")} = ${roll}`;
      } else {
        roll = Math.floor(Math.random() * 6) + 1;
        rollText = `出目 ${roll}`;
      }

      clearMoveCard(player);

      const startPosition = player.position;
      const passedSquares = getPassedSquares(startPosition, roll);
      const endPosition = passedSquares[passedSquares.length - 1];

      player.position = endPosition;

      nextState.lastRoll = {
        playerId: player.id,
        value: roll,
        startPosition,
        endPosition,
        passedSquares,
        createdAt: new Date().toISOString()
      };

      nextState.logs.push(`${player.name} が ${rollText} で、${getSquareName(startPosition)} から ${getSquareName(endPosition)} へ移動しました。`);

      nextState.actionQueue = buildMoveActionQueue(nextState, player, passedSquares, endPosition);
      processNextQueuedAction(nextState);

      await saveGameStateOnline(nextState);
    }

    async function endTurnOnline() {
      if (!currentGameState) return;

      if (!isMyTurn()) {
        alert("現在はあなたの手番ではありません。");
        return;
      }

      if (currentGameState.phase !== "after_roll") {
        alert("まだターン終了できません。");
        return;
      }

      const nextState = cloneState(currentGameState);
      const currentPlayer = getCurrentPlayer(nextState);

      if (currentPlayer) {
        clearMoveCard(currentPlayer);
        currentPlayer.repaidBankSquareId = null;
      }

      processFinancialTroubles(nextState);

      if (nextState.status === "game_over") {
        await saveGameStateOnline(nextState);
        return;
      }

      const nextIndex = getNextActivePlayerIndex(nextState);
      const nextPlayer = nextState.players[nextIndex];

      if (!nextPlayer || nextPlayer.bankrupt) {
        checkOnlyOnePlayerLeft(nextState);
        await saveGameStateOnline(nextState);
        return;
      }

      nextState.currentPlayerIndex = nextIndex;
      nextState.turnCount += 1;
      nextState.phase = "before_roll";
      nextState.lastRoll = null;
      nextState.pendingAction = null;
      nextState.actionQueue = [];

      nextPlayer.usedCardThisTurn = false;
      nextPlayer.repaidBankSquareId = null;
      processSpiesForOwner(nextState, nextPlayer);

      if (currentPlayer) nextState.logs.push(`${currentPlayer.name} のターンが終了しました。`);
      if (nextPlayer) nextState.logs.push(`${nextPlayer.name} のターンです。`);

    async function resolveBuyLandOnline(mode) {
      if (!currentGameState) return;
      if (!isMyTurn()) return alert("現在はあなたの手番ではありません。");

      const action = currentGameState.pendingAction;
      if (!action || action.type !== "buy_land") return alert("土地購入の処理待ちではありません。");

      const nextState = cloneState(currentGameState);
      const player = findPlayer(nextState, action.playerId);
      const land = findLand(nextState, action.landId);

      if (!player || !land) return alert("プレイヤーまたは土地情報が見つかりません。");

      if (mode === "skip") {
        nextState.logs.push(`${player.name} は ${land.name} を購入しませんでした。`);
        nextState.pendingAction = null;
        processNextQueuedAction(nextState);
        await saveGameStateOnline(nextState);
        return;
      }

      if (land.ownerId) {
        nextState.logs.push(`${land.name} はすでに所有されています。`);
        nextState.pendingAction = null;
        processNextQueuedAction(nextState);
        await saveGameStateOnline(nextState);
        return;
      }

      let price = land.price;
      let usedDiscount = false;

      if (mode === "discount") {
        const discountCard = getLandDiscountCard(player);

        if (!discountCard) {
          alert("土地割引カードがありません。");
          return;
        }

        price = calculateDiscountLandPrice(land);
        usedDiscount = true;
      }

      if (player.money < price) {
        alert("現金が不足しています。");
        return;
      }

      player.money -= price;
      land.ownerId = player.id;
      land.value = land.price;
      land.investment = land.investment || 0;

      if (usedDiscount) {
        removeOneCardById(player, "land_discount");
        nextState.logs.push(`${player.name} は土地割引カードを使い、${land.name} を ${formatMoney(price)} で購入しました。`);
      } else {
        nextState.logs.push(`${player.name} は ${land.name} を ${formatMoney(price)} で購入しました。`);
      }

      changeAreaStockPrice(nextState, land.areaId, 1);
      nextState.logs.push(`${land.name} のエリア株価が ${formatMoney(1)} 上がりました。`);

      nextState.pendingAction = null;
      processNextQueuedAction(nextState);

      await saveGameStateOnline(nextState);
    }

    async function resolveInvestLandOnline(rawAmount) {
      if (!currentGameState) return;
      if (!isMyTurn()) return alert("現在はあなたの手番ではありません。");

      const action = currentGameState.pendingAction;
      if (!action || action.type !== "invest_land") return alert("増資の処理待ちではありません。");

      const amount = normalizeInvestmentAmount(rawAmount);
      if (amount <= 0) return alert("増資額は100万円以上、100万円単位で入力してください。");

      const nextState = cloneState(currentGameState);
      const player = findPlayer(nextState, action.playerId);
      const land = findLand(nextState, action.landId);

      if (!player || !land) return alert("プレイヤーまたは土地情報が見つかりません。");
      if (land.ownerId !== player.id) return alert("この土地は自分の土地ではありません。");

      const remaining = getAdditionalInvestmentLimit(nextState, player.id, land);
      if (amount > remaining) return alert(`増資上限を超えています。追加可能額は ${formatMoney(remaining)} です。`);
      if (amount > player.money) return alert("現金が不足しています。");

      player.money -= amount;
      land.investment += amount;
      land.value += amount;

      const stockIncrease = Math.floor(amount / 100);
      changeAreaStockPrice(nextState, land.areaId, stockIncrease);

      nextState.logs.push(`${player.name} は ${land.name} に ${formatMoney(amount)} 増資しました。`);
      nextState.logs.push(`${land.name} の土地価値が ${formatMoney(land.value)} になりました。`);
      nextState.logs.push(`${land.name} のエリア株価が ${formatMoney(stockIncrease)} 上がりました。`);

      nextState.pendingAction = null;
      processNextQueuedAction(nextState);

      await saveGameStateOnline(nextState);
    }

    async function resolveStockTradeOnline(mode) {
      if (!currentGameState) return;
      if (!isMyTurn()) return alert("現在はあなたの手番ではありません。");

      const action = currentGameState.pendingAction;
      if (!action || action.type !== "stock_trade") return alert("株取引の処理待ちではありません。");

      const nextState = cloneState(currentGameState);
      const player = findPlayer(nextState, action.playerId);

      if (!player) return alert("プレイヤー情報が見つかりません。");

      if (mode === "skip") {
        nextState.logs.push(`${player.name} は株取引を行いませんでした。`);
        nextState.pendingAction = null;
        processNextQueuedAction(nextState);
        await saveGameStateOnline(nextState);
        return;
      }

      const areaSelect = document.getElementById("stockAreaSelect");
      const amountInput = document.getElementById("stockAmountInput");

      const areaId = areaSelect ? areaSelect.value : "";
      const amount = Number(amountInput ? amountInput.value : 0);

      if (!areaId) return alert("エリアを選択してください。");
      if (!Number.isFinite(amount) || amount <= 0 || amount % 10 !== 0) return alert("株数は10株単位で入力してください。");

      const area = findArea(nextState, areaId);
      if (!area) return alert("エリア情報が見つかりません。");

      if (!area.stocks[player.id]) area.stocks[player.id] = 0;

      if (mode === "buy") {
        let cost = getStockBuyPrice(area, amount);

        if (player.stockDiscountActive) cost = Math.floor(cost * 0.8);
        if (player.money < cost) return alert(`現金が不足しています。必要額は ${formatMoney(cost)} です。`);

        player.money -= cost;
        area.stocks[player.id] += amount;

        const increase = increaseAreaStockPriceByBuy(area);

        if (player.stockDiscountActive) {
          nextState.logs.push(`${player.name} は株購入優待カードの効果で、株を20%引きで購入しました。`);
          player.stockDiscountActive = false;
        }

        nextState.logs.push(`${player.name} は ${area.name} の株を ${amount}株、${formatMoney(cost)} で購入しました。`);
        nextState.logs.push(`${area.name} の株価が ${formatMoney(increase)} 上がり、${formatMoney(area.stockPrice)} になりました。`);
      }

      if (mode === "sell") {
        const owned = area.stocks[player.id] || 0;
        if (owned < amount) return alert(`保有株数が不足しています。現在の保有株は ${owned}株です。`);

        const revenue = getStockSellPrice(area, amount);

        area.stocks[player.id] -= amount;
        player.money += revenue;

        decreaseAreaStockPriceBySell(area, amount);

        nextState.logs.push(`${player.name} は ${area.name} の株を ${amount}株売却し、${formatMoney(revenue)} を得ました。`);
        nextState.logs.push(`${area.name} の株価が ${formatMoney(area.stockPrice)} になりました。`);
      }

      nextState.pendingAction = null;
      processNextQueuedAction(nextState);

      await saveGameStateOnline(nextState);
    }

    async function resolveBorrowBankOnline(rawAmount) {
      if (!currentGameState) return;
      if (!isMyTurn()) return alert("現在はあなたの手番ではありません。");

      const action = currentGameState.pendingAction;
      if (!action || action.type !== "borrow_bank") return alert("銀行借入の処理待ちではありません。");

      const amount = normalizeBorrowAmount(rawAmount);
      if (amount <= 0) return alert("借入額は100万円以上、100万円単位で入力してください。");

      const nextState = cloneState(currentGameState);
      const player = findPlayer(nextState, action.playerId);

      if (!player) return alert("プレイヤー情報が見つかりません。");
      if (player.loanDue && player.loanDue > 0) return alert("未返済借入があるため、追加借入できません。");

      const borrowLimit = calculateBorrowLimit(nextState, player.id);
      if (amount > borrowLimit) return alert(`借入上限を超えています。借入可能額は ${formatMoney(borrowLimit)} です。`);

      const due = calculateLoanDue(amount);

      player.money += amount;
      player.loanPrincipal = amount;
      player.loanDue = due;

      nextState.logs.push(`${player.name} は銀行から ${formatMoney(amount)} を借り入れました。返済予定額は ${formatMoney(due)} です。`);

      nextState.pendingAction = null;
      processNextQueuedAction(nextState);

      await saveGameStateOnline(nextState);
    }

    async function resolveAirportChoiceOnline(shouldUse) {
      if (!currentGameState) return;
      if (!isMyTurn()) return alert("現在はあなたの手番ではありません。");

      const action = currentGameState.pendingAction;
      if (!action || action.type !== "airport_choice") return alert("空港利用の処理待ちではありません。");

        player.position = targetSquare.id;

          nextState.logs.push(`${player.name} は空港ワープカードで、${before} から ${targetSquare.name} へ移動しました。`);
        } else {
          nextState.logs.push(`${player.name} は空港を利用し、${before} から ${targetSquare.name} へ移動しました。利用料 ${formatMoney(fee)} を支払いました。`);
        }

        nextState.logs.push("移動先の空港効果は追加発生しません。");
      } else {
        nextState.logs.push(`${player.name} は空港を利用しませんでした。`);
      }

      nextState.pendingAction = null;
      processNextQueuedAction(nextState);

      await saveGameStateOnline(nextState);

      const action = currentGameState.pendingAction;

        nextState.logs.push(`${player.name} は ${discarded.name} を捨て、${action.newCard.name} を手札に加えました。`);
      } else {
        nextState.logs.push(`${player.name} は新しく引いた ${action.newCard.name} を捨てました。`);
      }

      nextState.pendingAction = null;
      processNextQueuedAction(nextState);

      await saveGameStateOnline(nextState);

    async function useCardOnline(cardUid) {
      if (!currentGameState) return;
      if (!isMyTurn()) return alert("現在はあなたの手番ではありません。");
      if (currentGameState.phase !== "before_roll") return alert("カードはルーレット前に使用してください。");

      const nextState = cloneState(currentGameState);
      const player = getCurrentPlayer(nextState);
      const card = getCardByUid(player, cardUid);

      if (!player || !card) return alert("カード情報が見つかりません。");
      if (player.usedCardThisTurn) return alert("カードは1ターンに1枚までです。");
      if (!canUseCardNow(nextState, player, card)) return alert("このカードは現在使用できません。");

      if (card.id === "special") {
        removeCardByUid(player, cardUid);
        setCardUsed(player);
        nextState.pendingAction = { type: "choose_roll", playerId: player.id, cardId: card.id, title: "スペシャルカード" };
        nextState.phase = "card_decision";
        nextState.logs.push(`${player.name} はスペシャルカードを使用しました。`);
        await saveGameStateOnline(nextState);
        return;
      }

      if (card.id === "express" || card.id === "limited_express" || card.id === "bullet_train") {
        const diceCount = card.id === "express" ? 2 : card.id === "limited_express" ? 3 : 4;

        removeCardByUid(player, cardUid);
        setCardUsed(player);
        player.nextMoveCard = { type: "dice_count", diceCount, name: card.name };

        nextState.logs.push(`${player.name} は${card.name}を使用しました。次の移動はルーレット${diceCount}個分です。`);
        await saveGameStateOnline(nextState);
        return;
      }

      if (card.id === "rura") {
        removeCardByUid(player, cardUid);
        setCardUsed(player);

        const startPosition = player.position;
        player.position = 0;

        nextState.lastRoll = {
          playerId: player.id,
          value: 0,
          startPosition,
          endPosition: 0,
          passedSquares: [],
          cardMove: "rura",
          createdAt: new Date().toISOString()
        };

        nextState.actionQueue = [{ type: "settlement", squareId: 0, sourceName: "ルーラカード" }];
        nextState.logs.push(`${player.name} はルーラカードを使用し、決算マスへ戻りました。`);

        processNextQueuedAction(nextState);
        await saveGameStateOnline(nextState);
        return;
      }

      if (card.id === "airport_warp") {
        removeCardByUid(player, cardUid);
        setCardUsed(player);

        nextState.pendingAction = {
          type: "choose_airport",
          playerId: player.id,
          cardId: card.id,
          title: "空港ワープカード"
        };

        nextState.phase = "card_decision";
        nextState.logs.push(`${player.name} は空港ワープカードを使用しました。`);

        await saveGameStateOnline(nextState);
        return;
      }

      if (card.id === "income") {
        removeCardByUid(player, cardUid);
        setCardUsed(player);

        const amount = calculateCardIncome(nextState);
        player.money += amount;

        nextState.logs.push(`${player.name} は臨時収入カードを使用し、${formatMoney(amount)} を得ました。`);
        await saveGameStateOnline(nextState);
        return;
      }

      if (card.id === "free_toll") {
        removeCardByUid(player, cardUid);
        setCardUsed(player);
        player.freeTollActive = true;

        nextState.logs.push(`${player.name} は通行料無視カードを使用しました。次に他人土地へ停止したときの通行料が0円になります。`);
        await saveGameStateOnline(nextState);
        return;
      }

      if (card.id === "dividend") {
        removeCardByUid(player, cardUid);
        setCardUsed(player);

        const amount = calculateDividend(nextState, player.id);

        if (amount <= 0) {
          nextState.logs.push(`${player.name} は配当カードを使用しましたが、保有株がないため収入はありませんでした。`);
        } else {
          player.money += amount;
          nextState.logs.push(`${player.name} は配当カードを使用し、${formatMoney(amount)} を受け取りました。`);
        }

        await saveGameStateOnline(nextState);
        return;
      }

      if (card.id === "cash_swap") {
        const targets = getSelectablePlayersExcept(nextState, player.id);
        if (targets.length === 0) return alert("対象プレイヤーがいません。");

        removeCardByUid(player, cardUid);
        setCardUsed(player);

        const target = targets[Math.floor(Math.random() * targets.length)];
        const temp = player.money;

        player.money = target.money;
        target.money = temp;

        nextState.logs.push(`${player.name} はとっかえっこカードを使用し、${target.name} と所持現金を入れ替えました。`);
        await saveGameStateOnline(nextState);
        return;
      }

      if (card.id === "skip") {
        removeCardByUid(player, cardUid);
        setCardUsed(player);
        nextState.pendingAction = { type: "choose_player", mode: "skip", playerId: player.id, title: "足止めカード" };
        nextState.phase = "card_decision";
        nextState.logs.push(`${player.name} は足止めカードを使用しました。`);
        await saveGameStateOnline(nextState);
        return;
      }

      if (card.id === "swap_position") {
        removeCardByUid(player, cardUid);
        setCardUsed(player);
        nextState.pendingAction = { type: "choose_player", mode: "swap_position", playerId: player.id, title: "場所替えカード" };
        nextState.phase = "card_decision";
        nextState.logs.push(`${player.name} は場所替えカードを使用しました。`);
        await saveGameStateOnline(nextState);
        return;
      }

      if (card.id === "stock_up" || card.id === "stock_down") {
        removeCardByUid(player, cardUid);
        setCardUsed(player);
        nextState.pendingAction = { type: "choose_area", mode: card.id, playerId: player.id, title: card.name };
        nextState.phase = "card_decision";
        nextState.logs.push(`${player.name} は ${card.name} を使用しました。`);
        await saveGameStateOnline(nextState);
        return;
      }

      if (card.id === "stock_discount") {
        removeCardByUid(player, cardUid);
        setCardUsed(player);
        player.stockDiscountActive = true;

        nextState.logs.push(`${player.name} は株購入優待カードを使用しました。次の株購入が20%引きになります。`);
        await saveGameStateOnline(nextState);
        return;
      }

      if (card.id === "invest") {
        removeCardByUid(player, cardUid);
        setCardUsed(player);
        nextState.pendingAction = { type: "choose_land_invest", playerId: player.id, title: "増資カード" };
        nextState.phase = "card_decision";
        nextState.logs.push(`${player.name} は増資カードを使用しました。`);
        await saveGameStateOnline(nextState);
        return;
      }

      if (card.id === "takeover") {
        removeCardByUid(player, cardUid);
        setCardUsed(player);
        nextState.pendingAction = { type: "choose_takeover", playerId: player.id, title: "乗っ取りカード" };
        nextState.phase = "card_decision";
        nextState.logs.push(`${player.name} は乗っ取りカードを使用しました。`);
        await saveGameStateOnline(nextState);
        return;
      }

      if (card.id === "spy_dispatch") {
        removeCardByUid(player, cardUid);
        setCardUsed(player);
        createSpyAtPosition(nextState, player, player.position, "スパイ派遣カード");
        nextState.logs.push(`${player.name} はスパイ派遣カードを使用しました。`);
        await saveGameStateOnline(nextState);
        return;
      }

      alert("このカードはまだ実装されていません。");
    }

      const action = currentGameState.pendingAction;
      if (!action || action.type !== "choose_player") return;

      const nextState = cloneState(currentGameState);
      const player = findPlayer(nextState, action.playerId);
      const target = findPlayer(nextState, targetPlayerId);

      if (!player || !target) return alert("対象プレイヤーが見つかりません。");

      if (action.mode === "skip") {
        target.skipTurn = true;
        nextState.logs.push(`${player.name} は ${target.name} を足止めしました。${target.name} は次の手番が1回休みになります。`);
      }

      if (action.mode === "swap_position") {
        const temp = player.position;
        player.position = target.position;
        target.position = temp;
        nextState.logs.push(`${player.name} は ${target.name} と場所を入れ替えました。`);
      }

      nextState.pendingAction = null;
      nextState.phase = "before_roll";

      await saveGameStateOnline(nextState);
    }

    async function resolveChooseAreaOnline(areaId) {
      if (!currentGameState) return;

      const action = currentGameState.pendingAction;
      if (!action || action.type !== "choose_area") return;

      const nextState = cloneState(currentGameState);
      const player = findPlayer(nextState, action.playerId);
      const area = findArea(nextState, areaId);

      if (!player || !area) return alert("エリア情報が見つかりません。");

      if (action.mode === "stock_up") {
        area.stockPrice += 5;
        nextState.logs.push(`${player.name} は株価上昇カードで ${area.name} の株価を5万円上げました。`);
      }

      if (action.mode === "stock_down") {
        const floor = getStockFloor(area.initialStockPrice);
        area.stockPrice = Math.max(floor, area.stockPrice - 5);
        nextState.logs.push(`${player.name} は株価下落カードで ${area.name} の株価を5万円下げました。`);
      }

      nextState.pendingAction = null;
      nextState.phase = "before_roll";

      await saveGameStateOnline(nextState);
    }

    async function resolveChooseLandInvestOnline(landId, rawAmount) {
      if (!currentGameState) return;

      const action = currentGameState.pendingAction;
      if (!action || action.type !== "choose_land_invest") return;

      const amount = normalizeInvestmentAmount(rawAmount);
      if (amount <= 0) return alert("増資額は100万円以上、100万円単位で入力してください。");

      const nextState = cloneState(currentGameState);
      const player = findPlayer(nextState, action.playerId);
      const land = findLand(nextState, landId);

      if (!player || !land) return alert("土地情報が見つかりません。");
      if (land.ownerId !== player.id) return alert("自分の土地だけ増資できます。");

      const remaining = getAdditionalInvestmentLimit(nextState, player.id, land);
      if (amount > remaining) return alert(`増資上限を超えています。追加可能額は ${formatMoney(remaining)} です。`);
      if (amount > player.money) return alert("現金が不足しています。");

      player.money -= amount;
      land.investment += amount;
      land.value += amount;

      const stockIncrease = Math.floor(amount / 100);
      changeAreaStockPrice(nextState, land.areaId, stockIncrease);

      nextState.logs.push(`${player.name} は増資カードで ${land.name} に ${formatMoney(amount)} 増資しました。`);
      nextState.logs.push(`${land.name} のエリア株価が ${formatMoney(stockIncrease)} 上がりました。`);

      nextState.pendingAction = null;
      nextState.phase = "before_roll";

      await saveGameStateOnline(nextState);
    }

    async function resolveChooseTakeoverOnline(candidateIndex) {
      if (!currentGameState) return;

      const action = currentGameState.pendingAction;
      if (!action || action.type !== "choose_takeover") return;

      const nextState = cloneState(currentGameState);
      const player = findPlayer(nextState, action.playerId);

      if (!player) return;

      const candidates = getPrimeTakeoverCandidates(nextState, player.id);
      const candidate = candidates[candidateIndex];

      if (!candidate) return alert("乗っ取り対象が見つかりません。");

      candidate.land.ownerId = player.id;
      changeAreaStockPrice(nextState, candidate.area.id, 5);

      nextState.logs.push(`${player.name} は乗っ取りカードで ${candidate.owner.name} の特等地 ${candidate.land.name} を乗っ取りました。`);

      nextState.pendingAction = null;
      nextState.phase = "before_roll";

      await saveGameStateOnline(nextState);
    }

    function init() {
      document.title = GAME_TITLE;

      document.getElementById("playerCount").addEventListener("change", renderPlayerForms);
      document.getElementById("createStateButton").addEventListener("click", renderInitialStatePreview);

      document.getElementById("saveSupabaseButton").addEventListener("click", saveSupabaseConfig);
      document.getElementById("createRoomButton").addEventListener("click", createRoomOnline);
      document.getElementById("joinRoomButton").addEventListener("click", joinRoomOnline);
      document.getElementById("startGameButton").addEventListener("click", startOnlineGame);

      document.getElementById("rollButton").addEventListener("click", rollDiceOnline);
      document.getElementById("endTurnButton").addEventListener("click", endTurnOnline);

      renderPlayerForms();
      renderBoard();
      renderAreas();
      setupSupabaseClient();
    }

    init();
  </script>
</body>
