    async function resolveHireSpy(shouldHire) {
      const action = currentGameState?.pendingAction;
      if (!action || action.type !== "hire_spy" || !isPendingActionForMe(action)) return;

      const state = cloneState(currentGameState);
      normalizeGameStateShape(state);

      const player = findPlayer(state, action.playerId);

      if (!player || player.bankrupt) return;

      state.pendingAction = null;

      if (!shouldHire) {
        addLog(state, `${player.name}はスパイを雇いませんでした。`);
        state.phase = "after_roll";
        await saveGameStateOnline(state);
        return;
      }

      if (!canHireSpy(state)) {
        addLog(state, `すでにスパイが存在しているため、${player.name}はスパイを雇えませんでした。`);
        state.phase = "after_roll";
        await saveGameStateOnline(state);
        return;
      }

      if (player.money < SPY_HIRE_COST) {
        addLog(state, `${player.name}は資金不足のため、スパイを雇えませんでした。`);
        state.phase = "after_roll";
        await saveGameStateOnline(state);
        return;
      }

      player.money -= SPY_HIRE_COST;

      const spy = createSpyForOwner(player);
      state.spies = [spy];

      addLog(
        state,
        `${player.name}は${formatMoney(SPY_HIRE_COST)}でスパイを雇いました。進行方向は${getDirectionLabel(spy.direction)}です。`
      );

      state.phase = "after_roll";
      await saveGameStateOnline(state);
    }

    async function resolveCardFull(choice) {
      const action = currentGameState?.pendingAction;
      if (!action || action.type !== "card_full" || !isPendingActionForMe(action)) return;

      const state = cloneState(currentGameState);
      normalizeGameStateShape(state);

      const player = findPlayer(state, action.playerId);
      if (!player) return;

      state.pendingAction = null;

      if (choice === "discard_new") {
        addLog(state, `${player.name}は新しく引いたカードを捨てました。`);
      } else {
        removeCardByUid(player, choice);
        player.cards.push(action.newCard);

        setAnimationEvent(state, "card_draw", {
          playerId: player.id,
          cardName: action.newCard.name
        });

        addLog(state, `${player.name}は手札を整理してカードを受け取りました。`);
      }

      state.phase = "after_roll";
      await saveGameStateOnline(state);
    }

    async function useCard(cardUid) {
      if (!currentGameState || !currentRoomPlayer) return;

      const state = cloneState(currentGameState);
      normalizeGameStateShape(state);

      const player = findPlayer(state, currentRoomPlayer.id);
      if (!player) return;

      const card = player.cards.find(item => item.uid === cardUid);
      if (!card) return;

      if (card.id === "cash") {
        removeCardByUid(player, card.uid);
        player.money += 300;
        addLog(state, `${player.name}は臨時収入カードで${formatMoney(300)}を受け取りました。`);
        await saveGameStateOnline(state);
        return;
      }

      if (card.id === "airport_warp") {
        removeCardByUid(player, card.uid);
        state.pendingAction = {
          type: "choose_airport_card",
          playerId: player.id
        };
        await saveGameStateOnline(state);
        return;
      }

      if (card.id === "spy_card") {
        if (!canHireSpy(state)) {
          addLog(state, `すでにスパイが存在しているため、スパイ派遣カードを使えません。`);
          await saveGameStateOnline(state);
          return;
        }

        removeCardByUid(player, card.uid);
        const spy = createSpyForOwner(player);
        state.spies = [spy];

        addLog(state, `${player.name}はスパイ派遣カードでスパイを配置しました。`);
        await saveGameStateOnline(state);
        return;
      }

      if (card.id === "stock_boost") {
        removeCardByUid(player, card.uid);

        const ownedAreaId = Object.entries(player.stocks || {}).find(([, count]) => Number(count) > 0)?.[0];
        const area = ownedAreaId ? findAreaState(state, ownedAreaId) : state.areas[0];

        if (area) {
          area.stockPrice += 5;
          addLog(state, `${player.name}は株価上昇カードで${area.name}の株価を上げました。`);
        }

        await saveGameStateOnline(state);
      }
    }

    async function endTurnOnline() {
      if (!currentGameState || currentGameState.status !== "playing") return;
      if (!isMyTurn()) return;
      if (currentGameState.phase !== "after_roll") return;
      if (currentGameState.pendingAction) return;

      const state = cloneState(currentGameState);
      normalizeGameStateShape(state);

      const previousPlayerIndex = state.currentPlayerIndex;
      const nextIndex = findNextActivePlayerIndex(state, state.currentPlayerIndex);

      if (shouldRunSpyTurnAfterPlayer(state, previousPlayerIndex, nextIndex)) {
        runSpyTurn(state);
      }

      state.currentPlayerIndex = nextIndex;
      state.phase = "before_roll";
      state.pendingAction = null;

      const nextPlayer = getCurrentPlayer(state);
      if (nextPlayer) {
        addLog(state, `${nextPlayer.name}のターンです。`);
      }

      await saveGameStateOnline(state);
    }

    function shouldRunSpyTurnAfterPlayer(state, previousPlayerIndex, nextPlayerIndex) {
      if (!state || !getActiveSpy(state)) return false;

      const activeIndices = getActivePlayerIndices(state);
      if (activeIndices.length === 0) return false;

      const lastActiveIndex = activeIndices[activeIndices.length - 1];
      const firstActiveIndex = activeIndices[0];

      return previousPlayerIndex === lastActiveIndex && nextPlayerIndex === firstActiveIndex;
    }

    function runSpyTurn(state) {
      const spy = getActiveSpy(state);
      if (!spy) return;

      normalizeSpyShape(spy);

      const owner = findPlayer(state, spy.ownerId);

      if (!owner || owner.bankrupt) {
        state.spies = [];
        addLog(state, `雇い主が存在しないため、スパイは消滅しました。`);
        return;
      }

      const roll = randomInt(1, 6);
      const startPosition = spy.position;
      const passedSquareIds = getPassedSquareIdsByDirection(startPosition, roll, spy.direction);
      const destination = passedSquareIds[passedSquareIds.length - 1];

      spy.position = destination;

      addLog(
        state,
        `スパイターン：${owner.name}のスパイがサイコロで${roll}を出し、${getDirectionLabel(spy.direction)}に進みました。`
      );

      setAnimationEvent(state, "spy_turn", {
        playerId: owner.id,
        spyId: spy.id,
        value: roll,
        direction: spy.direction,
        startPosition,
        endPosition: destination,
        squareId: destination,
        message: `${owner.name}のスパイが${getDirectionLabel(spy.direction)}に${roll}マス進みました`
      });

      const square = getSquareById(destination);
      if (!square) return;

      if (passedSquareIds.includes(spy.startPosition)) {
        state.spies = [];
        addLog(state, `${owner.name}のスパイは1周したため消滅しました。`);
        return;
      }

      if (square.type === "jail") {
        state.spies = [];
        addLog(state, `${owner.name}のスパイは刑務所に入り、消滅しました。`);
        return;
      }

      if (square.type === "land") {
        const land = findLand(state, square.landId);

        if (land && land.ownerId === owner.id) {
          const oldLevel = spy.level || 1;
          spy.level = Math.min(SPY_MAX_LEVEL, oldLevel + 1);

          if (spy.level > oldLevel) {
            addLog(
              state,
              `${owner.name}のスパイは${land.name}でレベルアップしました。${getSpyLevelLabel(spy)}`
            );
          } else {
            addLog(
              state,
              `${owner.name}のスパイはすでに最高レベルです。${getSpyLevelLabel(spy)}`
            );
          }

          return;
        }

        processSpyStealOnLand(state, spy, owner, land);
      }
    }

    function processSpyStealOnLand(state, spy, owner, land) {
      if (!state || !spy || !owner || !land) return;
      if (!land.ownerId) return;
      if (land.ownerId === owner.id) return;

      const targetOwner = findPlayer(state, land.ownerId);
      if (!targetOwner || targetOwner.bankrupt) return;

      const success = Math.random() < SPY_SUCCESS_RATE;

      if (!success) {
        addLog(
          state,
          `${owner.name}のスパイは${land.name}で潜入しましたが、何も奪えませんでした。`
        );
        return;
      }

      const monopoly = isAreaMonopoly(state, targetOwner.id, land.areaId);
      const toll = calculateCurrentToll(land, monopoly);
      const stealRate = getSpyStealRate(spy);
      const amount = Math.max(1, Math.round(toll * stealRate));

      targetOwner.money -= amount;
      owner.money += amount;

      addLog(
        state,
        `${owner.name}のスパイが${land.name}で成功し、${targetOwner.name}から${formatMoney(amount)}を奪いました。`
      );

      handleNegativeMoney(state, targetOwner);
    }

    function handleNegativeMoney(state, player) {
      if (!player || player.money >= 0 || player.bankrupt) return;

      autoSellStocks(state, player);
      autoSellLands(state, player);

      if (player.money < 0) {
        bankruptPlayer(state, player);
      }
    }

    function autoSellStocks(state, player) {
      for (const area of [...state.areas].sort((a, b) => b.stockPrice - a.stockPrice)) {
        while (player.money < 0 && (player.stocks[area.id] || 0) >= 10) {
          player.stocks[area.id] -= 10;
          player.money += area.stockPrice * 10;
          area.stockPrice = Math.max(getStockFloor(area.id), area.stockPrice - 1);
          addLog(state, `${player.name}は資金不足のため${area.name}の株を10株売却しました。`);
        }
      }
    }

    function autoSellLands(state, player) {
      const ownedLands = state.lands
        .filter(land => land.ownerId === player.id)
        .sort((a, b) => (a.currentValue || a.price) - (b.currentValue || b.price));

      for (const land of ownedLands) {
        if (player.money >= 0) break;

        const value = Math.round((land.currentValue || land.price) * 0.5);
        player.money += value;

        land.ownerId = null;
        land.currentValue = land.price;
        land.investment = 0;

        addLog(state, `${player.name}は資金不足のため${land.name}を銀行へ売却しました。`);
      }
    }

    function bankruptPlayer(state, player) {
      player.bankrupt = true;
      player.money = 0;
      player.cards = [];
      player.stocks = {};
      player.loanPrincipal = 0;
      player.loanDue = 0;

      for (const land of state.lands) {
        if (land.ownerId === player.id) {
          land.ownerId = null;
          land.currentValue = land.price;
          land.investment = 0;
        }
      }

      state.spies = state.spies.filter(spy => spy.ownerId !== player.id);

      setAnimationEvent(state, "bankruptcy", {
        playerId: player.id
      });

      addLog(state, `${player.name}は破産しました。`);

      const activePlayers = state.players.filter(p => !p.bankrupt);

      if (activePlayers.length === 1) {
        const winner = activePlayers[0];
        state.status = "game_over";
        state.winnerId = winner.id;
        state.phase = "game_over";

        setAnimationEvent(state, "victory", {
          playerId: winner.id
        });

        addLog(state, `${winner.name}が最後まで残り、勝利しました。`);
      }
    }

    function buildAnimationHtml(animationEvent) {
      if (!animationEvent) return "";

      const payload = animationEvent.payload || {};
      const playerName = getAnimationPlayerName(animationEvent);

      if (animationEvent.type === "dice") {
        return `
          <div class="animation-title">${escapeHtml(playerName)} のサイコロ</div>
          <div class="dice-face dice-big rolling">${escapeHtml(getDiceFaceText(payload.value))}</div>
          <div class="animation-sub">出目が確定しました</div>
        `;
      }

      if (animationEvent.type === "dice_move") {
        return `
          <div class="animation-title">${escapeHtml(playerName)} の移動</div>
          <div class="dice-face dice-big rolling">${escapeHtml(getDiceFaceText(payload.value))}</div>
          <div class="animation-sub">
            ${escapeHtml(getDirectionLabel(payload.direction))}に進みます<br>
            到着地：${escapeHtml(getSquareName(payload.endPosition))}
          </div>
        `;
      }

      if (animationEvent.type === "card_draw") {
        const isMine =
          currentRoomPlayer &&
          payload.playerId &&
          currentRoomPlayer.id === payload.playerId;

        if (isMine && payload.cardName) {
          return buildCardBackAnimationHtml();
        }

        return `
          <div class="animation-title">${escapeHtml(playerName)} がカードを取得</div>
          <div class="card-flip-scene">
            <div class="card-flip-card">
              <div class="card-flip-face card-flip-back">CARD</div>
              <div class="card-flip-face card-flip-front">?</div>
            </div>
          </div>
          <div class="animation-sub">カード内容は表示されません</div>
        `;
      }

      if (animationEvent.type === "land_purchase") {
        return `
          <div class="animation-title">土地購入</div>
          <div class="animation-main">🏠</div>
          <div class="animation-sub">
            ${escapeHtml(playerName)} が ${escapeHtml(payload.landName || "土地")} を購入しました
          </div>
        `;
      }

      if (animationEvent.type === "invest_land") {
        return `
          <div class="animation-title">増資</div>
          <div class="animation-main">📈</div>
          <div class="animation-sub">
            ${escapeHtml(payload.landName || "土地")} に増資しました<br>
            ${escapeHtml(payload.amountText || "")}
          </div>
        `;
      }

      if (animationEvent.type === "toll_payment") {
        return `
          <div class="animation-title">通行料支払い</div>
          <div class="animation-main">💸</div>
          <div class="animation-sub">
            ${escapeHtml(payload.amountText || "")}
          </div>
        `;
      }

      if (animationEvent.type === "spy_turn") {
        return `
          <div class="animation-title">スパイ行動</div>
          <div class="animation-main">🕵️</div>
          <div class="animation-sub">
            ${escapeHtml(payload.message || "スパイが行動しました")}
          </div>
        `;
      }

      if (animationEvent.type === "bankruptcy") {
        return `
          <div class="animation-title">破産</div>
          <div class="animation-main">💥</div>
          <div class="animation-sub">
            ${escapeHtml(playerName)} が破産しました
          </div>
        `;
      }

      if (animationEvent.type === "victory") {
        return `
          <div class="animation-title">勝利</div>
          <div class="animation-main">🏆</div>
          <div class="animation-sub">
            ${escapeHtml(playerName)} が勝利しました
          </div>
        `;
      }

      return `
        <div class="animation-title">イベント</div>
        <div class="animation-main">✨</div>
        <div class="animation-sub">イベントが発生しました</div>
      `;
    }

    function buildCardBackAnimationHtml() {
      return `
        <div class="animation-title">カードを取得しました</div>
        <div class="card-flip-scene">
          <div id="cardFlipCard" class="card-flip-card">
            <div class="card-flip-face card-flip-back">CARD</div>
            <div class="card-flip-face card-flip-front">?</div>
          </div>
        </div>
        <div class="tap-guide">タップしてカードをめくる</div>
      `;
    }

    function buildCardFrontAnimationHtml(cardName) {
      return `
        <div class="animation-title">カードを取得しました</div>
        <div class="card-flip-scene">
          <div class="card-flip-card flipped">
            <div class="card-flip-face card-flip-back">CARD</div>
            <div class="card-flip-face card-flip-front">
              ${escapeHtml(cardName)}
            </div>
          </div>
        </div>
        <div class="animation-sub">${escapeHtml(cardName)}</div>
      `;
    }

    function hideAnimationLayer() {
      const layer = document.getElementById("animationLayer");
      const content = document.getElementById("animationContent");

      if (layer) {
        layer.classList.add("hidden");
        layer.classList.remove("interactive");
        layer.onclick = null;
      }

      if (content) {
        content.className = "animation-content";
        content.innerHTML = "";
      }

      activeClientAnimationEvent = null;

      if (animationHideTimer) {
        clearTimeout(animationHideTimer);
        animationHideTimer = null;
      }

      renderBoard();
    }

    function renderAnimationEvent() {
      const layer = document.getElementById("animationLayer");
      const content = document.getElementById("animationContent");

      if (!layer || !content || !currentGameState) return;

      const animationEvent = currentGameState.animationEvent;

      if (!animationEvent || !animationEvent.id) return;
      if (!isAnimationEventFresh(animationEvent)) return;
      if (shownAnimationEventIds.has(animationEvent.id)) return;

      shownAnimationEventIds.add(animationEvent.id);
      activeClientAnimationEvent = animationEvent;

      content.className = "animation-content";

      if (animationEvent.type === "dice" || animationEvent.type === "dice_move") {
        content.classList.add("dice-animation");
      }

      content.innerHTML = buildAnimationHtml(animationEvent);
      layer.classList.remove("hidden");
      layer.classList.remove("interactive");
      layer.onclick = null;

      renderBoard();
      runClientSideAnimationEffects(animationEvent);

      if (animationHideTimer) {
        clearTimeout(animationHideTimer);
      }

      if (isCardDrawAnimationForMe(animationEvent)) {
        layer.classList.add("interactive");
        layer.onclick = () => {
          flipCurrentCardAnimation(animationEvent);
        };
        return;
      }

      animationHideTimer = setTimeout(() => {
        hideAnimationLayer();
      }, getAnimationDuration(animationEvent));
    }

    function getAnimationDuration(animationEvent) {
      if (!animationEvent) return 1200;
      if (animationEvent.type === "dice") return 1200;
      if (animationEvent.type === "dice_move") return 1600;
      if (animationEvent.type === "card_draw") return 1500;
      if (animationEvent.type === "land_purchase" || animationEvent.type === "invest_land") return 1400;
      if (animationEvent.type === "toll_payment") return 1700;
      if (animationEvent.type === "spy_turn") return 1700;
      if (animationEvent.type === "bankruptcy") return 2100;
      if (animationEvent.type === "victory") return 2800;
      return 1200;
    }

    function shouldSquareGlowByAnimation(squareId) {
      if (!activeClientAnimationEvent || !activeClientAnimationEvent.payload) return false;

      const payload = activeClientAnimationEvent.payload;

      if (payload.squareId === squareId) return true;
      if (payload.endPosition === squareId) return true;
      if (payload.landSquareId === squareId) return true;

      return false;
    }

    function getGameStageRect() {
      const stage = document.querySelector(".game-stage");
      return stage ? stage.getBoundingClientRect() : null;
    }

    function getSquareCenterInStage(squareId) {
      const stageRect = getGameStageRect();
      const squareEl = document.querySelector(`.square[data-square-id="${squareId}"]`);

      if (!stageRect || !squareEl) return null;

      const squareRect = squareEl.getBoundingClientRect();

      return {
        x: squareRect.left - stageRect.left + squareRect.width / 2,
        y: squareRect.top - stageRect.top + squareRect.height / 2
      };
    }

    function addEffectRing(squareId) {
      const stage = document.querySelector(".game-stage");
      const center = getSquareCenterInStage(squareId);

      if (!stage || !center) return;

      const ring = document.createElement("div");
      ring.className = "effect-ring";
      ring.style.left = `${center.x}px`;
      ring.style.top = `${center.y}px`;

      stage.appendChild(ring);

      setTimeout(() => {
        ring.remove();
      }, 950);
    }

    function animateGhostPiece(animationEvent) {
      if (!animationEvent || !animationEvent.payload) return;

      const payload = animationEvent.payload;
      const startPosition = payload.startPosition;
      const endPosition = payload.endPosition;

      if (!Number.isFinite(startPosition) || !Number.isFinite(endPosition)) return;

      const stage = document.querySelector(".game-stage");
      const start = getSquareCenterInStage(startPosition);
      const end = getSquareCenterInStage(endPosition);

      if (!stage || !start || !end) return;

      let color = "#111827";
      const isSpy = animationEvent.type === "spy_turn";

      if (!isSpy && payload.playerId && currentGameState) {
        const player = findPlayer(currentGameState, payload.playerId);
        if (player && player.colorValue) {
          color = player.colorValue;
        }
      }

      const piece = document.createElement("div");
      piece.className = isSpy ? "ghost-moving-piece spy-ghost" : "ghost-moving-piece";
      piece.style.background = color;
      piece.style.left = `${start.x - 11}px`;
      piece.style.top = `${start.y - 11}px`;

      stage.appendChild(piece);

      const dx = end.x - start.x;
      const dy = end.y - start.y;

      const animation = piece.animate(
        [
          { transform: "translate(0, 0) scale(1)", opacity: 0.9 },
          { transform: `translate(${dx * 0.5}px, ${dy * 0.5}px) scale(1.25)`, opacity: 1 },
          { transform: `translate(${dx}px, ${dy}px) scale(1)`, opacity: 0.95 }
        ],
        {
          duration: 900,
          easing: "cubic-bezier(.2,.8,.2,1)"
        }
      );

      animation.onfinish = () => {
        piece.remove();
        addEffectRing(endPosition);
      };
    }

    function animateMoneyFly(animationEvent) {
      if (!animationEvent || !animationEvent.payload || !currentGameState) return;

      const payload = animationEvent.payload;
      const stage = document.querySelector(".game-stage");

      if (!stage) return;

      const payer = payload.playerId ? findPlayer(currentGameState, payload.playerId) : null;
      const owner = payload.ownerId ? findPlayer(currentGameState, payload.ownerId) : null;

      const fromSquareId = payer ? payer.position : payload.squareId;
      const toSquareId = owner ? owner.position : payload.squareId;

      const from = getSquareCenterInStage(fromSquareId);
      const to = getSquareCenterInStage(toSquareId);

      if (!from || !to) return;

      const amount = Number(payload.amount) || 0;
      const coinCount = Math.max(3, Math.min(12, Math.ceil(amount / 200)));

      for (let i = 0; i < coinCount; i++) {
        const coin = document.createElement("div");
        coin.className = "money-fly";
        coin.textContent = "💰";

        const startOffsetX = (Math.random() - 0.5) * 22;
        const startOffsetY = (Math.random() - 0.5) * 22;

        coin.style.left = `${from.x + startOffsetX}px`;
        coin.style.top = `${from.y + startOffsetY}px`;

        stage.appendChild(coin);

        const dx = to.x - from.x + (Math.random() - 0.5) * 28;
        const dy = to.y - from.y + (Math.random() - 0.5) * 28;

        const animation = coin.animate(
          [
            { transform: "translate(-50%, -50%) scale(0.6)", opacity: 0 },
            { transform: "translate(-50%, -70%) scale(1.15)", opacity: 1, offset: 0.2 },
            { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(0.9)`, opacity: 0.95 }
          ],
          {
            duration: 850 + i * 45,
            delay: i * 45,
            easing: "cubic-bezier(.2,.8,.2,1)"
          }
        );

        animation.onfinish = () => {
          coin.remove();
        };
      }
    }

    function triggerScreenShake() {
      const stage = document.querySelector(".game-stage");
      if (!stage) return;

      stage.classList.remove("screen-shake");
      void stage.offsetWidth;
      stage.classList.add("screen-shake");

      setTimeout(() => {
        stage.classList.remove("screen-shake");
      }, 700);
    }

    function spawnConfetti() {
      const stage = document.querySelector(".game-stage");
      if (!stage) return;

      const colors = ["#ef4444", "#f59e0b", "#22c55e", "#3b82f6", "#8b5cf6", "#ec4899"];

      for (let i = 0; i < 48; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti-piece";
        piece.style.background = colors[i % colors.length];
        piece.style.left = `${50 + (Math.random() - 0.5) * 26}%`;
        piece.style.top = "18%";
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;

        stage.appendChild(piece);

        const dx = (Math.random() - 0.5) * window.innerWidth * 0.8;
        const dy = 260 + Math.random() * 260;
        const rotate = 360 + Math.random() * 720;

        const animation = piece.animate(
          [
            { transform: "translate(0, 0) rotate(0deg)", opacity: 1 },
            { transform: `translate(${dx}px, ${dy}px) rotate(${rotate}deg)`, opacity: 0 }
          ],
          {
            duration: 1800 + Math.random() * 900,
            easing: "cubic-bezier(.2,.8,.2,1)"
          }
        );

        animation.onfinish = () => {
          piece.remove();
        };
      }
    }

    function spawnSpyFlash(squareId) {
      const stage = document.querySelector(".game-stage");
      const center = getSquareCenterInStage(squareId);

      if (!stage || !center) return;

      const flash = document.createElement("div");
      flash.className = "spy-flash";
      flash.textContent = "🕵️";
      flash.style.left = `${center.x}px`;
      flash.style.top = `${center.y}px`;
      flash.style.transform = "translate(-50%, -50%)";

      stage.appendChild(flash);

      const animation = flash.animate(
        [
          { transform: "translate(-50%, -50%) scale(0.4)", opacity: 0 },
          { transform: "translate(-50%, -70%) scale(1.25)", opacity: 1 },
          { transform: "translate(-50%, -105%) scale(0.8)", opacity: 0 }
        ],
        {
          duration: 950,
          easing: "ease-out"
        }
      );

      animation.onfinish = () => {
        flash.remove();
      };
    }

    function isCardDrawAnimationForMe(animationEvent) {
      const payload = animationEvent?.payload || {};

      return (
        animationEvent &&
        animationEvent.type === "card_draw" &&
        currentRoomPlayer &&
        payload.playerId === currentRoomPlayer.id &&
        !!payload.cardName
      );
    }

    function flipCurrentCardAnimation(animationEvent) {
      const content = document.getElementById("animationContent");
      const layer = document.getElementById("animationLayer");

      if (!content || !layer || !animationEvent) return;

      const cardName = animationEvent.payload?.cardName || "カード";

      playCardFlipSound();

      content.innerHTML = buildCardFrontAnimationHtml(cardName);

      const card = content.querySelector(".card-flip-card");
      if (card) {
        requestAnimationFrame(() => {
          card.classList.add("flipped");
        });
      }

      layer.classList.remove("interactive");
      layer.onclick = null;

      if (animationHideTimer) {
        clearTimeout(animationHideTimer);
      }

      animationHideTimer = setTimeout(() => {
        hideAnimationLayer();
      }, 1600);
    }

    function runClientSideAnimationEffects(animationEvent) {
      if (!animationEvent) return;

      playAnimationSound(animationEvent);

      const payload = animationEvent.payload || {};

      if (animationEvent.type === "dice_move") {
        animateGhostPiece(animationEvent);
        return;
      }

      if (animationEvent.type === "spy_turn") {
        animateGhostPiece(animationEvent);
        spawnSpyFlash(payload.endPosition ?? payload.squareId);
        return;
      }

      if (
        animationEvent.type === "land_purchase" ||
        animationEvent.type === "invest_land"
      ) {
        if (Number.isFinite(payload.squareId)) {
          addEffectRing(payload.squareId);
        }

        return;
      }

      if (animationEvent.type === "toll_payment") {
        animateMoneyFly(animationEvent);

        if (Number.isFinite(payload.squareId)) {
          addEffectRing(payload.squareId);
        }

        return;
      }

      if (animationEvent.type === "bankruptcy") {
        triggerScreenShake();
        return;
      }

      if (animationEvent.type === "victory") {
        spawnConfetti();
      }
    }

    function unlockAudio() {
      if (audioUnlocked) return;

      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;

        if (!AudioContextClass) return;

        if (!audioContext) {
          audioContext = new AudioContextClass();
        }

        if (audioContext.state === "suspended") {
          audioContext.resume();
        }

        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();

        oscillator.frequency.value = 1;
        gain.gain.value = 0.0001;

        oscillator.connect(gain);
        gain.connect(audioContext.destination);

        oscillator.start();
        oscillator.stop(audioContext.currentTime + 0.02);

        audioUnlocked = true;
      } catch (error) {
        console.warn("Audio unlock failed", error);
      }
    }

    function playTone(frequency, duration = 0.12, type = "sine", volume = 0.08, delay = 0) {
      try {
        if (!audioContext) return;

        const start = audioContext.currentTime + delay;
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();

        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, start);

        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, volume), start + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

        oscillator.connect(gain);
        gain.connect(audioContext.destination);

        oscillator.start(start);
        oscillator.stop(start + duration + 0.03);
      } catch (error) {
        console.warn("playTone failed", error);
      }
    }

    function playDiceSound() {
      unlockAudio();
      playTone(240, 0.06, "square", 0.05, 0);
      playTone(310, 0.06, "square", 0.05, 0.08);
      playTone(420, 0.08, "square", 0.06, 0.16);
      playTone(620, 0.12, "triangle", 0.07, 0.28);
    }

    function playPurchaseSound() {
      unlockAudio();
      playTone(520, 0.08, "triangle", 0.07, 0);
      playTone(780, 0.12, "triangle", 0.08, 0.09);
      playTone(1040, 0.16, "triangle", 0.07, 0.2);
    }

    function playInvestSound() {
      unlockAudio();
      playTone(440, 0.07, "sine", 0.06, 0);
      playTone(660, 0.07, "sine", 0.06, 0.08);
      playTone(880, 0.1, "sine", 0.07, 0.16);
    }

    function playPaymentSound() {
      unlockAudio();
      playTone(740, 0.06, "square", 0.045, 0);
      playTone(520, 0.07, "square", 0.045, 0.08);
      playTone(360, 0.11, "square", 0.05, 0.18);
    }

    function playCardFlipSound() {
      unlockAudio();
      playTone(300, 0.06, "triangle", 0.05, 0);
      playTone(900, 0.12, "triangle", 0.07, 0.08);
    }

    function playBankruptcySound() {
      unlockAudio();
      playTone(180, 0.18, "sawtooth", 0.09, 0);
      playTone(120, 0.28, "sawtooth", 0.08, 0.16);
    }

    function playVictorySound() {
      unlockAudio();
      playTone(523, 0.12, "triangle", 0.07, 0);
      playTone(659, 0.12, "triangle", 0.07, 0.14);
      playTone(784, 0.16, "triangle", 0.08, 0.28);
      playTone(1046, 0.28, "triangle", 0.08, 0.46);
    }

    function playSpySound() {
      unlockAudio();
      playTone(220, 0.09, "sine", 0.05, 0);
      playTone(180, 0.09, "sine", 0.04, 0.12);
      playTone(260, 0.12, "triangle", 0.05, 0.26);
    }

    function playAnimationSound(animationEvent) {
      if (!animationEvent) return;

      if (animationEvent.type === "dice" || animationEvent.type === "dice_move") {
        playDiceSound();
        return;
      }

      if (animationEvent.type === "card_draw") {
        playCardFlipSound();
        return;
      }

      if (animationEvent.type === "land_purchase") {
        playPurchaseSound();
        return;
      }

      if (animationEvent.type === "invest_land") {
        playInvestSound();
        return;
      }

      if (animationEvent.type === "toll_payment") {
        playPaymentSound();
        return;
      }

      if (animationEvent.type === "bankruptcy") {
        playBankruptcySound();
        return;
      }

      if (animationEvent.type === "victory") {
        playVictorySound();
        return;
      }

      if (animationEvent.type === "spy_turn") {
        playSpySound();
      }
    }

    function init() {
      document.getElementById("playerCount").addEventListener("change", renderPlayerForms);
      document.getElementById("saveSupabaseButton").addEventListener("click", saveSupabaseSettings);
      document.getElementById("createRoomButton").addEventListener("click", createRoomOnline);
      document.getElementById("joinRoomButton").addEventListener("click", joinRoomOnline);
      document.getElementById("startGameButton").addEventListener("click", startGameOnline);
      document.getElementById("rollButton").addEventListener("click", rollDiceOnline);
      document.getElementById("endTurnButton").addEventListener("click", endTurnOnline);

      document.getElementById("controlToggleButton")?.addEventListener("click", toggleControlOverlay);
      document.getElementById("infoToggleButton")?.addEventListener("click", toggleInfoOverlay);
      document.getElementById("closeControlButton")?.addEventListener("click", closeControlOverlay);
      document.getElementById("closeInfoButton")?.addEventListener("click", closeInfoOverlay);
      document.getElementById("closeSquareInfoButton")?.addEventListener("click", closeSquareInfoOverlay);
      document.getElementById("overlayBackdrop")?.addEventListener("click", closeAllFloatingOverlays);
      document.getElementById("board")?.addEventListener("click", handleBoardClick);

      document.addEventListener("pointerdown", unlockAudio, { once: true });
      document.addEventListener("touchstart", unlockAudio, { once: true });
      document.addEventListener("click", unlockAudio, { once: true });

      renderPlayerForms();
      setupSupabaseClient();
      renderBoard();
      checkSupportedViewport();

      window.addEventListener("resize", checkSupportedViewport);
      window.addEventListener("orientationchange", checkSupportedViewport);
    }

    init();
  </script>
