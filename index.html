<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>山手線ゲーム</title>

  <style>
    :root {
      --bg: #f4f5f7;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #2563eb;
      --danger: #dc2626;
      --money: #047857;
      --shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    input,
    select {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 10px;
      background: #fff;
      color: var(--text);
      width: 100%;
    }

    .app {
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .game-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .small-text {
      font-size: 12px;
      color: var(--muted);
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr 290px;
      gap: 12px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 12px;
    }

    .panel-title {
      font-weight: 800;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .form-row {
      margin-bottom: 10px;
    }

    .form-row label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 700;
    }

    .player-form-grid {
      display: grid;
      gap: 8px;
    }

    .player-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      background: #fafafa;
    }

    .player-card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 800;
    }

    .color-chip {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px var(--border);
      display: inline-block;
      vertical-align: middle;
    }

    .board-wrap {
      overflow: auto;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(10, minmax(72px, 1fr));
      gap: 6px;
      min-width: 760px;
    }

    .square {
      min-height: 72px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 6px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }

    .square-no {
      font-size: 10px;
      color: var(--muted);
    }

    .square-name {
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
      word-break: keep-all;
    }

    .square-type {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }

    .land-price {
      font-size: 10px;
      color: var(--money);
      font-weight: 700;
    }

    .square.land {
      border-left: 5px solid #9ca3af;
    }

    .square.settlement {
      background: #fff7ed;
      border-color: #fb923c;
    }

    .square.stock_exchange {
      background: #eff6ff;
      border-color: #60a5fa;
    }

    .square.bank {
      background: #ecfdf5;
      border-color: #34d399;
    }

    .square.card {
      background: #f5f3ff;
      border-color: #a78bfa;
    }

    .square.event {
      background: #fef2f2;
      border-color: #f87171;
    }

    .square.airport {
      background: #f0f9ff;
      border-color: #38bdf8;
    }

    .square.hotel {
      background: #fdf2f8;
      border-color: #f472b6;
    }

    .square.tax {
      background: #fefce8;
      border-color: #facc15;
    }

    .square.jail {
      background: #f3f4f6;
      border-color: #6b7280;
    }

    .square.spy {
      background: #faf5ff;
      border-color: #c084fc;
    }

    .square.contribution {
      background: #ecfeff;
      border-color: #22d3ee;
    }

    .area-list {
      display: grid;
      gap: 8px;
    }

    .area-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      background: #fafafa;
    }

    .area-title {
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .area-meta {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .notice {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e3a8a;
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .data-preview {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      background: #111827;
      color: #e5e7eb;
      padding: 10px;
      border-radius: 10px;
      overflow: auto;
      max-height: 280px;
      white-space: pre;
    }

    .room-actions {
  display: grid;
  gap: 8px;
  margin-top: 10px;
}

.room-actions.two {
  grid-template-columns: 1fr 1fr;
}

.room-code-box {
  border: 1px dashed var(--border);
  border-radius: 10px;
  padding: 10px;
  background: #fafafa;
  font-size: 14px;
  font-weight: 800;
  text-align: center;
  letter-spacing: 0.08em;
}

.waiting-list {
  display: grid;
  gap: 6px;
  margin-top: 8px;
}

.waiting-player {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px;
  background: #fff;
  font-size: 13px;
}

.status-pill {
  display: inline-block;
  border-radius: 999px;
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 800;
  background: #eef2ff;
  color: #3730a3;
}

.game-play-panel {
  margin-top: 12px;
  border-top: 1px solid var(--border);
  padding-top: 12px;
}

.current-player-box {
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px;
  background: #fafafa;
  margin-bottom: 10px;
}

.current-player-name {
  font-size: 16px;
  font-weight: 900;
  margin-bottom: 4px;
}

.current-player-meta {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.5;
}

.action-panel {
  display: grid;
  gap: 8px;
  margin-top: 10px;
}

.roll-result {
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  background: #fff;
  text-align: center;
  font-weight: 900;
  margin-bottom: 8px;
}

.player-summary-list {
  display: grid;
  gap: 8px;
}

.player-summary-card {
  border: 1px solid var(--border);
  border-radius: 10px;
  background: #fff;
  padding: 8px;
}

.player-summary-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  font-size: 13px;
  font-weight: 900;
  margin-bottom: 6px;
}

.player-summary-body {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.55;
}

.current-turn-card {
  border-color: var(--accent);
  background: #eff6ff;
}

.square.current-square {
  outline: 3px solid var(--accent);
  outline-offset: -3px;
}

.piece-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  margin-top: 4px;
  min-height: 16px;
}

.piece {
  width: 15px;
  height: 15px;
  border-radius: 50%;
  border: 2px solid #fff;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.25);
}

.log-panel {
  margin-top: 12px;
  max-height: 180px;
  overflow: auto;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: #fff;
  padding: 8px;
  font-size: 12px;
  line-height: 1.5;
}

.log-line {
  border-bottom: 1px solid #f3f4f6;
  padding: 4px 0;
}

.log-line:last-child {
  border-bottom: 0;
}

.hidden {
  display: none !important;
}
    
    @media (max-width: 920px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .board {
        grid-template-columns: repeat(5, minmax(72px, 1fr));
        min-width: 380px;
      }
    }

    .pending-action-box {
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px;
  background: #fff;
  margin-bottom: 10px;
}

.pending-action-title {
  font-weight: 900;
  margin-bottom: 6px;
}

.pending-action-body {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
}

.button-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 10px;
}

button.secondary {
  background: #6b7280;
}

button.danger {
  background: var(--danger);
}

.invest-input-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: center;
  margin-top: 10px;
}

.invest-input-row input {
  text-align: right;
}

.stock-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 8px;
  font-size: 12px;
}

.stock-table th,
.stock-table td {
  border: 1px solid var(--border);
  padding: 5px;
  text-align: right;
}

.stock-table th:first-child,
.stock-table td:first-child {
  text-align: left;
}

.stock-table th {
  background: #f3f4f6;
  font-weight: 800;
}

.stock-form {
  display: grid;
  gap: 8px;
  margin-top: 10px;
}

.stock-form-row {
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 8px;
  align-items: center;
}

.stock-form-row label {
  font-size: 12px;
  color: var(--muted);
  font-weight: 800;
}
    
  </style>
</head>

<body>
  <div class="app">
    <div class="top-bar">
      <div>
        <div class="game-title">山手線ゲーム</div>
        <div class="small-text">山手線マップ・通信対戦型 経済すごろく</div>
      </div>
      <div class="small-text" id="buildInfo">Part 1: データ定義</div>
    </div>

    <div class="layout">
      <section class="panel">
        <div class="panel-title">ゲーム設定</div>

        <div class="notice">
          これは開発用の初期版です。<br>
          まずはマップ・土地・エリア・カード・初期状態の定義を確認します。
        </div>

        <div class="form-row">
          <label for="playerCount">プレイ人数</label>
          <select id="playerCount">
            <option value="2">2人</option>
            <option value="3">3人</option>
            <option value="4" selected>4人</option>
            <option value="5">5人</option>
          </select>
        </div>

        <div class="form-row">
          <label for="targetAssets">目標資産</label>
          <div class="form-row">
  <label for="supabaseUrl">Supabase URL</label>
  <input
    id="supabaseUrl"
    type="text"
    placeholder="https://xxxxx.supabase.co"
    autocomplete="off"
  />
</div>

<div class="form-row">
  <label for="supabaseAnonKey">Supabase anon key</label>
  <input
    id="supabaseAnonKey"
    type="password"
    placeholder="anon public key"
    autocomplete="off"
  />
</div>

<button id="saveSupabaseButton" type="button">Supabase設定を保存</button>

<div style="height: 12px;"></div>

<div class="panel-title">通信対戦</div>

<div class="form-row">
  <label for="joinRoomCode">参加する部屋コード</label>
  <input
    id="joinRoomCode"
    type="text"
    placeholder="例：A7K3Q"
    maxlength="5"
    autocomplete="off"
  />
</div>

<div class="room-actions two">
  <button id="createRoomButton" type="button">部屋を作る</button>
  <button id="joinRoomButton" type="button">部屋に参加</button>
</div>

<div style="height: 10px;"></div>

<div id="connectionStatus" class="small-text">通信：未接続</div>

<div id="roomInfo" style="display:none; margin-top: 10px;">
  <div class="room-code-box" id="roomCodeDisplay">-----</div>
  <div class="waiting-list" id="waitingPlayers"></div>

  <div class="room-actions">
    <button id="startGameButton" type="button" disabled>ゲーム開始</button>
  </div>
</div>

          <div id="gamePlayPanel" class="game-play-panel" style="display:none;">
  <div class="panel-title">ゲーム進行</div>

  <div id="currentPlayerBox" class="current-player-box">
    現在プレイヤー情報なし
  </div>

<div id="rollResult" class="roll-result">
  出目：-
</div>

<div id="pendingActionPanel" class="pending-action-box hidden"></div>

<div class="action-panel">
  <button id="rollButton" type="button" disabled>ルーレットを回す</button>
  <button id="endTurnButton" type="button" disabled>ターン終了</button>
</div>

  <div style="height: 12px;"></div>

  <div class="panel-title">資産一覧</div>
  <div id="playerSummaryList" class="player-summary-list"></div>

  <div class="panel-title" style="margin-top: 12px;">ログ</div>
  <div id="logPanel" class="log-panel"></div>
</div>
          
          <select id="targetAssets">
            <option value="10000">短時間：1億円</option>
            <option value="50000" selected>標準：5億円</option>
            <option value="100000">長時間：10億円</option>
          </select>
        </div>

        <div class="form-row">
          <label>プレイヤー</label>
          <div id="playerForms" class="player-form-grid"></div>
        </div>

        <button id="createStateButton">初期ゲーム状態を作成</button>
      </section>

      <section class="panel">
        <div class="panel-title">マップ</div>
        <div class="board-wrap">
          <div id="board" class="board"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-title">データ確認</div>
        <div id="areaList" class="area-list"></div>

        <div style="height: 12px;"></div>

        <div class="panel-title">初期状態プレビュー</div>
        <pre id="statePreview" class="data-preview">まだ作成されていません。</pre>
      </section>
    </div>
  </div>

    /************************************************************
     * クラス定義
     * 保存時はプレーンオブジェクトにする。
     ************************************************************/

    class Player {
      constructor(data) {
        this.id = data.id;
        this.name = data.name;
        this.color = data.color;
        this.colorValue = data.colorValue;
        this.clientId = data.clientId || "";
        this.money = data.money ?? INITIAL_MONEY;
        this.position = data.position ?? 0;
        this.cards = data.cards || [];
        this.fame = data.fame || 0;
        this.skipTurn = data.skipTurn || false;
        this.bankrupt = data.bankrupt || false;
        this.loanPrincipal = data.loanPrincipal || 0;
        this.loanDue = data.loanDue || 0;
        this.settlementCount = data.settlementCount || 0;
      }

      toJSON() {
        return { ...this };
      }
    }

    class Land {
      constructor(def) {
        this.id = def.id;
        this.name = def.name;
        this.areaId = def.areaId;
        this.price = def.price;
        this.baseToll = def.baseToll;
        this.value = def.price;
        this.investment = 0;
        this.ownerId = null;
        this.isPrime = def.isPrime;
      }

      toJSON() {
        return { ...this };
      }
    }

    class Area {
      constructor(def, players) {
        this.id = def.id;
        this.name = def.name;
        this.initialStockPrice = def.initialStockPrice;
        this.stockPrice = def.initialStockPrice;
        this.growthType = def.growthType;
        this.description = def.description;
        this.stocks = {};

        for (const player of players) {
          this.stocks[player.id] = 0;
        }
      }

      toJSON() {
        return { ...this, stocks: { ...this.stocks } };
      }
    }

    /************************************************************
     * 純粋関数・計算系
     ************************************************************/

    function formatMoney(value) {
      const amount = Math.round(value);

      if (amount >= 10000) {
        const oku = Math.floor(amount / 10000);
        const man = amount % 10000;

        if (man === 0) {
          return `${oku}億円`;
        }

        return `${oku}億${man}万円`;
      }

      return `${amount}万円`;
    }

    function getAreaById(areaId) {
      return AREA_DEFS.find(area => area.id === areaId);
    }

    function getLandsByArea(areaId) {
      return Object.values(LAND_DEFS).filter(land => land.areaId === areaId);
    }

    function getStockFloor(initialStockPrice) {
      return Math.ceil(initialStockPrice * 0.5);
    }

    function getStockIncreaseByPurchase(areaId) {
      const area = getAreaById(areaId);
      return area && area.growthType === "fast" ? 2 : 1;
    }

    function calculateCurrentToll(land, isMonopoly) {
      const normalToll = land.baseToll + Math.floor(land.investment * 0.3);
      return isMonopoly ? normalToll * 2 : normalToll;
    }

    function calculatePrimePassFee(currentToll, isMonopoly) {
      const rate = isMonopoly ? 0.1 : 0.05;
      return Math.max(1, Math.round(currentToll * rate));
    }

    function getAreaOwnershipCount(state, playerId, areaId) {
      return state.lands.filter(land => {
        return land.areaId === areaId && land.ownerId === playerId;
      }).length;
    }

    function getAreaLandCount(areaId) {
      return getLandsByArea(areaId).length;
    }

    function calculateInvestmentLimit(state, playerId, land) {
      const ownedCount = getAreaOwnershipCount(state, playerId, land.areaId);
      const totalCount = getAreaLandCount(land.areaId);

      if (totalCount === 4) {
        if (ownedCount <= 1) return land.price * 3;
        if (ownedCount === 2) return land.price * 4;
        if (ownedCount === 3) return land.price * 5;
        return land.price * 7;
      }

      if (totalCount === 3) {
        if (ownedCount <= 1) return land.price * 3;
        if (ownedCount === 2) return land.price * 5;
        return land.price * 7;
      }

      return land.price * 3;
    }

    function calculateLandAssets(state, playerId) {
      return state.lands
        .filter(land => land.ownerId === playerId)
        .reduce((sum, land) => sum + land.value, 0);
    }

    function calculateStockAssets(state, playerId) {
      return state.areas.reduce((sum, area) => {
        const count = area.stocks[playerId] || 0;
        return sum + count * area.stockPrice;
      }, 0);
    }

    function calculateTotalAssets(state, playerId) {
      const player = state.players.find(p => p.id === playerId);
      if (!player) return 0;

      return (
        player.money +
        calculateLandAssets(state, playerId) +
        calculateStockAssets(state, playerId) -
        player.loanDue
      );
    }

    function getPassedSquares(startPosition, steps) {
      const passed = [];

      for (let i = 1; i <= steps; i++) {
        passed.push((startPosition + i) % BOARD_SIZE);
      }

      return passed;
    }

    /************************************************************
     * 初期状態生成
     ************************************************************/

    function createInitialPlayers(playerInputs) {
      return playerInputs.map((input, index) => {
        const color = PLAYER_COLOR_DEFS[index] || PLAYER_COLOR_DEFS[0];

        return new Player({
          id: `player_${index + 1}`,
          name: input.name || `プレイヤー${index + 1}`,
          color: color.id,
          colorValue: color.value,
          clientId: input.clientId || "",
          money: INITIAL_MONEY,
          position: 0
        }).toJSON();
      });
    }

    function createInitialLands() {
      return Object.values(LAND_DEFS).map(def => new Land(def).toJSON());
    }

    function createInitialAreas(players) {
      return AREA_DEFS.map(def => new Area(def, players).toJSON());
    }

    function createInitialGameState(settings, playerInputs) {
      const players = createInitialPlayers(playerInputs);
      const lands = createInitialLands();
      const areas = createInitialAreas(players);

      return {
        gameTitle: GAME_TITLE,
        status: "playing",
        phase: "before_roll",
        roomCode: settings.roomCode || "",
        settings: {
          targetAssets: settings.targetAssets,
          maxPlayers: players.length,
          createdAt: new Date().toISOString()
        },
        turnCount: 1,
        currentPlayerIndex: 0,
        players,
        lands,
        areas,
        spies: [],
        pendingAction: null,
        actionQueue: [],
        lastRoll: null,
        winnerId: null,
        logs: [
        "ゲームを開始しました。"
        ]
      };
    }

    function renderBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";

  const state = currentGameState;
  const currentPlayer = state ? state.players[state.currentPlayerIndex] : null;

  for (const square of MAP_SQUARES) {
    const el = document.createElement("div");
    el.className = `square ${square.type}`;

    if (currentPlayer && currentPlayer.position === square.id) {
      el.classList.add("current-square");
    }

    let priceHtml = "";

    if (square.type === "land") {
      const landDef = LAND_DEFS[square.landId];
      const area = getAreaById(landDef.areaId);

      let ownerText = "";
      let currentLand = null;

      if (state) {
        currentLand = state.lands.find(land => land.id === square.landId);
        if (currentLand && currentLand.ownerId) {
          const owner = state.players.find(player => player.id === currentLand.ownerId);
          ownerText = owner ? `所有：${owner.name}` : "";
        }
      }

      priceHtml = `
        <div class="land-price">
          ${formatMoney(landDef.price)} / 通行料 ${formatMoney(landDef.baseToll)}
        </div>
        <div class="square-type">
          ${area.name}${landDef.isPrime ? "・特等地" : ""}
          ${ownerText ? `<br>${ownerText}` : ""}
        </div>
      `;

      el.style.borderLeftColor = getAreaColor(landDef.areaId);
    } else {
      priceHtml = `<div class="square-type">${SQUARE_TYPE_LABELS[square.type] || square.type}</div>`;
    }

    let piecesHtml = "";

    if (state) {
      const playersHere = state.players.filter(player => {
        return !player.bankrupt && player.position === square.id;
      });

      if (playersHere.length > 0) {
        piecesHtml = `
          <div class="piece-wrap">
            ${playersHere.map(player => {
              return `<span class="piece" title="${player.name}" style="background:${player.colorValue}"></span>`;
            }).join("")}
          </div>
        `;
      }
    }

    el.innerHTML = `
      <div class="square-no">No.${square.id}</div>
      <div class="square-name">${square.name}</div>
      ${priceHtml}
      ${piecesHtml}
    `;

    board.appendChild(el);
  }
}

const SUPABASE_CONFIG_STORAGE_KEY = "yamanote_game_supabase_config";
const CLIENT_ID_STORAGE_KEY = "yamanote_game_client_id";

let supabaseClient = null;
let currentRoom = null;
let currentRoomPlayers = [];
let currentRoomPlayer = null;
let roomRealtimeChannel = null;
let currentGameState = null;
    
function getClientId() {
  let clientId = localStorage.getItem(CLIENT_ID_STORAGE_KEY);

  if (!clientId) {
    clientId = `client_${crypto.randomUUID()}`;
    localStorage.setItem(CLIENT_ID_STORAGE_KEY, clientId);
  }

  return clientId;
}

function loadSupabaseConfig() {
  const raw = localStorage.getItem(SUPABASE_CONFIG_STORAGE_KEY);

  if (!raw) {
    return {
      url: "",
      anonKey: ""
    };
  }

  try {
    return JSON.parse(raw);
  } catch {
    return {
      url: "",
      anonKey: ""
    };
  }
}

function saveSupabaseConfig() {
  const url = document.getElementById("supabaseUrl").value.trim();
  const anonKey = document.getElementById("supabaseAnonKey").value.trim();

  if (!url || !anonKey) {
    alert("Supabase URL と anon key を入力してください。");
    return;
  }

  localStorage.setItem(
    SUPABASE_CONFIG_STORAGE_KEY,
    JSON.stringify({
      url,
      anonKey
    })
  );

  setupSupabaseClient();

  alert("Supabase設定を保存しました。");
}

function setupSupabaseClient() {
  const config = loadSupabaseConfig();

  const urlInput = document.getElementById("supabaseUrl");
  const keyInput = document.getElementById("supabaseAnonKey");

  if (urlInput) urlInput.value = config.url || "";
  if (keyInput) keyInput.value = config.anonKey || "";

  if (!config.url || !config.anonKey) {
    setConnectionStatus("通信：Supabase未設定");
    return false;
  }

  if (!window.supabase || !window.supabase.createClient) {
    setConnectionStatus("通信：Supabaseライブラリ未読込");
    return false;
  }

  supabaseClient = window.supabase.createClient(config.url, config.anonKey);
  setConnectionStatus("通信：Supabase設定済み");

  return true;
}

function setConnectionStatus(message) {
  const el = document.getElementById("connectionStatus");
  if (el) el.textContent = message;
}

function generateRoomCode() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let code = "";

  for (let i = 0; i < 5; i++) {
    code += chars[Math.floor(Math.random() * chars.length)];
  }

  return code;
}

function getLocalPlayerName() {
  const input = document.getElementById("playerName_0");
  const name = input ? input.value.trim() : "";

  return name || "プレイヤー1";
}

function getColorDefById(colorId) {
  return PLAYER_COLOR_DEFS.find(color => color.id === colorId) || PLAYER_COLOR_DEFS[0];
}

function getColorDefBySeatNo(seatNo) {
  return PLAYER_COLOR_DEFS[seatNo - 1] || PLAYER_COLOR_DEFS[0];
}

async function createRoomOnline() {
  if (!setupSupabaseClient()) return;

  const roomCode = generateRoomCode();
  const maxPlayers = Number(document.getElementById("playerCount").value);
  const targetAssets = Number(document.getElementById("targetAssets").value);
  const clientId = getClientId();
  const playerName = getLocalPlayerName();
  const color = getColorDefBySeatNo(1);

  setConnectionStatus("通信：部屋作成中...");

  const { data: room, error: roomError } = await supabaseClient
    .from("rooms")
    .insert({
      room_code: roomCode,
      status: "waiting",
      settings: {
        targetAssets,
        maxPlayers,
        gameTitle: GAME_TITLE
      },
      game_state: null,
      state_version: 0,
      current_player_index: 0,
      phase: "waiting"
    })
    .select()
    .single();

  if (roomError) {
    console.error(roomError);
    alert("部屋作成に失敗しました。");
    setConnectionStatus("通信：部屋作成失敗");
    return;
  }

  const { data: player, error: playerError } = await supabaseClient
    .from("room_players")
    .insert({
      room_id: room.id,
      seat_no: 1,
      name: playerName,
      color: color.id,
      is_host: true,
      client_id: clientId,
      connected: true
    })
    .select()
    .single();

  if (playerError) {
    console.error(playerError);
    alert("プレイヤー作成に失敗しました。");
    setConnectionStatus("通信：プレイヤー作成失敗");
    return;
  }

  const { error: updateError } = await supabaseClient
    .from("rooms")
    .update({
      host_player_id: player.id
    })
    .eq("id", room.id);

  if (updateError) {
    console.error(updateError);
    alert("ホスト情報の保存に失敗しました。");
    return;
  }

  currentRoom = {
    ...room,
    host_player_id: player.id
  };
  currentRoomPlayer = player;

  await subscribeToRoom(room.id);
  await loadRoomState(room.id);

  setConnectionStatus("通信：部屋を作成しました");
}

async function joinRoomOnline() {
  if (!setupSupabaseClient()) return;

  const input = document.getElementById("joinRoomCode");
  const roomCode = input.value.trim().toUpperCase();
  const clientId = getClientId();
  const playerName = getLocalPlayerName();

  if (!roomCode) {
    alert("部屋コードを入力してください。");
    return;
  }

  setConnectionStatus("通信：部屋参加中...");

  const { data: room, error: roomError } = await supabaseClient
    .from("rooms")
    .select("*")
    .eq("room_code", roomCode)
    .single();

  if (roomError || !room) {
    console.error(roomError);
    alert("部屋が見つかりません。");
    setConnectionStatus("通信：部屋が見つかりません");
    return;
  }

  if (room.status !== "waiting") {
    alert("この部屋はすでにゲーム開始済みです。");
    setConnectionStatus("通信：参加不可");
    return;
  }

  const { data: players, error: playersError } = await supabaseClient
    .from("room_players")
    .select("*")
    .eq("room_id", room.id)
    .order("seat_no", { ascending: true });

  if (playersError) {
    console.error(playersError);
    alert("参加者情報の取得に失敗しました。");
    return;
  }

  const existing = players.find(player => player.client_id === clientId);

  if (existing) {
    currentRoom = room;
    currentRoomPlayer = existing;

    await subscribeToRoom(room.id);
    await loadRoomState(room.id);

    setConnectionStatus("通信：既存プレイヤーとして再参加しました");
    return;
  }

  const maxPlayers = room.settings?.maxPlayers || 5;

  if (players.length >= maxPlayers) {
    alert("この部屋は満員です。");
    setConnectionStatus("通信：満員");
    return;
  }

  const usedSeatNos = new Set(players.map(player => player.seat_no));
  let seatNo = 1;

  while (usedSeatNos.has(seatNo)) {
    seatNo++;
  }

  const color = getColorDefBySeatNo(seatNo);

  const { data: joinedPlayer, error: joinError } = await supabaseClient
    .from("room_players")
    .insert({
      room_id: room.id,
      seat_no: seatNo,
      name: playerName,
      color: color.id,
      is_host: false,
      client_id: clientId,
      connected: true
    })
    .select()
    .single();

  if (joinError) {
    console.error(joinError);
    alert("部屋への参加に失敗しました。");
    setConnectionStatus("通信：参加失敗");
    return;
  }

  currentRoom = room;
  currentRoomPlayer = joinedPlayer;

  await subscribeToRoom(room.id);
  await loadRoomState(room.id);

  setConnectionStatus("通信：部屋に参加しました");
}

async function subscribeToRoom(roomId) {
  if (!supabaseClient) return;

  if (roomRealtimeChannel) {
    await supabaseClient.removeChannel(roomRealtimeChannel);
    roomRealtimeChannel = null;
  }

  roomRealtimeChannel = supabaseClient
    .channel(`room_${roomId}`)
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "rooms",
        filter: `id=eq.${roomId}`
      },
      async () => {
        await loadRoomState(roomId);
      }
    )
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "room_players",
        filter: `room_id=eq.${roomId}`
      },
      async () => {
        await loadRoomState(roomId);
      }
    )
    .subscribe();
}

async function loadRoomState(roomId) {
  if (!supabaseClient) return;

  const { data: room, error: roomError } = await supabaseClient
    .from("rooms")
    .select("*")
    .eq("id", roomId)
    .single();

  if (roomError) {
    console.error(roomError);
    setConnectionStatus("通信：部屋情報取得失敗");
    return;
  }

  const { data: players, error: playersError } = await supabaseClient
    .from("room_players")
    .select("*")
    .eq("room_id", roomId)
    .order("seat_no", { ascending: true });

  if (playersError) {
    console.error(playersError);
    setConnectionStatus("通信：参加者取得失敗");
    return;
  }

  currentRoom = room;
  currentRoomPlayers = players;
  currentGameState = room.game_state || null;

  const clientId = getClientId();
  currentRoomPlayer = players.find(player => player.client_id === clientId) || currentRoomPlayer;

  renderWaitingRoom();
  renderBoard();
  renderGameView();

  if (room.status === "playing" && room.game_state) {
    document.getElementById("statePreview").textContent = JSON.stringify(room.game_state, null, 2);
    setConnectionStatus("通信：ゲーム中");
  }
}

function renderWaitingRoom() {
  const roomInfo = document.getElementById("roomInfo");
  const roomCodeDisplay = document.getElementById("roomCodeDisplay");
  const waitingPlayers = document.getElementById("waitingPlayers");
  const startButton = document.getElementById("startGameButton");

  if (!currentRoom) {
    roomInfo.style.display = "none";
    return;
  }

  roomInfo.style.display = "block";
  roomCodeDisplay.textContent = `部屋コード：${currentRoom.room_code}`;

  waitingPlayers.innerHTML = "";

  const maxPlayers = currentRoom.settings?.maxPlayers || 5;

  for (let i = 1; i <= maxPlayers; i++) {
    const player = currentRoomPlayers.find(p => p.seat_no === i);
    const color = getColorDefBySeatNo(i);

    const row = document.createElement("div");
    row.className = "waiting-player";

    if (player) {
      row.innerHTML = `
        <span>
          <span class="color-chip" style="background:${color.value}"></span>
          ${player.name}
          ${player.is_host ? '<span class="status-pill">ホスト</span>' : ""}
        </span>
        <span class="small-text">参加中</span>
      `;
    } else {
      row.innerHTML = `
        <span>
          <span class="color-chip" style="background:${color.value}"></span>
          空席
        </span>
        <span class="small-text">待機中</span>
      `;
    }

    waitingPlayers.appendChild(row);
  }

  const isHost = currentRoomPlayer && currentRoomPlayer.id === currentRoom.host_player_id;
  const isFull = currentRoomPlayers.length === maxPlayers;
  const isWaiting = currentRoom.status === "waiting";

  startButton.disabled = !(isHost && isFull && isWaiting);
}

function createGameStateFromRoom(room, players) {
  const gamePlayers = players
    .sort((a, b) => a.seat_no - b.seat_no)
    .map(player => {
      const colorDef = getColorDefById(player.color);

      return new Player({
        id: player.id,
        name: player.name,
        color: colorDef.id,
        colorValue: colorDef.value,
        clientId: player.client_id,
        money: INITIAL_MONEY,
        position: 0,
        cards: [],
        fame: 0,
        skipTurn: false,
        bankrupt: false,
        loanPrincipal: 0,
        loanDue: 0,
        settlementCount: 0
      }).toJSON();
    });

  const lands = createInitialLands();
  const areas = createInitialAreas(gamePlayers);

  return {
    gameTitle: GAME_TITLE,
    status: "playing",
    phase: "before_roll",
    roomCode: room.room_code,
    settings: {
      targetAssets: room.settings?.targetAssets || 50000,
      maxPlayers: room.settings?.maxPlayers || gamePlayers.length,
      createdAt: new Date().toISOString()
    },
    turnCount: 1,
    currentPlayerIndex: 0,
    players: gamePlayers,
    lands,
    areas,
    spies: [],
    pendingAction: null,
    actionQueue: [],
    lastRoll: null,
    winnerId: null,
    logs: [
      "ゲームを開始しました。"
    ]
  };
}

async function startOnlineGame() {
  if (!currentRoom || !currentRoomPlayer) {
    alert("部屋に参加していません。");
    return;
  }

  const isHost = currentRoomPlayer.id === currentRoom.host_player_id;

  if (!isHost) {
    alert("ゲーム開始はホストのみ実行できます。");
    return;
  }

  const maxPlayers = currentRoom.settings?.maxPlayers || 5;

  if (currentRoomPlayers.length !== maxPlayers) {
    alert("設定した人数がそろってから開始してください。");
    return;
  }

  const gameState = createGameStateFromRoom(currentRoom, currentRoomPlayers);

  const { data, error } = await supabaseClient
    .from("rooms")
    .update({
      status: "playing",
      phase: "before_roll",
      current_player_index: 0,
      game_state: gameState,
      state_version: currentRoom.state_version + 1
    })
    .eq("id", currentRoom.id)
    .eq("state_version", currentRoom.state_version)
    .select()
    .single();

  if (error) {
    console.error(error);
    alert("ゲーム開始に失敗しました。もう一度お試しください。");
    return;
  }

  currentRoom = data;
currentGameState = data.game_state;

document.getElementById("statePreview").textContent = JSON.stringify(currentGameState, null, 2);

renderBoard();
renderGameView();

setConnectionStatus("通信：ゲームを開始しました");

/************************************************************
 * ゲーム開始後の画面・ルーレット・ターン進行
 ************************************************************/

function cloneState(state) {
  return JSON.parse(JSON.stringify(state));
}
    
function findPlayer(state, playerId) {
  return state.players.find(player => player.id === playerId) || null;
}

function findLand(state, landId) {
  return state.lands.find(land => land.id === landId) || null;
}

function findArea(state, areaId) {
  return state.areas.find(area => area.id === areaId) || null;
}

function getSquareById(squareId) {
  return MAP_SQUARES.find(square => square.id === squareId) || null;
}

function getLandDefById(landId) {
  return LAND_DEFS[landId] || null;
}

function isAreaMonopoly(state, playerId, areaId) {
  const areaLands = state.lands.filter(land => land.areaId === areaId);

  if (areaLands.length === 0) {
    return false;
  }

  return areaLands.every(land => land.ownerId === playerId);
}

function changeAreaStockPrice(state, areaId, delta) {
  const area = findArea(state, areaId);
  if (!area) return;

  const floor = getStockFloor(area.initialStockPrice);
  area.stockPrice = Math.max(floor, area.stockPrice + delta);
}

function getTotalStockCount(state, playerId) {
  return state.areas.reduce((sum, area) => {
    return sum + (area.stocks[playerId] || 0);
  }, 0);
}

function calculateDividend(state, playerId) {
  return getTotalStockCount(state, playerId) * 1;
}

function calculateSettlementIncome(state, playerId) {
  const player = findPlayer(state, playerId);
  if (!player) return 200;

  const totalAssets = calculateTotalAssets(state, playerId);
  const settlementBonus = player.settlementCount * 100;

  return Math.max(200, Math.floor(200 + totalAssets * 0.05 + settlementBonus));
}

function hasReachedTargetAssets(state, playerId) {
  const targetAssets = state.settings?.targetAssets || 50000;
  return calculateTotalAssets(state, playerId) >= targetAssets;
}

function getAreaLandOwnershipText(state, areaId) {
  const lands = state.lands.filter(land => land.areaId === areaId);

  return lands.map(land => {
    if (!land.ownerId) {
      return `${land.name}:未所有`;
    }

    const owner = findPlayer(state, land.ownerId);
    return `${land.name}:${owner ? owner.name : "不明"}`;
  }).join(" / ");
}

function getStockBuyPrice(area, amount) {
  return area.stockPrice * amount;
}

function getStockSellPrice(area, amount) {
  return area.stockPrice * amount;
}

function decreaseAreaStockPriceBySell(area, amount) {
  const decrease = Math.floor(amount / 10);
  const floor = getStockFloor(area.initialStockPrice);
  area.stockPrice = Math.max(floor, area.stockPrice - decrease);
}

function increaseAreaStockPriceByBuy(area) {
  const areaDef = getAreaById(area.id);
  const increase = areaDef && areaDef.growthType === "fast" ? 2 : 1;
  area.stockPrice += increase;
  return increase;
}

function getOwnerName(state, ownerId) {
  const owner = findPlayer(state, ownerId);
  return owner ? owner.name : "不明";
}

function getLandDisplayName(land) {
  return land ? land.name : "土地";
}

function getAdditionalInvestmentLimit(state, playerId, land) {
  const limit = calculateInvestmentLimit(state, playerId, land);
  return Math.max(0, limit - land.investment);
}

function normalizeInvestmentAmount(value) {
  const raw = Number(value);

  if (!Number.isFinite(raw)) {
    return 0;
  }

  return Math.floor(raw / 100) * 100;
}

function getCurrentPlayer(state) {
  if (!state || !state.players || state.players.length === 0) return null;
  return state.players[state.currentPlayerIndex] || null;
}

function isMyTurn() {
  if (!currentGameState || !currentRoomPlayer) return false;

  const currentPlayer = getCurrentPlayer(currentGameState);
  if (!currentPlayer) return false;

  return currentPlayer.id === currentRoomPlayer.id;
}

function getSquareName(position) {
  const square = MAP_SQUARES.find(item => item.id === position);
  return square ? square.name : `No.${position}`;
}

function getNextActivePlayerIndex(state) {
  const total = state.players.length;
  let index = state.currentPlayerIndex;

  for (let i = 0; i < total; i++) {
    index = (index + 1) % total;
    const player = state.players[index];

    if (player && !player.bankrupt) {
      return index;
    }
  }

  return state.currentPlayerIndex;
}

function renderGameView() {
  const panel = document.getElementById("gamePlayPanel");

  if (!panel) return;

  if (!currentGameState || currentGameState.status !== "playing") {
    panel.style.display = "none";
    return;
  }

  panel.style.display = "block";

  renderCurrentPlayerBox();
  renderRollResult();
  renderPendingActionPanel();
  renderPlayerSummaryList();
  renderActionButtons();
  renderLogPanel();
}

function renderCurrentPlayerBox() {
  const box = document.getElementById("currentPlayerBox");
  if (!box || !currentGameState) return;

  const player = getCurrentPlayer(currentGameState);
  if (!player) {
    box.textContent = "現在プレイヤー情報なし";
    return;
  }

  const totalAssets = calculateTotalAssets(currentGameState, player.id);
  const squareName = getSquareName(player.position);
  const myTurnText = isMyTurn() ? "あなたの手番です" : "他のプレイヤーの手番です";

  box.innerHTML = `

    </div>

      ターン数：${currentGameState.turnCount}<br>
      現在地：${squareName}<br>
      現金：${formatMoney(player.money)}<br>
      総資産：${formatMoney(totalAssets)}<br>
      状態：${myTurnText}
    </div>
  `;
}

function renderRollResult() {
  const el = document.getElementById("rollResult");
  if (!el || !currentGameState) return;

  if (!currentGameState.lastRoll) {
    el.textContent = "出目：-";
    return;
  }

  const roll = currentGameState.lastRoll;
  const player = currentGameState.players.find(item => item.id === roll.playerId);
  const name = player ? player.name : "プレイヤー";

  el.textContent = `${name} の出目：${roll.value}`;
}

function renderPlayerSummaryList() {
  const container = document.getElementById("playerSummaryList");
  if (!container || !currentGameState) return;

  container.innerHTML = "";

  for (let i = 0; i < currentGameState.players.length; i++) {
    const player = currentGameState.players[i];
    const totalAssets = calculateTotalAssets(currentGameState, player.id);
    const landAssets = calculateLandAssets(currentGameState, player.id);
    const stockAssets = calculateStockAssets(currentGameState, player.id);
    const squareName = getSquareName(player.position);

    const card = document.createElement("div");
    card.className = "player-summary-card";

    if (i === currentGameState.currentPlayerIndex) {
      card.classList.add("current-turn-card");
    }

    card.innerHTML = `
      <div class="player-summary-head">
        <span>
          <span class="color-chip" style="background:${player.colorValue}"></span>
          ${player.name}
        </span>
        <span>${i === currentGameState.currentPlayerIndex ? "手番" : ""}</span>
      </div>
      <div class="player-summary-body">
        現在地：${squareName}<br>
        現金：${formatMoney(player.money)}<br>
        土地資産：${formatMoney(landAssets)}<br>
        株式資産：${formatMoney(stockAssets)}<br>
        返済予定額：${formatMoney(player.loanDue || 0)}<br>
        総資産：${formatMoney(totalAssets)}<br>
        手札：${player.cards.length}枚
      </div>
    `;

    container.appendChild(card);
  }
}

function renderActionButtons() {
  const rollButton = document.getElementById("rollButton");
  const endTurnButton = document.getElementById("endTurnButton");

  if (!rollButton || !endTurnButton || !currentGameState) return;

  const canOperate = isMyTurn();
  const phase = currentGameState.phase;

  rollButton.disabled = !(canOperate && phase === "before_roll");
  endTurnButton.disabled = !(canOperate && phase === "after_roll");
}

 function renderPendingActionPanel() {
  const panel = document.getElementById("pendingActionPanel");
  if (!panel || !currentGameState) return;

  const action = currentGameState.pendingAction;

  if (!action) {
    panel.classList.add("hidden");
    panel.innerHTML = "";
    return;
  }

  panel.classList.remove("hidden");

  if (action.type === "buy_land") {
    renderBuyLandAction(panel, action);
    return;
  }

  if (action.type === "invest_land") {
    renderInvestLandAction(panel, action);
    return;
  }

  if (action.type === "stock_trade") {
  renderStockTradeAction(panel, action);
  return;
}
   
  panel.innerHTML = `
    <div class="pending-action-title">処理待ち</div>
    <div class="pending-action-body">未対応の処理があります。</div>
  `;
}

function buildMoveActionQueue(passedSquares, endPosition) {
  const queue = [];

  for (const squareId of passedSquares) {
    const square = getSquareById(squareId);
    if (!square) continue;

    if (square.type === "settlement") {
      queue.push({
        type: "settlement",
        squareId,
        sourceName: square.name
      });
    }

    if (square.type === "stock_exchange") {
      queue.push({
        type: "stock_trade",
        squareId,
        sourceName: square.name
      });
    }
  }

  queue.push({
    type: "arrival",
    squareId: endPosition
  });

  return queue;
}

function processNextQueuedAction(nextState) {
  if (!nextState.actionQueue) {
    nextState.actionQueue = [];
  }

  if (nextState.status === "game_over") {
    nextState.pendingAction = null;
    nextState.phase = "game_over";
    nextState.actionQueue = [];
    return;
  }

  if (nextState.actionQueue.length === 0) {
    nextState.pendingAction = null;
    nextState.phase = "after_roll";
    return;
  }

  const action = nextState.actionQueue.shift();
  const player = getCurrentPlayer(nextState);

  if (!player) {
    nextState.pendingAction = null;
    nextState.phase = "after_roll";
    return;
  }

  if (action.type === "settlement") {
    executeSettlement(nextState, player, action.sourceName);

    if (nextState.status === "game_over") {
      return;
    }

    nextState.pendingAction = {
      type: "stock_trade",
      playerId: player.id,
      source: "settlement",
      sourceName: "決算マス"
    };
    nextState.phase = "stock_decision";
    return;
  }

  if (action.type === "stock_trade") {
    nextState.pendingAction = {
      type: "stock_trade",
      playerId: player.id,
      source: "stock_exchange",
      sourceName: action.sourceName || "証券取引所"
    };
    nextState.phase = "stock_decision";
    return;
  }

  if (action.type === "arrival") {
    processArrivalSquare(nextState, player);
    return;
  }

  processNextQueuedAction(nextState);
}

function executeSettlement(nextState, player, sourceName) {
  const income = calculateSettlementIncome(nextState, player.id);
  const dividend = calculateDividend(nextState, player.id);

  player.money += income;
  player.money += dividend;
  player.settlementCount += 1;

  nextState.logs.push(
    `${player.name} は ${sourceName || "決算マス"} を通過し、決算収入 ${formatMoney(income)} を受け取りました。`
  );

  if (dividend > 0) {
    nextState.logs.push(
      `${player.name} は株配当 ${formatMoney(dividend)} を受け取りました。`
    );
  }

  if (hasReachedTargetAssets(nextState, player.id)) {
    nextState.status = "game_over";
    nextState.phase = "game_over";
    nextState.winnerId = player.id;
    nextState.pendingAction = null;
    nextState.actionQueue = [];
    nextState.logs.push(
      `${player.name} が目標資産に到達し、決算マス通過により勝利しました。`
    );
  }
}
    
function processArrivalSquare(nextState, player) {
  const square = getSquareById(player.position);

  if (!square) {
    nextState.phase = "after_roll";
    nextState.pendingAction = null;
    return;
  }

  if (square.type === "land") {
    processArrivalLand(nextState, player, square);
    return;
  }

  if (square.type === "settlement" || square.type === "stock_exchange") {
    nextState.phase = "after_roll";
    nextState.pendingAction = null;
    return;
  }

  nextState.phase = "after_roll";
  nextState.pendingAction = null;
  nextState.logs.push(`${player.name} は ${square.name} に到着しました。`);
  nextState.logs.push(`${square.name} の効果は後続実装で追加します。`);
}
    
function processArrivalLand(nextState, player, square) {
  const land = findLand(nextState, square.landId);

  if (!land) {
    nextState.phase = "after_roll";
    nextState.pendingAction = null;
    return;
  }

  if (!land.ownerId) {
    nextState.phase = "land_decision";
    nextState.pendingAction = {
      type: "buy_land",
      playerId: player.id,
      landId: land.id
    };

    nextState.logs.push(`${player.name} は未所有の土地 ${land.name} に到着しました。`);
    return;
  }

  if (land.ownerId === player.id) {
    nextState.phase = "invest_decision";
    nextState.pendingAction = {
      type: "invest_land",
      playerId: player.id,
      landId: land.id
    };

    nextState.logs.push(`${player.name} は自分の土地 ${land.name} に到着しました。`);
    return;
  }

  payLandToll(nextState, player, land);

  nextState.phase = "after_roll";
  nextState.pendingAction = null;
}

function payLandToll(nextState, visitor, land) {
  const owner = findPlayer(nextState, land.ownerId);

  if (!owner || owner.bankrupt) {
    nextState.logs.push(`${visitor.name} は ${land.name} に到着しましたが、所有者がいないため通行料は発生しません。`);
    return;
  }

  const monopoly = isAreaMonopoly(nextState, owner.id, land.areaId);
  const toll = calculateCurrentToll(land, monopoly);

  visitor.money -= toll;
  owner.money += toll;

  nextState.logs.push(
    `${visitor.name} は ${owner.name} の土地 ${land.name} に止まり、通行料 ${formatMoney(toll)} を支払いました。`
  );

  if (monopoly) {
    nextState.logs.push(`${land.name} は独占エリアの土地のため、通行料が2倍になっています。`);
  }

  if (visitor.money < 0) {
    nextState.logs.push(`${visitor.name} の現金が不足しています。資産整理・破産処理は後続実装で追加します。`);
  }
}

async function resolveBuyLandOnline(shouldBuy) {
  if (!currentGameState) return;

  if (!isMyTurn()) {
    alert("現在はあなたの手番ではありません。");
    return;
  }

  const action = currentGameState.pendingAction;

  if (!action || action.type !== "buy_land") {
    alert("土地購入の処理待ちではありません。");
    return;
  }

  const nextState = cloneState(currentGameState);
  const player = findPlayer(nextState, action.playerId);
  const land = findLand(nextState, action.landId);

  if (!player || !land) {
    alert("プレイヤーまたは土地情報が見つかりません。");
    return;
  }

  if (shouldBuy) {
    if (land.ownerId) {
      nextState.logs.push(`${land.name} はすでに所有されています。`);
    } else if (player.money < land.price) {
      nextState.logs.push(`${player.name} は現金不足のため ${land.name} を購入できませんでした。`);
    } else {
      player.money -= land.price;
      land.ownerId = player.id;
      land.value = land.price;
      land.investment = land.investment || 0;

      changeAreaStockPrice(nextState, land.areaId, 1);

      nextState.logs.push(
        `${player.name} は ${land.name} を ${formatMoney(land.price)} で購入しました。`
      );
      nextState.logs.push(`${land.name} のエリア株価が ${formatMoney(1)} 上がりました。`);
    }
  } else {
    nextState.logs.push(`${player.name} は ${land.name} を購入しませんでした。`);
  }

    nextState.pendingAction = null;
    processNextQueuedAction(nextState);

    await saveGameStateOnline(nextState);
}

async function resolveInvestLandOnline(rawAmount) {
  if (!currentGameState) return;

  if (!isMyTurn()) {
    alert("現在はあなたの手番ではありません。");
    return;
  }

  const action = currentGameState.pendingAction;

  if (!action || action.type !== "invest_land") {
    alert("増資の処理待ちではありません。");
    return;
  }

  const amount = normalizeInvestmentAmount(rawAmount);

  if (amount <= 0) {
    alert("増資額は100万円以上、100万円単位で入力してください。");
    return;
  }

  const nextState = cloneState(currentGameState);
  const player = findPlayer(nextState, action.playerId);
  const land = findLand(nextState, action.landId);

  if (!player || !land) {
    alert("プレイヤーまたは土地情報が見つかりません。");
    return;
  }

  if (land.ownerId !== player.id) {
    alert("この土地は自分の土地ではありません。");
    return;
  }

  const remaining = getAdditionalInvestmentLimit(nextState, player.id, land);

  if (amount > remaining) {
    alert(`増資上限を超えています。追加可能額は ${formatMoney(remaining)} です。`);
    return;
  }

  if (amount > player.money) {
    alert("現金が不足しています。");
    return;
  }

  player.money -= amount;
  land.investment += amount;
  land.value += amount;

  const stockIncrease = Math.floor(amount / 100);
  changeAreaStockPrice(nextState, land.areaId, stockIncrease);

  nextState.logs.push(
    `${player.name} は ${land.name} に ${formatMoney(amount)} 増資しました。`
  );
  nextState.logs.push(
    `${land.name} の土地価値が ${formatMoney(land.value)} になりました。`
  );
  nextState.logs.push(
    `${land.name} のエリア株価が ${formatMoney(stockIncrease)} 上がりました。`
  );

  nextState.pendingAction = null;
  processNextQueuedAction(nextState);

  await saveGameStateOnline(nextState);
}

async function resolveStockTradeOnline(mode) {
  if (!currentGameState) return;

  if (!isMyTurn()) {
    alert("現在はあなたの手番ではありません。");
    return;
  }

  const action = currentGameState.pendingAction;

  if (!action || action.type !== "stock_trade") {
    alert("株取引の処理待ちではありません。");
    return;
  }

  const nextState = cloneState(currentGameState);
  const player = findPlayer(nextState, action.playerId);

  if (!player) {
    alert("プレイヤー情報が見つかりません。");
    return;
  }

  if (mode === "skip") {
    nextState.logs.push(`${player.name} は株取引を行いませんでした。`);
    nextState.pendingAction = null;
    processNextQueuedAction(nextState);
    await saveGameStateOnline(nextState);
    return;
  }

  const areaSelect = document.getElementById("stockAreaSelect");
  const amountInput = document.getElementById("stockAmountInput");

  const areaId = areaSelect ? areaSelect.value : "";
  const amount = Number(amountInput ? amountInput.value : 0);

  if (!areaId) {
    alert("エリアを選択してください。");
    return;
  }

  if (!Number.isFinite(amount) || amount <= 0 || amount % 10 !== 0) {
    alert("株数は10株単位で入力してください。");
    return;
  }

  const area = findArea(nextState, areaId);

  if (!area) {
    alert("エリア情報が見つかりません。");
    return;
  }

  if (!area.stocks[player.id]) {
    area.stocks[player.id] = 0;
  }

  if (mode === "buy") {
    const cost = getStockBuyPrice(area, amount);

    if (player.money < cost) {
      alert(`現金が不足しています。必要額は ${formatMoney(cost)} です。`);
      return;
    }

    player.money -= cost;
    area.stocks[player.id] += amount;

    const increase = increaseAreaStockPriceByBuy(area);

    nextState.logs.push(
      `${player.name} は ${area.name} の株を ${amount}株、${formatMoney(cost)} で購入しました。`
    );
    nextState.logs.push(
      `${area.name} の株価が ${formatMoney(increase)} 上がり、${formatMoney(area.stockPrice)} になりました。`
    );
  }

  if (mode === "sell") {
    const owned = area.stocks[player.id] || 0;

    if (owned < amount) {
      alert(`保有株数が不足しています。現在の保有株は ${owned}株です。`);
      return;
    }

    const revenue = getStockSellPrice(area, amount);

    area.stocks[player.id] -= amount;
    player.money += revenue;

    decreaseAreaStockPriceBySell(area, amount);

    nextState.logs.push(
      `${player.name} は ${area.name} の株を ${amount}株売却し、${formatMoney(revenue)} を得ました。`
    );
    nextState.logs.push(
      `${area.name} の株価が ${formatMoney(area.stockPrice)} になりました。`
    );
  }

  nextState.pendingAction = null;
  processNextQueuedAction(nextState);

  await saveGameStateOnline(nextState);
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

async function saveGameStateOnline(nextState, options = {}) {
  if (!supabaseClient || !currentRoom) {
    alert("通信部屋に接続していません。");
    return false;
  }

  const nextVersion = currentRoom.state_version + 1;

  const updatePayload = {
    game_state: nextState,
    state_version: nextVersion,
    current_player_index: nextState.currentPlayerIndex,
    phase: nextState.phase,
    status: nextState.status || "playing",
    ...options
  };

  const { data, error } = await supabaseClient
    .from("rooms")
    .update(updatePayload)
    .eq("id", currentRoom.id)
    .eq("state_version", currentRoom.state_version)
    .select()
    .single();

  if (error) {
    console.error(error);
    alert("ゲーム状態の更新に失敗しました。画面を最新状態に更新します。");
    await loadRoomState(currentRoom.id);
    return false;
  }

  currentRoom = data;
  currentGameState = data.game_state;

  renderBoard();
  renderGameView();

  return true;
}

async function rollDiceOnline() {
  if (!currentGameState) return;

  if (!isMyTurn()) {
    alert("現在はあなたの手番ではありません。");
    return;
  }

  if (currentGameState.phase !== "before_roll") {
    alert("今はルーレットを回せません。");
    return;
  }

  const nextState = cloneState(currentGameState);
  const player = getCurrentPlayer(nextState);

  if (!player) return;

  if (player.skipTurn) {
    player.skipTurn = false;
    nextState.logs.push(`${player.name} は1回休みでした。`);
    nextState.phase = "after_roll";

    await saveGameStateOnline(nextState);
    return;
  }

  const roll = Math.floor(Math.random() * 6) + 1;
  const startPosition = player.position;
  const passedSquares = getPassedSquares(startPosition, roll);
  const endPosition = passedSquares[passedSquares.length - 1];

  player.position = endPosition;

  nextState.lastRoll = {
    playerId: player.id,
    value: roll,
    startPosition,
    endPosition,
    passedSquares,
    createdAt: new Date().toISOString()
  };

  nextState.logs.push(
    `${player.name} が ${roll} を出しました。${getSquareName(startPosition)} から ${getSquareName(endPosition)} へ移動しました。`
  );

  processArrivalSquare(nextState, player);

  await saveGameStateOnline(nextState);
}

async function endTurnOnline() {
  if (!currentGameState) return;

  if (!isMyTurn()) {
    alert("現在はあなたの手番ではありません。");
    return;
  }

  if (currentGameState.phase !== "after_roll") {
    alert("まだターン終了できません。");
    return;
  }

  const nextState = cloneState(currentGameState);
  const currentPlayer = getCurrentPlayer(nextState);

  const nextIndex = getNextActivePlayerIndex(nextState);
  const nextPlayer = nextState.players[nextIndex];

  nextState.currentPlayerIndex = nextIndex;
  nextState.turnCount += 1;
  nextState.phase = "before_roll";
  nextState.lastRoll = null;

  nextState.logs.push(`${currentPlayer.name} のターンが終了しました。`);
  nextState.logs.push(`${nextPlayer.name} のターンです。`);

  await saveGameStateOnline(nextState);
}

  document.getElementById("playerCount").addEventListener("change", renderPlayerForms);

  document.getElementById("joinRoomButton").addEventListener("click", joinRoomOnline);
  document.getElementById("startGameButton").addEventListener("click", startOnlineGame);

  document.getElementById("rollButton").addEventListener("click", rollDiceOnline);
  document.getElementById("endTurnButton").addEventListener("click", endTurnOnline);

  renderPlayerForms();
  renderBoard();
  renderAreas();
  setupSupabaseClient();
}

init();
