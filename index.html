<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>山手線ゲーム</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #eef2f7;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #2563eb;
      --danger: #dc2626;
      --good: #16a34a;
      --warn: #d97706;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

html,
body {
  width: 100%;
  height: 100%;
  height: 100dvh;
  margin: 0;
  overflow: hidden;
  color: var(--text);
  background: var(--bg);
  font-family:
    system-ui,
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;
}

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 800;
      color: #ffffff;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.22);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      box-shadow: none;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 10px;
      background: #ffffff;
      color: var(--text);
    }

    label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .hidden {
      display: none !important;
    }

    .small-text {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

.app {
  width: 100vw;
  height: 100vh;
  height: 100dvh;
  max-width: none;
  margin: 0;
  padding: 0;
  overflow: hidden;
}

    .screen {
      width: 100%;
      height: 100%;
    }

    .unsupported-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(17, 24, 39, 0.84);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .unsupported-card {
      width: min(520px, 100%);
      background: #ffffff;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
      text-align: center;
    }

    .unsupported-title {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .unsupported-text {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

.pre-game-screen {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 18px;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  background:
    radial-gradient(circle at top, rgba(219, 234, 254, 0.95), transparent 42%),
    linear-gradient(135deg, #f8fafc, #e0e7ff);
}

.setup-shell {
  width: min(760px, calc(100vw - 36px));
  min-height: calc(100vh - 36px);
  display: flex;
  justify-content: center;
  padding-bottom: 24px;
}

    .panel {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

.setup-panel {
  width: 100%;
  height: fit-content;
  overflow: visible;
}

    .panel-title {
      margin-bottom: 10px;
      padding-bottom: 7px;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
      font-weight: 900;
    }

    .form-row {
      margin-bottom: 10px;
    }

    .player-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .player-form {
      display: grid;
      grid-template-columns: 1fr 90px;
      gap: 6px;
      align-items: center;
    }

    .setup-divider {
      height: 14px;
    }

    .setup-status {
      margin-top: 10px;
    }

    .room-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .room-actions.two {
      grid-template-columns: 1fr 1fr;
    }

    .room-info-block {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #f8fafc;
    }

    .room-code-box {
      margin-bottom: 8px;
      padding: 10px;
      border-radius: 12px;
      background: #111827;
      color: #ffffff;
      text-align: center;
      font-size: 28px;
      font-weight: 950;
      letter-spacing: 0.18em;
    }

    .waiting-list {
      display: grid;
      gap: 5px;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 800;
    }

    .data-preview {
      max-height: 140px;
      overflow: auto;
      padding: 10px;
      border-radius: 10px;
      background: #111827;
      color: #d1d5db;
      font-size: 11px;
      white-space: pre-wrap;
    }

    .game-screen {
      overflow: hidden;
      background: var(--bg);
    }

.game-stage {
  position: relative;
  width: 100vw;
  height: 100vh;
  height: 100dvh;
  display: block;
  padding: 0;
  overflow: hidden;
  background:
    radial-gradient(circle at top, rgba(219, 234, 254, 0.85), transparent 38%),
    linear-gradient(135deg, #f8fafc, #eef2f7);
}

    .game-map-panel {
      position: absolute;
      inset: 58px 18px 78px 18px;
      min-width: 0;
      height: auto;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 12px;
    }

    .board-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .board {
      width: 100%;
      height: 100%;
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(15, minmax(0, 1fr));
      grid-template-rows: repeat(12, minmax(0, 1fr));
      gap: 5px;
      position: relative;
      padding: 0;
    }

    .board::before {
      content: "";
      grid-column: 2 / 15;
      grid-row: 2 / 12;
      border-radius: 28px;
      border: 2px dashed rgba(156, 163, 175, 0.35);
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.95), rgba(239, 246, 255, 0.72)),
        linear-gradient(135deg, rgba(219, 234, 254, 0.45), rgba(240, 253, 250, 0.35));
      z-index: 0;
    }

    .square {
      min-height: 0;
      height: auto;
      padding: 4px;
      border-radius: 10px;
      background: #ffffff;
      border: 2px solid var(--border);
      display: grid;
      place-items: center;
      position: relative;
      z-index: 2;
      overflow: hidden;
      transition:
        transform 0.15s ease,
        box-shadow 0.15s ease,
        outline 0.15s ease,
        background-color 0.15s ease;
    }

    .square:hover {
      transform: translateY(-1px);
      box-shadow: 0 5px 14px rgba(15, 23, 42, 0.16);
    }

    .board-square-inner {
      width: 100%;
      height: 100%;
      position: relative;
      display: grid;
      place-items: center;
    }

    .board-station-name {
      position: absolute;
      left: 4px;
      top: 3px;
      max-width: calc(100% - 18px);
      color: rgba(31, 41, 55, 0.52);
      font-size: 9px;
      line-height: 1.05;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .board-star {
      position: absolute;
      right: 3px;
      top: 1px;
      color: #f59e0b;
      font-size: 12px;
      line-height: 1;
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.9);
    }

    .board-main-label {
      color: #111827;
      font-size: clamp(10px, 1.15vw, 17px);
      font-weight: 950;
      line-height: 1;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .board-main-label.special {
      font-size: clamp(9px, 0.95vw, 14px);
      letter-spacing: 0.06em;
    }

    .area-bottom-band {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 5px;
    }

    .owner-mark {
      position: absolute;
      left: 4px;
      bottom: 6px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid #ffffff;
      box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.28);
    }

    .square.current-square {
      outline: 3px solid var(--accent);
      outline-offset: -3px;
      box-shadow:
        0 0 0 4px rgba(37, 99, 235, 0.18),
        0 10px 24px rgba(37, 99, 235, 0.22);
      animation: currentSquarePulse 1.7s ease-in-out infinite;
    }

    @keyframes currentSquarePulse {
      0%, 100% {
        transform: scale(1);
        filter: brightness(1);
      }

      50% {
        transform: scale(1.035);
        filter: brightness(1.08);
      }
    }

    .piece-wrap {
      position: absolute;
      right: 3px;
      bottom: 7px;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 2px;
      max-width: calc(100% - 16px);
      min-height: 12px;
      z-index: 5;
      pointer-events: none;
    }

    .piece {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid #ffffff;
      box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.35);
    }

    .spy-piece {
      border-radius: 4px;
      background: #111827 !important;
      border: 2px solid #facc15;
    }

    .square.settlement {
      background: linear-gradient(135deg, #fff7ed, #fed7aa);
      border-color: #fb923c;
    }

    .square.card {
      background: linear-gradient(135deg, #f5f3ff, #ddd6fe);
      border-color: #8b5cf6;
    }

    .square.airport {
      background: linear-gradient(135deg, #f0f9ff, #bae6fd);
      border-color: #38bdf8;
    }

    .square.hotel {
      background: linear-gradient(135deg, #fdf2f8, #fbcfe8);
      border-color: #f472b6;
    }

    .square.bank {
      background: linear-gradient(135deg, #ecfdf5, #bbf7d0);
      border-color: #22c55e;
    }

    .square.contribution {
      background: linear-gradient(135deg, #ecfeff, #a5f3fc);
      border-color: #06b6d4;
    }

    .square.jail {
      background: linear-gradient(135deg, #f3f4f6, #d1d5db);
      border-color: #6b7280;
    }

    .square.spy {
      background: linear-gradient(135deg, #faf5ff, #e9d5ff);
      border-color: #a855f7;
    }

    .square.stock_exchange {
      background: linear-gradient(135deg, #eff6ff, #bfdbfe);
      border-color: #3b82f6;
    }

    .square.tax {
      background: linear-gradient(135deg, #fefce8, #fde68a);
      border-color: #eab308;
    }

    .square.event {
      background: linear-gradient(135deg, #fef2f2, #fecaca);
      border-color: #ef4444;
    }

    .top-turn-bar {
      position: absolute;
      top: 10px;
      left: 50%;
      z-index: 20;
      transform: translateX(-50%);
      min-width: 360px;
      max-width: min(680px, calc(100vw - 260px));
      padding: 8px 20px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(209, 213, 219, 0.9);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.14);
      text-align: center;
      backdrop-filter: blur(8px);
      animation: topTurnGlow 2.4s ease-in-out infinite;
    }

    .top-turn-player {
      font-size: 20px;
      font-weight: 900;
      line-height: 1.2;
    }

    .top-turn-guide {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    @keyframes topTurnGlow {
      0%, 100% {
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      }

      50% {
        box-shadow: 0 8px 28px rgba(37, 99, 235, 0.32);
      }
    }

    .bottom-log-bar {
      position: absolute;
      left: 50%;
      bottom: 10px;
      z-index: 20;
      transform: translateX(-50%);
      width: min(760px, calc(100vw - 260px));
      height: 58px;
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 8px;
      align-items: center;
      padding: 8px 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(209, 213, 219, 0.9);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.13);
      backdrop-filter: blur(8px);
    }

    .bottom-log-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-align: center;
    }

    .log-panel {
      max-height: 42px;
      overflow: hidden;
      font-size: 11px;
      line-height: 1.35;
    }

    .log-line {
      padding: 0;
      border-bottom: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .map-player-assets {
      position: absolute;
      z-index: 12;
      left: 50%;
      top: 50%;
      width: min(390px, 42vw);
      transform: translate(-50%, -50%);
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      pointer-events: none;
    }

    .map-player-card {
      position: relative;
      padding: 7px 12px;
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(209, 213, 219, 0.85);
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(6px);
    }

    .map-player-card.current {
      background: rgba(239, 246, 255, 0.88);
      border-color: rgba(37, 99, 235, 0.5);
    }

    .map-player-card.bankrupt {
      opacity: 0.45;
    }

    .map-player-card.bankrupt::after {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      top: 50%;
      border-top: 2px solid rgba(107, 114, 128, 0.9);
      transform: rotate(-5deg);
    }

    .map-player-name {
      font-size: 13px;
      font-weight: 900;
      line-height: 1.2;
    }

    .map-player-assets-line {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 3px;
      font-size: 11px;
      font-weight: 800;
    }

    .floating-button {
      position: absolute;
      z-index: 40;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      padding: 0;
      display: grid;
      place-items: center;
      color: #111827;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(209, 213, 219, 0.85);
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.22);
      font-size: 25px;
      backdrop-filter: blur(8px);
    }

    .control-floating-button {
      right: 18px;
      bottom: 18px;
    }

    .info-floating-button {
      left: 18px;
      bottom: 18px;
    }

    .control-floating-button.operation-ready {
      animation: operationButtonGlow 1.6s ease-in-out infinite;
    }

    @keyframes operationButtonGlow {
      0%, 100% {
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.22);
        transform: scale(1);
      }

      50% {
        box-shadow: 0 10px 34px rgba(37, 99, 235, 0.58);
        transform: scale(1.06);
      }
    }

    .overlay-backdrop {
      position: absolute;
      inset: 0;
      z-index: 30;
      background: rgba(15, 23, 42, 0.14);
    }

    .floating-overlay {
      position: absolute;
      z-index: 45;
      width: 340px;
      max-height: calc(100vh - 110px);
      overflow: hidden;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(209, 213, 219, 0.95);
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.25);
      backdrop-filter: blur(10px);
    }

    .control-overlay {
      right: 18px;
      bottom: 88px;
    }

    .info-overlay {
      left: 18px;
      bottom: 88px;
    }

    .square-info-overlay {
      left: 50%;
      top: 50%;
      bottom: auto;
      transform: translate(-50%, -50%);
      width: min(420px, calc(100vw - 120px));
    }

    .floating-overlay-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .floating-overlay-title {
      font-size: 15px;
      font-weight: 900;
    }

    .overlay-close-button {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      padding: 0;
      background: #e5e7eb;
      color: #111827;
      font-size: 18px;
      line-height: 1;
      box-shadow: none;
    }

    .self-info-content,
    .square-info-content {
      display: grid;
      gap: 7px;
      font-size: 13px;
    }

    .self-info-row,
    .square-info-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      border-bottom: 1px solid #f3f4f6;
      padding-bottom: 5px;
    }

    .self-info-row:last-child,
    .square-info-row:last-child {
      border-bottom: 0;
    }

    .self-info-label,
    .square-info-label {
      color: var(--muted);
      font-weight: 800;
    }

    .self-info-value,
    .square-info-value {
      font-weight: 900;
      text-align: right;
    }

    .square-info-name {
      margin-bottom: 2px;
      font-size: 20px;
      font-weight: 950;
      line-height: 1.2;
    }

    .square-info-sub {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .square-info-effect {
      padding: 10px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      font-weight: 700;
      line-height: 1.65;
    }

    .game-play-panel {
      display: block;
      height: auto;
      overflow: hidden;
    }

    .current-player-box,
    .result-panel,
    .roll-result,
    .pending-action-box,
    .card-use-panel {
      margin-bottom: 8px;
      padding: 9px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      font-size: 12px;
      line-height: 1.5;
    }

    .control-overlay .current-player-box {
      display: none;
    }

    .roll-result {
      text-align: center;
      font-weight: 900;
    }

    .action-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .pending-action-title {
      margin-bottom: 6px;
      font-weight: 900;
    }

    .pending-action-body {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      font-weight: 700;
    }

    .pending-action-buttons {
      display: grid;
      gap: 6px;
    }

    .stock-grid,
    .card-grid {
      display: grid;
      gap: 6px;
    }

    .mini-button {
      padding: 7px 8px;
      border-radius: 10px;
      font-size: 12px;
      box-shadow: none;
    }

    .danger-button {
      background: var(--danger);
    }

    .sub-button {
      background: #6b7280;
    }

    .animation-layer {
      position: absolute;
      inset: 0;
      z-index: 60;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .animation-layer.interactive {
      pointer-events: auto;
      cursor: pointer;
    }

    .animation-content {
      min-width: 240px;
      max-width: min(520px, calc(100vw - 120px));
      padding: 22px 28px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(209, 213, 219, 0.95);
      box-shadow: 0 24px 72px rgba(15, 23, 42, 0.28);
      text-align: center;
      backdrop-filter: blur(12px);
      animation: animationPop 0.32s ease-out;
    }

    .animation-content.dice-animation {
      animation: animationPop 0.25s ease-out, dicePanelShake 0.55s ease-in-out;
    }

    .animation-title {
      margin-bottom: 8px;
      font-size: 18px;
      font-weight: 950;
    }

    .animation-main {
      margin: 8px 0;
      font-size: 38px;
      font-weight: 950;
      line-height: 1.1;
    }

    .animation-sub {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.6;
    }

    .dice-face {
      width: 86px;
      height: 86px;
      margin: 8px auto;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #ffffff, #e5e7eb);
      border: 3px solid #111827;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.22);
      font-size: 42px;
      font-weight: 950;
    }

    .dice-face.rolling {
      animation: diceRollSpin 0.72s ease-in-out;
    }

    .dice-face.dice-big {
      font-size: 52px;
    }

    .card-flip-scene {
      width: 110px;
      height: 150px;
      margin: 10px auto;
      perspective: 900px;
    }

    .card-flip-card {
      width: 100%;
      height: 100%;
      position: relative;

      }

      40% {
        transform: translateY(3px) rotate(2deg);
      }

      60% {

      80% {

      }

      to {

        height: 120px;

      0%, 100% {

        const text = Math.abs(oku) >= 10
          ? String(Math.round(oku))
          : oku.toFixed(1).replace(".0", "");

        return `${text}億円`;
      }

      return `${amount}万円`;
    }

    function hexToRgba(hex, alpha) {
      if (!hex || typeof hex !== "string") {
        return `rgba(156, 163, 175, ${alpha})`;
      }

      const normalized = hex.replace("#", "");

      if (normalized.length !== 6) {
        return `rgba(156, 163, 175, ${alpha})`;
      }

      const r = parseInt(normalized.slice(0, 2), 16);
      const g = parseInt(normalized.slice(2, 4), 16);
      const b = parseInt(normalized.slice(4, 6), 16);

      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function getPassedSquareIdsByDirection(startPosition, steps, direction) {

      for (let i = 1; i <= steps; i++) {

        result.push(squareId);

    function normalizeGameStateShape(state) {
      if (!state) return;

      if (!Array.isArray(state.players)) state.players = [];
      if (!Array.isArray(state.lands)) state.lands = createLandState();
      if (!Array.isArray(state.areas)) state.areas = createAreaState();
      if (!Array.isArray(state.spies)) state.spies = [];
      if (!Array.isArray(state.logs)) state.logs = [];
      if (!("pendingAction" in state)) state.pendingAction = null;
      if (!("lastRoll" in state)) state.lastRoll = null;
      if (!("animationEvent" in state)) state.animationEvent = null;
      if (!("phase" in state)) state.phase = "before_roll";
      if (!("currentPlayerIndex" in state)) state.currentPlayerIndex = 0;
      if (!("status" in state)) state.status = "playing";

      state.players.forEach(normalizePlayerShape);
      state.lands.forEach(normalizeLandShape);
      state.areas.forEach(normalizeAreaShape);
      state.spies.forEach(normalizeSpyShape);
    }

    function normalizePlayerShape(player) {
      if (!player) return;

      if (!Array.isArray(player.cards)) player.cards = [];
      if (!player.stocks || typeof player.stocks !== "object") player.stocks = {};
      if (!("position" in player)) player.position = 0;
      if (!("money" in player)) player.money = INITIAL_MONEY;
      if (!("direction" in player)) player.direction = null;
      if (!("canChangeDirection" in player)) player.canChangeDirection = false;
      if (!("loanPrincipal" in player)) player.loanPrincipal = 0;
      if (!("loanDue" in player)) player.loanDue = 0;
      if (!("prestige" in player)) player.prestige = 0;
      if (!("bankrupt" in player)) player.bankrupt = false;

      player.cards = player.cards.map(card => ({
        ...card,
        uid: card.uid || createId("card")
      }));
    }

    function normalizeLandShape(land) {
      const def = LAND_DEFS[land.id];
      if (!def) return;

      if (!("ownerId" in land)) land.ownerId = null;
      if (!("currentValue" in land)) land.currentValue = def.price;
      if (!("investment" in land)) land.investment = 0;
      if (!("isPrime" in land)) land.isPrime = def.isPrime;
      if (!("baseToll" in land)) land.baseToll = def.baseToll;
      if (!("price" in land)) land.price = def.price;
      if (!("areaId" in land)) land.areaId = def.areaId;
      if (!("name" in land)) land.name = def.name;
    }

    function normalizeAreaShape(area) {
      const def = getAreaById(area.id);
      if (!def) return;

      if (!("stockPrice" in area)) area.stockPrice = def.initialStockPrice;
    }

    function normalizeSpyShape(spy) {
      if (!spy) return;

      if (!("id" in spy)) spy.id = createId("spy");

      if (!("direction" in spy) || !isValidDirection(spy.direction)) {
        spy.direction = Math.random() < 0.5 ? DIRECTION_OUTER : DIRECTION_INNER;
      }

      if (!("level" in spy)) {
        spy.level = 1;
      }

      spy.level = Math.max(1, Math.min(SPY_MAX_LEVEL, Number(spy.level) || 1));

      if (!("startPosition" in spy)) {
        spy.startPosition = spy.position ?? 0;
      }
    }

    function findPlayer(state, playerId) {

    function getCurrentPlayer(state = currentGameState) {
      if (!state || !Array.isArray(state.players)) return null;
      return state.players[state.currentPlayerIndex] || null;

    function getStockFloor(areaId) {

    function calculateLandAssets(state, playerId) {
      return state.lands
        .filter(land => land.ownerId === playerId)
        .reduce((sum, land) => sum + (Number(land.currentValue) || 0), 0);
    }

    function calculateStockAssets(state, playerId) {
      const player = findPlayer(state, playerId);
      if (!player) return 0;

      return Object.entries(player.stocks || {}).reduce((sum, [areaId, count]) => {
        const area = findAreaState(state, areaId);
        return sum + (area ? area.stockPrice * Number(count || 0) : 0);
      }, 0);
    }

    function calculateTotalAssets(state, playerId) {
      const player = findPlayer(state, playerId);
      if (!player) return 0;

      return (
        player.money +
        calculateLandAssets(state, playerId) +
        calculateStockAssets(state, playerId) -
        (player.loanDue || 0)
      );
    }

    function isAreaMonopoly(state, playerId, areaId) {
      const lands = state.lands.filter(land => land.areaId === areaId);
      return lands.length > 0 && lands.every(land => land.ownerId === playerId);
    }

    function calculateCurrentToll(land, monopoly) {
      const base = Number(land.baseToll) || 0;
      const investment = Number(land.investment) || 0;
      const toll = base + Math.round(investment * 0.3);
      return monopoly ? toll * 2 : toll;
    }

    function getBoardLandToll(state, land) {
      if (!land) return 0;

      if (!state || !land.ownerId) {
        return land.baseToll || 0;
      }

      const monopoly = isAreaMonopoly(state, land.ownerId, land.areaId);
      return calculateCurrentToll(land, monopoly);
    }

        if (player && !player.bankrupt) {

        }
      }

      return currentIndex;

    function drawRandomCard(player) {
      const roll = Math.random() * 100;
      let pool;

      const prestige = player ? player.prestige || 0 : 0;
      const rareBonus = prestige >= 5 ? 14 : prestige >= 3 ? 8 : prestige >= 1 ? 4 : 0;

      if (roll < 70 - rareBonus) {
        pool = CARD_DEFS.filter(card => card.rarity === "normal");
      } else {
        pool = CARD_DEFS.filter(card => card.rarity !== "normal");
      }

      const def = pool[randomInt(0, pool.length - 1)] || CARD_DEFS[0];

      return {
        ...def,
        uid: createId("card")
      };
    }

      return null;

function checkSupportedViewport() {

  const isLargeEnough = window.innerWidth >= 900 && window.innerHeight >= 560;

}

    function setupSupabaseClient() {
      const url = localStorage.getItem("yamanote_supabase_url") || "";
      const key = localStorage.getItem("yamanote_supabase_anon_key") || "";

      const urlInput = document.getElementById("supabaseUrl");
      const keyInput = document.getElementById("supabaseAnonKey");

      if (urlInput) urlInput.value = url;
      if (keyInput) keyInput.value = key;

      if (!url || !key || !window.supabase) {
        setConnectionStatus("通信：未接続");
        return;
      }

      sbClient = window.supabase.createClient(url, key);
      setConnectionStatus("通信：Supabase設定済み");
    }

    function saveSupabaseSettings() {
      const url = document.getElementById("supabaseUrl").value.trim();
      const key = document.getElementById("supabaseAnonKey").value.trim();

      localStorage.setItem("yamanote_supabase_url", url);
      localStorage.setItem("yamanote_supabase_anon_key", key);

      setupSupabaseClient();
      setConnectionStatus("通信：設定を保存しました");
    }

    function generateRoomCode() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let code = "";

      for (let i = 0; i < 5; i++) {
        code += chars[randomInt(0, chars.length - 1)];
      }

      return code;
    }

    async function createRoomOnline() {
      if (!sbClient) {
        setConnectionStatus("通信：Supabase設定を保存してください");
        return;
      }

      const settings = getSelectedSettings();
      const roomCode = generateRoomCode();

      const { data: room, error: roomError } = await sbClient
        .from("rooms")
        .insert({
          room_code: roomCode,
          status: "waiting",
          settings,
          game_state: null,
          state_version: 0,
          current_player_index: 0,
          phase: "waiting"
        })
        .select()
        .single();

      if (roomError) {
        setConnectionStatus(`通信：部屋作成エラー ${roomError.message}`);
        return;
      }

      const color = PLAYER_COLORS[0];

      const { data: player, error: playerError } = await sbClient
        .from("room_players")
        .insert({
          room_id: room.id,
          seat_no: 0,
          name: getLocalPlayerName(),
          color: color.name,
          is_host: true,
          client_id: createId("client"),
          connected: true
        })
        .select()
        .single();

      if (playerError) {
        setConnectionStatus(`通信：プレイヤー作成エラー ${playerError.message}`);
        return;
      }

      await sbClient
        .from("rooms")
        .update({ host_player_id: player.id })
        .eq("id", room.id);

      currentRoom = room;
      currentRoomPlayer = player;

      await loadRoomData(room.id);
      subscribeRoom(room.id);
      renderRoomInfo();

      setConnectionStatus("通信：部屋を作成しました");
    }

    async function joinRoomOnline() {
      if (!sbClient) {
        setConnectionStatus("通信：Supabase設定を保存してください");
        return;
      }

      const code = document.getElementById("joinRoomCode").value.trim().toUpperCase();

      if (!code) {
        setConnectionStatus("通信：部屋コードを入力してください");
        return;
      }

      const { data: room, error: roomError } = await sbClient
        .from("rooms")
        .select("*")
        .eq("room_code", code)
        .single();

      if (roomError || !room) {
        setConnectionStatus("通信：部屋が見つかりません");
        return;
      }

      if (room.status !== "waiting") {
        setConnectionStatus("通信：すでに開始済みの部屋です");
        return;
      }

      const { data: existingPlayers, error: playersError } = await sbClient
        .from("room_players")
        .select("*")
        .eq("room_id", room.id)
        .order("seat_no");

      if (playersError) {
        setConnectionStatus(`通信：参加者取得エラー ${playersError.message}`);
        return;
      }

      const settings = room.settings || { playerCount: 4 };
      const maxPlayers = Number(settings.playerCount || 4);

      if (existingPlayers.length >= maxPlayers) {
        setConnectionStatus("通信：満員です");
        return;
      }

      const seatNo = existingPlayers.length;
      const color = PLAYER_COLORS[seatNo] || PLAYER_COLORS[0];

      const { data: player, error: playerError } = await sbClient
        .from("room_players")
        .insert({
          room_id: room.id,
          seat_no: seatNo,
          name: getLocalPlayerName(),
          color: color.name,
          is_host: false,
          client_id: createId("client"),
          connected: true
        })
        .select()
        .single();

      if (playerError) {
        setConnectionStatus(`通信：参加エラー ${playerError.message}`);
        return;
      }

      currentRoom = room;
      currentRoomPlayer = player;

      await loadRoomData(room.id);
      subscribeRoom(room.id);
      renderRoomInfo();

      setConnectionStatus("通信：部屋に参加しました");
    }

    async function loadRoomData(roomId) {
      if (!sbClient || !roomId) return;

      const { data: room } = await sbClient
        .from("rooms")
        .select("*")
        .eq("id", roomId)
        .single();

      const { data: players } = await sbClient
        .from("room_players")
        .select("*")
        .eq("room_id", roomId)
        .order("seat_no");

      if (room) {
        currentRoom = room;

        if (room.game_state) {
          currentGameState = room.game_state;
          normalizeGameStateShape(currentGameState);
        }
      }

      waitingRoomPlayers = players || [];

      renderRoomInfo();
      renderGameView();
      renderBoard();
    }

    function subscribeRoom(roomId) {
      if (!sbClient || !roomId) return;

      if (roomChannel) {
        sbClient.removeChannel(roomChannel);
        roomChannel = null;
      }

      roomChannel = sbClient
        .channel(`room_${roomId}`)
        .on(
          "postgres_changes",
          {
            event: "*",
            schema: "public",
            table: "rooms",
            filter: `id=eq.${roomId}`
          },
          async () => {
            await loadRoomData(roomId);
          }
        )
        .on(
          "postgres_changes",
          {
            event: "*",
            schema: "public",
            table: "room_players",
            filter: `room_id=eq.${roomId}`
          },
          async () => {
            await loadRoomData(roomId);
          }
        )
        .subscribe();
    }

    function renderRoomInfo() {
      const roomInfo = document.getElementById("roomInfo");
      const roomCodeDisplay = document.getElementById("roomCodeDisplay");
      const waitingPlayers = document.getElementById("waitingPlayers");
      const startButton = document.getElementById("startGameButton");

      if (!roomInfo || !roomCodeDisplay || !waitingPlayers || !startButton) return;

      if (!currentRoom) {
        roomInfo.style.display = "none";
        return;
      }

      roomInfo.style.display = "block";
      roomCodeDisplay.textContent = currentRoom.room_code;

      waitingPlayers.innerHTML = waitingRoomPlayers
        .map(player => {
          const color = PLAYER_COLORS[player.seat_no] || PLAYER_COLORS[0];

          return `
            <div style="color:${color.value}">
              ${player.seat_no + 1}. ${escapeHtml(player.name)}
              ${player.is_host ? "（親）" : ""}
            </div>
          `;
        })
        .join("");

      const settings = currentRoom.settings || { playerCount: 4 };
      const enoughPlayers = waitingRoomPlayers.length === Number(settings.playerCount || 4);
      const isHost = currentRoomPlayer && currentRoomPlayer.is_host;

      startButton.disabled = !(isHost && enoughPlayers && currentRoom.status === "waiting");
    }

    async function startGameOnline() {
      if (!sbClient || !currentRoom || !currentRoomPlayer || !currentRoomPlayer.is_host) return;

      await loadRoomData(currentRoom.id);

      const settings = currentRoom.settings || getSelectedSettings();
      const state = createInitialGameState(waitingRoomPlayers, settings);

      const { error } = await sbClient
        .from("rooms")
        .update({
          status: "playing",
          game_state: state,
          state_version: (currentRoom.state_version || 0) + 1,
          current_player_index: 0,
          phase: "before_roll"
        })
        .eq("id", currentRoom.id);

      if (error) {
        setConnectionStatus(`通信：ゲーム開始エラー ${error.message}`);
        return;
      }

      currentGameState = state;
      renderGameView();
    }

    async function saveGameStateOnline(state) {
      if (!sbClient || !currentRoom || !state) return;

      normalizeGameStateShape(state);
      currentGameState = state;

      const { error } = await sbClient
        .from("rooms")
        .update({
          status: state.status,
          game_state: state,
          state_version: (currentRoom.state_version || 0) + 1,
          current_player_index: state.currentPlayerIndex,
          phase: state.phase
        })
        .eq("id", currentRoom.id);

      if (error) {
        setConnectionStatus(`通信：保存エラー ${error.message}`);
        return;
      }

      await loadRoomData(currentRoom.id);
    }

    function renderGameView() {
      const panel = document.getElementById("gamePlayPanel");
      const preGameScreen = document.getElementById("preGameScreen");
      const gameScreen = document.getElementById("gameScreen");

      if (!panel) return;

      const isGameActive =
        currentGameState &&
        (currentGameState.status === "playing" || currentGameState.status === "game_over");

      if (preGameScreen) {
        preGameScreen.classList.toggle("hidden", !!isGameActive);
      }

      if (gameScreen) {
        gameScreen.classList.toggle("hidden", !isGameActive);
      }

      if (!isGameActive) {
        panel.style.display = "none";
        return;
      }

      panel.style.display = "block";

      renderTopTurnBar();
      renderCurrentPlayerBox();
      renderResultPanel();
      renderRollResult();
      renderPendingActionPanel();
      renderCardUsePanel();
      renderPlayerSummaryList();
      renderActionButtons();
      renderLogPanel();
      renderSelfInfoContent();
      renderAnimationEvent();
    }

    function getCurrentActionGuideText() {
      if (!currentGameState) return "ゲーム開始待ち";

      if (currentGameState.status === "game_over") {
        return "ゲーム終了";
      }

      const activeSpy = getActiveSpy(currentGameState);

      if (activeSpy && currentGameState.phase === "spy_turn") {
        const owner = findPlayer(currentGameState, activeSpy.ownerId);
        return `${owner ? owner.name : "誰か"}のスパイが行動中です`;
      }

      const action = currentGameState.pendingAction;

      if (action) {
        if (!isPendingActionForMe(action)) {
          return `${getPendingActionPlayerName(action)} が処理中です`;
        }

        if (action.type === "choose_direction") return "進行方向を選んでください";
        if (action.type === "buy_land") return "土地を購入できます";
        if (action.type === "invest_land") return "増資できます";
        if (action.type === "stock_trade") return "株取引できます";
        if (action.type === "borrow_bank") return "銀行から借入できます";
        if (action.type === "airport_choice") return "空港を利用できます";
        if (action.type === "card_full") return "手札を整理してください";
        if (action.type === "hire_spy") return "スパイを雇用できます";
        if (action.type === "choose_airport_card") return "移動先の空港を選んでください";

        return "処理を選択してください";
      }

      if (currentGameState.phase === "before_roll") {
        return isMyTurn() ? "サイコロを振ってください" : "他プレイヤーの操作待ちです";
      }

      if (currentGameState.phase === "after_roll") {
        return isMyTurn() ? "ターン終了できます" : "他プレイヤーのターン終了待ちです";
      }

      return "処理中です";
    }

    function renderTopTurnBar() {
      const playerEl = document.getElementById("topTurnPlayer");
      const guideEl = document.getElementById("topTurnGuide");

      if (!playerEl || !guideEl) return;

      if (!currentGameState) {
        playerEl.textContent = "- のターン";
        guideEl.textContent = "ゲーム開始待ち";
        return;
      }

      if (currentGameState.status === "game_over") {
        const winner = findPlayer(currentGameState, currentGameState.winnerId);
        playerEl.textContent = "ゲーム終了";
        guideEl.textContent = winner ? `優勝：${winner.name}` : "結果を確認してください";
        return;
      }

      const player = getCurrentPlayer(currentGameState);

      if (!player) {
        playerEl.textContent = "- のターン";
        guideEl.textContent = "プレイヤー情報がありません";
        return;
      }

      playerEl.textContent = `${player.name} のターン`;
      playerEl.style.color = player.colorValue || "";
      guideEl.textContent = getCurrentActionGuideText();
    }

    function renderCurrentPlayerBox() {
      const el = document.getElementById("currentPlayerBox");
      if (!el || !currentGameState) return;

      const player = getCurrentPlayer(currentGameState);

      if (!player) {
        el.textContent = "現在プレイヤー情報なし";
        return;
      }

      el.innerHTML = `
        <strong style="color:${player.colorValue}">
          ${escapeHtml(player.name)}
        </strong><br>
        現在地：${escapeHtml(getSquareName(player.position))}<br>
        進行方向：${getDirectionIcon(player.direction)} ${escapeHtml(getDirectionLabel(player.direction))}
      `;
    }

    function renderResultPanel() {
      const el = document.getElementById("resultPanel");
      if (!el || !currentGameState) return;

      if (currentGameState.status !== "game_over") {
        el.classList.add("hidden");
        el.innerHTML = "";
        return;
      }

      const winner = findPlayer(currentGameState, currentGameState.winnerId);
      el.classList.remove("hidden");
      el.innerHTML = `
        <strong>ゲーム終了</strong><br>
        優勝：${escapeHtml(winner ? winner.name : "-")}
      `;
    }

    function renderRollResult() {
      const el = document.getElementById("rollResult");
      if (!el) return;

      if (!currentGameState || !currentGameState.lastRoll) {
        el.textContent = "サイコロ：-";
        return;
      }

      const lastRoll = currentGameState.lastRoll;
      const value =
        lastRoll.value ??
        lastRoll.roll ??
        lastRoll.dice ??
        lastRoll.total ??
        lastRoll.steps ??
        "-";

      const player = lastRoll.playerId
        ? findPlayer(currentGameState, lastRoll.playerId)
        : null;

      if (player) {
        el.textContent = `${player.name} のサイコロ：${value}`;
      } else {
        el.textContent = `サイコロ：${value}`;
      }
    }

    function renderBoard() {
      const board = document.getElementById("board");
      if (!board) return;

      board.innerHTML = "";

      const state = currentGameState;
      const currentPlayer = state ? getCurrentPlayer(state) : null;

      for (const square of MAP_SQUARES) {
        const el = document.createElement("div");
        el.className = `square ${square.type}`;
        el.dataset.squareId = String(square.id);
        el.dataset.squareType = square.type;

        const gridPosition = getBoardGridPosition(square.id);
        el.style.gridColumn = String(gridPosition.col);
        el.style.gridRow = String(gridPosition.row);

        if (currentPlayer && currentPlayer.position === square.id && !currentPlayer.bankrupt) {
          el.classList.add("current-square");
        }

        if (shouldSquareGlowByAnimation(square.id)) {
          el.classList.add("animation-square-glow");
        }

        let innerHtml = "";

        if (square.type === "land") {
          const landDef = LAND_DEFS[square.landId];
          const land = state ? findLand(state, square.landId) : null;
          const displayLand = land || landDef;
          const area = getAreaById(landDef.areaId);
          const areaColor = getAreaColor(landDef.areaId);
          const toll = getBoardLandToll(state, displayLand);

          let owner = null;

          if (state && land && land.ownerId) {
            owner = findPlayer(state, land.ownerId);
          }

          el.style.borderColor = areaColor;

          if (owner && owner.colorValue) {
            el.style.background = hexToRgba(owner.colorValue, 0.18);
          } else {
            el.style.background = hexToRgba(areaColor, 0.08);
          }

          innerHtml = `
            <div class="board-square-inner">
              <div class="board-station-name">${escapeHtml(landDef.name)}</div>
              ${landDef.isPrime ? `<div class="board-star">★</div>` : ""}
              <div class="board-main-label">${formatBoardMoney(toll)}</div>
              ${owner ? `<div class="owner-mark" style="background:${owner.colorValue}" title="${escapeHtml(owner.name)}"></div>` : ""}
              <div class="area-bottom-band" style="background:${areaColor}" title="${escapeHtml(area ? area.name : "")}"></div>
              ${renderPiecesOnSquare(state, square.id)}
            </div>
          `;
        } else {
          const label = getSpecialSquareLabel(square);

          innerHtml = `
            <div class="board-square-inner">
              <div class="board-main-label special">${escapeHtml(label)}</div>
              ${renderPiecesOnSquare(state, square.id)}
            </div>
          `;
        }

        el.innerHTML = innerHtml;
        board.appendChild(el);
      }
    }

    function renderPiecesOnSquare(state, squareId) {
      if (!state) return "";

      const playersHere = state.players.filter(player => {
        return !player.bankrupt && player.position === squareId;
      });

      const spiesHere = state.spies.filter(spy => spy.position === squareId);

      if (playersHere.length === 0 && spiesHere.length === 0) {
        return "";
      }

      const playerPiecesHtml = playersHere.map(player => {
        return `
          <span
            class="piece"
            title="${escapeHtml(player.name)}"
            style="background:${player.colorValue}"
          ></span>
        `;
      }).join("");

      const spyPiecesHtml = spiesHere.map(spy => {
        const owner = findPlayer(state, spy.ownerId);
        const title = owner
          ? `${owner.name}のスパイ ${getSpyLevelLabel(spy)} ${getDirectionIcon(spy.direction)}`
          : `スパイ ${getSpyLevelLabel(spy)} ${getDirectionIcon(spy.direction)}`;

        return `
          <span
            class="piece spy-piece"
            title="${escapeHtml(title)}"
          ></span>
        `;
      }).join("");

      return `
        <div class="piece-wrap">
          ${playerPiecesHtml}
          ${spyPiecesHtml}
        </div>
      `;
    }

    function renderPlayerSummaryList() {
      const container = document.getElementById("playerSummaryList");
      if (!container || !currentGameState) return;

      container.innerHTML = "";

      for (let i = 0; i < currentGameState.players.length; i++) {
        const player = currentGameState.players[i];
        const totalAssets = calculateTotalAssets(currentGameState, player.id);
        const isCurrent = i === currentGameState.currentPlayerIndex && !player.bankrupt;

        const card = document.createElement("div");
        card.className = "map-player-card";

        if (isCurrent) card.classList.add("current");
        if (player.bankrupt) card.classList.add("bankrupt");

        card.innerHTML = `
          <div class="map-player-name" style="color:${player.colorValue}">
            ${getDirectionIcon(player.direction)} ${escapeHtml(player.name)}
            ${player.bankrupt ? "（破産）" : ""}
          </div>
          <div class="map-player-assets-line" style="color:${player.colorValue}">
            <span>総資産</span>
            <span>${formatMoney(totalAssets)}</span>
          </div>
          <div class="map-player-assets-line" style="color:${player.colorValue}">
            <span>現金</span>
            <span>${formatMoney(player.money)}</span>
          </div>
        `;

        container.appendChild(card);
      }
    }

    function renderLogPanel() {
      const panel = document.getElementById("logPanel");
      if (!panel || !currentGameState) return;

      const logs = currentGameState.logs || [];
      const recentLogs = logs.slice(-5);

      if (recentLogs.length === 0) {
        panel.innerHTML = `<div class="small-text">ログはまだありません。</div>`;
        return;
      }

      panel.innerHTML = recentLogs
        .map(log => `<div class="log-line">${escapeHtml(log)}</div>`)
        .join("");
    }

    function renderActionButtons() {
      const rollButton = document.getElementById("rollButton");
      const endTurnButton = document.getElementById("endTurnButton");
      const controlButton = document.getElementById("controlToggleButton");

      if (rollButton) {
        rollButton.textContent = "サイコロを振る";
      }

      if (!rollButton || !endTurnButton || !currentGameState) return;

      if (currentGameState.status === "game_over") {
        rollButton.disabled = true;
        endTurnButton.disabled = true;
        if (controlButton) controlButton.classList.remove("operation-ready");
        return;
      }

      const canOperate = isMyTurn();
      const phase = currentGameState.phase;
      const currentPlayer = getCurrentPlayer(currentGameState);

      const canRoll =
        canOperate &&
        phase === "before_roll" &&
        currentPlayer &&
        !currentPlayer.bankrupt &&
        !currentGameState.pendingAction;

      const canEndTurn =
        canOperate &&
        phase === "after_roll" &&
        !currentGameState.pendingAction;

      const hasPendingActionForMe =
        !!currentGameState.pendingAction &&
        isPendingActionForMe(currentGameState.pendingAction);

      rollButton.disabled = !canRoll;
      endTurnButton.disabled = !canEndTurn;

      const shouldGlow = canRoll || canEndTurn || hasPendingActionForMe;

      if (controlButton) {
        controlButton.classList.toggle("operation-ready", shouldGlow);
      }
    }

    function buildLandInfoHtml(square) {
      if (!square || square.type !== "land") {
        return "";
      }

      const landDef = LAND_DEFS[square.landId];
      const land = currentGameState ? findLand(currentGameState, square.landId) : null;
      const displayLand = land || landDef;

      const areaDef = getAreaById(landDef.areaId);
      const stateArea = currentGameState ? findAreaState(currentGameState, landDef.areaId) : null;
      const stockPrice = stateArea
        ? stateArea.stockPrice
        : areaDef.initialStockPrice;

      let ownerText = "なし";
      let ownerColor = "";

      if (land && land.ownerId) {
        const owner = findPlayer(currentGameState, land.ownerId);

        if (owner) {
          ownerText = owner.name;
          ownerColor = owner.colorValue;
        }
      }

      const monopoly =
        currentGameState && land && land.ownerId
          ? isAreaMonopoly(currentGameState, land.ownerId, land.areaId)
          : false;

      const toll = land

    async function rollDiceOnline() {
      if (!currentGameState || currentGameState.status !== "playing") return;
      if (!isMyTurn()) return;
      if (currentGameState.phase !== "before_roll") return;
      if (currentGameState.pendingAction) return;

      const state = cloneState(currentGameState);
      normalizeGameStateShape(state);

      const player = getCurrentPlayer(state);

      if (!player || player.bankrupt) return;

      const roll = randomInt(1, 6);
      const startPosition = player.position;

      state.lastRoll = {
        playerId: player.id,
        value: roll,
        startPosition,
        direction: player.direction || null
      };

      addLog(state, `${player.name}がサイコロで${roll}を出しました。`);

      setAnimationEvent(state, "dice", {
        playerId: player.id,
        value: roll,
        startPosition,
        direction: player.direction || null
      });

      if (needsDirectionChoice(player)) {
        state.pendingAction = {
          type: "choose_direction",
          playerId: player.id,
          roll,
          startPosition,
          canChangeDirection: !!player.canChangeDirection
        };

        state.phase = "after_roll";
        addLog(state, `${player.name}は進行方向を選択します。`);

        await saveGameStateOnline(state);
        return;
      }

      movePlayerByRollAndDirection(state, player, roll, player.direction);

      await saveGameStateOnline(state);
    }

    function movePlayerByRollAndDirection(state, player, roll, direction) {
      if (!state || !player) return;
      if (!isValidDirection(direction)) return;

      const startPosition = player.position;
      const passedSquareIds = getPassedSquareIdsByDirection(startPosition, roll, direction);
      const destination = passedSquareIds[passedSquareIds.length - 1];

      player.position = destination;

      state.lastRoll = {
        playerId: player.id,
        value: roll,
        startPosition,
        endPosition: destination,
        direction
      };

      setAnimationEvent(state, "dice_move", {
        playerId: player.id,
        value: roll,
        startPosition,
        endPosition: destination,
        direction,
        squareId: destination
      });

      addLog(
        state,
        `${player.name}は${getDirectionLabel(direction)}に${roll}マス進み、${getSquareName(destination)}に到着しました。`
      );

      processPassedSquaresByDirection(state, player, passedSquareIds, startPosition, destination);
      processArrivalSquareAfterDirectedMove(state, player, startPosition, destination, passedSquareIds);

      state.phase = state.pendingAction ? "action" : "after_roll";
    }

    function processPassedSquaresByDirection(state, player, passedSquareIds, startPosition, destination) {
      for (const squareId of passedSquareIds) {
        const square = getSquareById(squareId);
        if (!square) continue;

        if (square.type === "settlement") {
          processSettlementPass(state, player, squareId === destination);
          continue;
        }

        if (square.type === "bank") {
          processBankPassRepayment(state, player);
          continue;
        }

        if (square.type === "stock_exchange") {
          queueStockTradeAction(state, player.id);
          continue;
        }

        if (square.type === "land") {
          processPrimeLandPassFee(state, player, square.landId);
        }
      }
    }

    function processArrivalSquareAfterDirectedMove(state, player, startPosition, destination, passedSquareIds) {
      const square = getSquareById(destination);
      if (!square) return;

      if (square.type === "settlement") {
        player.canChangeDirection = true;
        return;
      }

      processSquareArrival(state, player, square);
    }

    function processSquareArrival(state, player, square) {
      if (!square || player.bankrupt || state.pendingAction) return;

      if (square.type === "land") {
        processLandArrival(state, player, square.landId);
        return;
      }

      if (square.type === "card") {
        processCardArrival(state, player);
        return;
      }

      if (square.type === "event") {
        processRandomEvent(state, player);
        return;
      }

      if (square.type === "hotel") {
        processHotel(state, player);
        return;
      }

      if (square.type === "tax") {
        processTax(state, player);
        return;
      }

      if (square.type === "contribution") {
        processContribution(state, player);
        return;
      }

      if (square.type === "bank") {
        if (!player.loanDue || player.loanDue <= 0) {
          state.pendingAction = {
            type: "borrow_bank",
            playerId: player.id
          };
        }

        return;
      }

      if (square.type === "airport") {
        state.pendingAction = {
          type: "airport_choice",
          playerId: player.id,
          from: square.id,
          to: square.id === 20 ? 46 : 20
        };

        return;
      }

      if (square.type === "stock_exchange") {
        queueStockTradeAction(state, player.id);
        return;
      }

      if (square.type === "spy") {
        if (!canHireSpy(state)) {
          addLog(state, "すでにスパイが存在しているため、スパイを雇えません。");
          return;
        }

        if (player.money < SPY_HIRE_COST) {
          addLog(state, `${player.name}は資金不足のため、スパイを雇えません。`);
          return;
        }

        state.pendingAction = {
          type: "hire_spy",
          playerId: player.id
        };

        return;
      }

      if (square.type === "jail") {
        addLog(state, `${player.name}は刑務所マスに止まりました。`);
      }
    }

    function processLandArrival(state, player, landId) {
      const land = findLand(state, landId);
      if (!land) return;

      if (!land.ownerId) {
        state.pendingAction = {
          type: "buy_land",
          playerId: player.id,
          landId: land.id
        };

        return;
      }

      if (land.ownerId === player.id) {
        state.pendingAction = {
          type: "invest_land",
          playerId: player.id,
          landId: land.id
        };

        return;
      }

      const owner = findPlayer(state, land.ownerId);

      if (!owner || owner.bankrupt) return;

      const tollGuard = consumePassiveCard(player, "toll_guard");

      if (tollGuard) {
        addLog(state, `${player.name}は通行料無視カードで${land.name}の通行料を無効化しました。`);
        return;
      }

      const monopoly = isAreaMonopoly(state, owner.id, land.areaId);
      const toll = calculateCurrentToll(land, monopoly);

      player.money -= toll;
      owner.money += toll;

      setAnimationEvent(state, "toll_payment", {
        playerId: player.id,
        ownerId: owner.id,
        landId: land.id,
        landName: land.name,
        amount: toll,
        amountText: `${player.name} → ${owner.name}：${formatMoney(toll)}`,
        squareId: getSquareIdByLandId(land.id)
      });

      addLog(state, `${player.name}は${owner.name}に${land.name}の通行料${formatMoney(toll)}を支払いました。`);

      handleNegativeMoney(state, player);
    }

    function processCardArrival(state, player) {
      const card = drawRandomCard(player);

      if (player.cards.length < MAX_HAND_SIZE) {
        player.cards.push(card);

        setAnimationEvent(state, "card_draw", {
          playerId: player.id,
          cardName: card.name || "カード"
        });

        addLog(state, `${player.name}はカードを取得しました。`);
        return;
      }

      state.pendingAction = {
        type: "card_full",
        playerId: player.id,
        newCard: card
      };
    }

    function processRandomEvent(state, player) {
      const eventNo = randomInt(1, 7);

      if (eventNo === 1) {
        for (const area of state.areas) {
          area.stockPrice += 2;
        }

        addLog(state, "景気上昇。全エリアの株価が2万円上がりました。");
        return;
      }

      if (eventNo === 2) {
        for (const area of state.areas) {
          area.stockPrice = Math.max(getStockFloor(area.id), area.stockPrice - 2);
        }

        addLog(state, "不景気。全エリアの株価が2万円下がりました。");
        return;
      }

      if (eventNo === 3) {
        player.money += 300;
        addLog(state, `${player.name}は臨時収入${formatMoney(300)}を得ました。`);
        return;
      }

      if (eventNo === 4) {
        player.money -= 200;
        addLog(state, `${player.name}は出費${formatMoney(200)}を支払いました。`);
        handleNegativeMoney(state, player);
        return;
      }

      if (eventNo === 5) {
        const area = state.areas[randomInt(0, state.areas.length - 1)];
        area.stockPrice += 5;
        addLog(state, `${area.name}の株価が急騰しました。`);
        return;
      }

      if (eventNo === 6) {
        state.spies = [];
        addLog(state, "スパイ一斉摘発により、マップ上のスパイは消滅しました。");
        return;
      }

      player.prestige += 1;
      addLog(state, `${player.name}は評判を高め、名声が1上がりました。`);
    }

    function processHotel(state, player) {
      const totalAssets = calculateTotalAssets(state, player.id);
      const cost = totalAssets >= 20000 ? 500 : totalAssets >= 10000 ? 200 : totalAssets >= 5000 ? 100 : 50;

      player.money -= cost;
      addLog(state, `${player.name}はホテル宿泊費${formatMoney(cost)}を支払いました。`);
      handleNegativeMoney(state, player);
    }

    function processTax(state, player) {
      const guard = consumePassiveCard(player, "tax_guard");

      if (guard) {
        addLog(state, `${player.name}は税金回避カードで税金を回避しました。`);
        return;
      }

      const totalAssets = Math.max(0, calculateTotalAssets(state, player.id));
      const tax = Math.max(100, Math.round(totalAssets * 0.05));

      player.money -= tax;
      addLog(state, `${player.name}は税金${formatMoney(tax)}を支払いました。`);
      handleNegativeMoney(state, player);
    }

    function processContribution(state, player) {
      const cost = 300;

      player.money -= cost;
      player.prestige += 1;

      addLog(state, `${player.name}は国際貢献として${formatMoney(cost)}を寄付し、名声が上がりました。`);
      handleNegativeMoney(state, player);
    }

    function processSettlementPass(state, player, isExactStop) {
      resolveSettlement(state, player);

      if (isExactStop) {
        player.canChangeDirection = true;
        addLog(state, `${player.name}はSTARTにぴったり止まったため、次回方向を選び直せます。`);
      }
    }

    function resolveSettlement(state, player) {
      let income = 0;

      for (const land of state.lands) {
        if (land.ownerId === player.id) {
          income += Math.max(5, Math.round((land.currentValue || land.price) * 0.05));
        }
      }

      for (const [areaId, count] of Object.entries(player.stocks || {})) {
        income += Number(count || 0) * 1;
      }

      player.money += income;

      addLog(state, `${player.name}は決算で${formatMoney(income)}を受け取りました。`);

      if (calculateTotalAssets(state, player.id) >= Number(state.settings.targetAssets || 50000)) {
        state.status = "game_over";
        state.winnerId = player.id;
        state.phase = "game_over";

        setAnimationEvent(state, "victory", {
          playerId: player.id
        });

        addLog(state, `${player.name}が目標資産に到達し、勝利しました。`);
      }
    }

    function processBankPassRepayment(state, player) {
      if (!player || !player.loanDue || player.loanDue <= 0) return;

      const repayAmount = player.loanDue;
      player.money -= repayAmount;
      player.loanPrincipal = 0;
      player.loanDue = 0;

      addLog(state, `${player.name}は銀行を通過し、借入金${formatMoney(repayAmount)}を返済しました。`);

      handleNegativeMoney(state, player);
    }

    function queueStockTradeAction(state, playerId) {
      if (state.pendingAction) return;

      state.pendingAction = {
        type: "stock_trade",
        playerId
      };
    }

    function processPrimeLandPassFee(state, player, landId) {
      const land = findLand(state, landId);

      if (!land || !land.isPrime || !land.ownerId) return;
      if (land.ownerId === player.id) return;

      const owner = findPlayer(state, land.ownerId);
      if (!owner || owner.bankrupt) return;

      const monopoly = isAreaMonopoly(state, owner.id, land.areaId);
      const currentToll = calculateCurrentToll(land, monopoly);
      const rate = monopoly ? 0.1 : 0.05;
      const fee = Math.max(1, Math.round(currentToll * rate));

      player.money -= fee;
      owner.money += fee;

      addLog(
        state,
        `${player.name}は特等地${land.name}を通過し、${owner.name}に通過料${formatMoney(fee)}を支払いました。`
      );

      handleNegativeMoney(state, player);
    }
        async function resolveDirectionChoice(direction) {
      if (!currentGameState || !currentGameState.pendingAction) return;
      if (!isValidDirection(direction)) return;

      const action = currentGameState.pendingAction;
      if (action.type !== "choose_direction") return;
      if (!isPendingActionForMe(action)) return;

      const state = cloneState(currentGameState);
      normalizeGameStateShape(state);

      const copiedAction = state.pendingAction;
      const player = findPlayer(state, copiedAction.playerId);

      if (!player || player.bankrupt) return;

      const roll = copiedAction.roll;
      const startPosition = copiedAction.startPosition;

      player.position = startPosition;
      player.direction = direction;
      player.canChangeDirection = false;

      state.pendingAction = null;

      addLog(state, `${player.name}は${getDirectionLabel(direction)}を選択しました。`);

      movePlayerByRollAndDirection(state, player, roll, direction);

      await saveGameStateOnline(state);
    }

    async function resolveBuyLand(shouldBuy) {
      const action = currentGameState?.pendingAction;
      if (!action || action.type !== "buy_land" || !isPendingActionForMe(action)) return;

      const state = cloneState(currentGameState);
      normalizeGameStateShape(state);

      const player = findPlayer(state, action.playerId);
      const land = findLand(state, action.landId);

      if (!player || !land) return;

      state.pendingAction = null;

      if (!shouldBuy) {
        addLog(state, `${player.name}は${land.name}を購入しませんでした。`);
        state.phase = "after_roll";
        await saveGameStateOnline(state);
        return;
      }

      const discountCard = player.cards.find(card => card.id === "discount_land");
      const price = discountCard ? Math.max(1, Math.round(land.price / 10)) : land.price;

      if (player.money < price) {
        addLog(state, `${player.name}は資金不足のため、${land.name}を購入できませんでした。`);
        state.phase = "after_roll";
        await saveGameStateOnline(state);
        return;
      }

      if (discountCard) {
        removeCardByUid(player, discountCard.uid);
        addLog(state, `${player.name}は土地割引カードを使用しました。`);
      }

      player.money -= price;
      land.ownerId = player.id;
      land.currentValue = land.price;
      land.investment = 0;

      setAnimationEvent(state, "land_purchase", {
        playerId: player.id,
        landId: land.id,
        landName: land.name,
        squareId: getSquareIdByLandId(land.id)
      });

      addLog(state, `${player.name}は${land.name}を${formatMoney(price)}で購入しました。`);

      state.phase = "after_roll";
      await saveGameStateOnline(state);
    }

    async function resolveInvestLand(amount) {
      const action = currentGameState?.pendingAction;
      if (!action || action.type !== "invest_land" || !isPendingActionForMe(action)) return;

      const state = cloneState(currentGameState);
      normalizeGameStateShape(state);

      const player = findPlayer(state, action.playerId);
      const land = findLand(state, action.landId);

      if (!player || !land) return;

      state.pendingAction = null;

      amount = Number(amount) || 0;

      if (amount <= 0) {
        addLog(state, `${player.name}は${land.name}に増資しませんでした。`);
        state.phase = "after_roll";
        await saveGameStateOnline(state);
        return;
      }

      amount = Math.min(amount, player.money);

      player.money -= amount;
      land.investment += amount;
      land.currentValue += amount;

      const area = findAreaState(state, land.areaId);
      if (area) {
        area.stockPrice += Math.max(1, Math.round(amount / 100));
      }

      setAnimationEvent(state, "invest_land", {
        playerId: player.id,
        landId: land.id,
        landName: land.name,
        amount,
        amountText: formatMoney(amount),
        squareId: getSquareIdByLandId(land.id)
      });

      addLog(state, `${player.name}は${land.name}に${formatMoney(amount)}増資しました。`);

      state.phase = "after_roll";
      await saveGameStateOnline(state);
    }

    async function resolveStockTrade(areaId, mode) {
      const action = currentGameState?.pendingAction;
      if (!action || action.type !== "stock_trade" || !isPendingActionForMe(action)) return;

      const state = cloneState(currentGameState);
      normalizeGameStateShape(state);

      const player = findPlayer(state, action.playerId);

      if (!player) return;

      if (mode === "close") {
        state.pendingAction = null;
        state.phase = "after_roll";
        addLog(state, `${player.name}は株取引を終了しました。`);
        await saveGameStateOnline(state);
        return;
      }

      const area = findAreaState(state, areaId);
      if (!area) return;

      if (mode === "buy") {
        const cost = area.stockPrice * 10;

        if (player.money >= cost) {
          player.money -= cost;
          player.stocks[area.id] = (player.stocks[area.id] || 0) + 10;
          area.stockPrice += getAreaById(area.id).growth || 1;
          addLog(state, `${player.name}は${area.name}の株を10株購入しました。`);
        } else {
          addLog(state, `${player.name}は資金不足で株を購入できませんでした。`);
        }
      }

      if (mode === "sell") {
        const owned = player.stocks[area.id] || 0;

        if (owned >= 10) {
          player.stocks[area.id] -= 10;
          player.money += area.stockPrice * 10;
          area.stockPrice = Math.max(getStockFloor(area.id), area.stockPrice - 1);
          addLog(state, `${player.name}は${area.name}の株を10株売却しました。`);
        } else {
          addLog(state, `${player.name}は売却できる株を持っていません。`);
        }
      }

      await saveGameStateOnline(state);
    }

    async function resolveBorrowBank(amount) {
      const action = currentGameState?.pendingAction;
      if (!action || action.type !== "borrow_bank" || !isPendingActionForMe(action)) return;

      const state = cloneState(currentGameState);
      normalizeGameStateShape(state);

      const player = findPlayer(state, action.playerId);
      if (!player) return;

      state.pendingAction = null;

      amount = Number(amount) || 0;

      if (amount <= 0) {
        addLog(state, `${player.name}は借入しませんでした。`);
        state.phase = "after_roll";
        await saveGameStateOnline(state);
        return;
      }

      const limit = Math.max(0, Math.floor(calculateTotalAssets(state, player.id) * 0.5 / 100) * 100);
      amount = Math.min(amount, limit);

      if (amount <= 0 || player.loanDue > 0) {
        addLog(state, `${player.name}は借入できませんでした。`);
      } else {
        player.money += amount;
        player.loanPrincipal = amount;
        player.loanDue = Math.round(amount * 1.2);
        addLog(state, `${player.name}は銀行から${formatMoney(amount)}借入しました。`);
      }

      state.phase = "after_roll";
      await saveGameStateOnline(state);
    }

    async function resolveAirportChoice(useAirport) {
      const action = currentGameState?.pendingAction;
      if (!action || action.type !== "airport_choice" || !isPendingActionForMe(action)) return;

      const state = cloneState(currentGameState);
      normalizeGameStateShape(state);

      const player = findPlayer(state, action.playerId);
      if (!player) return;

      state.pendingAction = null;

      if (useAirport && player.money >= 100) {

    async function resolveAirportWarpCard(destination) {

      if (!action || action.type !== "choose_airport_card" || !isPendingActionForMe(action)) return;

      state.pendingAction = null;
