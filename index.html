<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>山手線ゲーム</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #f4f5f7;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #2563eb;
      --danger: #dc2626;
      --money: #047857;
      --shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    button.secondary {
      background: #6b7280;
    }

    button.danger {
      background: var(--danger);
    }

    input,
    select {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 10px;
      background: #fff;
      color: var(--text);
      width: 100%;
    }

    .app {
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .game-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .small-text {
      font-size: 12px;
      color: var(--muted);
    }

    .layout {
      display: grid;
      grid-template-columns: 290px 1fr 320px;
      gap: 12px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 12px;
    }

    .panel-title {
      font-weight: 800;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .form-row {
      margin-bottom: 10px;
    }

    .form-row label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 700;
    }

    .player-form-grid,
    .area-list,
    .player-summary-list,
    .waiting-list,
    .card-list-box,
    .hand-card-grid {
      display: grid;
      gap: 8px;
    }

    .player-card,
    .player-summary-card,
    .area-item,
    .waiting-player,
    .card-mini,
    .hand-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      background: #fafafa;
    }

    .player-card-head,
    .player-summary-head,
    .waiting-player,
    .hand-card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 800;
    }

    .color-chip {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px var(--border);
      display: inline-block;
      vertical-align: middle;
    }

    .notice {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e3a8a;
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .board-wrap {
      overflow: auto;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(10, minmax(72px, 1fr));
      gap: 6px;
      min-width: 760px;
    }

    .square {
      min-height: 76px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 6px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }

    .square-no {
      font-size: 10px;
      color: var(--muted);
    }

    .square-name {
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
      word-break: keep-all;
    }

    .square-type {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
      line-height: 1.3;
    }

    .land-price {
      font-size: 10px;
      color: var(--money);
      font-weight: 700;
    }

    .square.land {
      border-left: 5px solid #9ca3af;
    }

    .square.settlement { background: #fff7ed; border-color: #fb923c; }
    .square.stock_exchange { background: #eff6ff; border-color: #60a5fa; }
    .square.bank { background: #ecfdf5; border-color: #34d399; }
    .square.card { background: #f5f3ff; border-color: #a78bfa; }
    .square.event { background: #fef2f2; border-color: #f87171; }
    .square.airport { background: #f0f9ff; border-color: #38bdf8; }
    .square.hotel { background: #fdf2f8; border-color: #f472b6; }
    .square.tax { background: #fefce8; border-color: #facc15; }
    .square.jail { background: #f3f4f6; border-color: #6b7280; }
    .square.spy { background: #faf5ff; border-color: #c084fc; }
    .square.contribution { background: #ecfeff; border-color: #22d3ee; }

    .square.current-square {
      outline: 3px solid var(--accent);
      outline-offset: -3px;
    }

    .piece-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-top: 4px;
      min-height: 16px;
    }

    .piece {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.25);
    }

    .spy-piece {
      border-radius: 4px;
      background: #111827 !important;
      border: 2px solid #facc15;
    }

    .area-title {
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .area-meta,
    .player-summary-body,
    .pending-action-body,
    .card-mini-desc,
    .hand-card-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.55;
    }

    .data-preview {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      background: #111827;
      color: #e5e7eb;
      padding: 10px;
      border-radius: 10px;
      overflow: auto;
      max-height: 280px;
      white-space: pre;
    }

    .room-actions,
    .action-panel,
    .stock-form,
    .select-box-block {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .room-actions.two,
    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .room-code-box {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #fafafa;
      font-size: 14px;
      font-weight: 800;
      text-align: center;
      letter-spacing: 0.08em;
    }

    .status-pill {
      display: inline-block;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 800;
      background: #eef2ff;
      color: #3730a3;
      margin-left: 4px;
    }

    .game-play-panel {
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    .current-player-box,
    .pending-action-box,
    .card-use-panel,
    .result-panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      background: #fafafa;
      margin-bottom: 10px;
    }

    .current-player-name,
    .pending-action-title,
    .card-mini-name {
      font-size: 15px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .current-player-meta {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .roll-result {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
      text-align: center;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .current-turn-card {
      border-color: var(--accent);
      background: #eff6ff;
    }

    .log-panel {
      margin-top: 12px;
      max-height: 180px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 8px;
      font-size: 12px;
      line-height: 1.5;
    }

    .log-line {
      border-bottom: 1px solid #f3f4f6;
      padding: 4px 0;
    }

    .log-line:last-child {
      border-bottom: 0;
    }

    .invest-input-row,
    .stock-form-row,
    .select-box-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }

    .invest-input-row input {
      text-align: right;
    }

    .stock-table,
    .ranking-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 12px;
      background: #fff;
    }

    .stock-table th,
    .stock-table td,
    .ranking-table th,
    .ranking-table td {
      border: 1px solid var(--border);
      padding: 5px;
      text-align: right;
    }

    .stock-table th:first-child,
    .stock-table td:first-child,
    .ranking-table th:first-child,
    .ranking-table td:first-child,
    .ranking-table th:nth-child(2),
    .ranking-table td:nth-child(2) {
      text-align: left;
    }

    .stock-table th,
    .ranking-table th {
      background: #f3f4f6;
      font-weight: 800;
    }

    .full-width-button {
      width: 100%;
      margin-top: 8px;
    }

    .rarity-normal { color: #2563eb; }
    .rarity-rare { color: #9333ea; }
    .rarity-super_rare { color: #dc2626; }

    .result-panel {
      border: 2px solid var(--accent);
      background: #eff6ff;
    }

    .result-title {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .result-winner {
      font-size: 15px;
      font-weight: 900;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .rank-1 {
      background: #fef3c7;
      font-weight: 900;
    }

    .rank-bankrupt {
      color: var(--muted);
      background: #f9fafb;
    }

    .game-over-note {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      margin-top: 8px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 920px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .board {
        grid-template-columns: repeat(5, minmax(72px, 1fr));
        min-width: 380px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="top-bar">
      <div>
        <div class="game-title">山手線ゲーム</div>
        <div class="small-text">山手線マップ・通信対戦型 経済すごろく</div>
      </div>
      <div class="small-text">最終統合版</div>
    </div>

    <div class="layout">
      <section class="panel">
        <div class="panel-title">ゲーム設定</div>

        <div class="notice">
          Supabase設定後、部屋を作成または参加してください。<br>
          開発確認用に、初期状態プレビューも作成できます。
        </div>

        <div class="form-row">
          <label for="playerCount">プレイ人数</label>
          <select id="playerCount">
            <option value="2">2人</option>
            <option value="3">3人</option>
            <option value="4" selected>4人</option>
            <option value="5">5人</option>
          </select>
        </div>

        <div class="form-row">
          <label for="targetAssets">目標資産</label>
          <select id="targetAssets">
            <option value="10000">短時間：1億円</option>
            <option value="50000" selected>標準：5億円</option>
            <option value="100000">長時間：10億円</option>
          </select>
        </div>

        <div class="form-row">
          <label>プレイヤー</label>
          <div id="playerForms" class="player-form-grid"></div>
        </div>

        <button id="createStateButton" type="button">初期ゲーム状態を作成</button>

        <div style="height: 12px;"></div>

        <div class="panel-title">Supabase設定</div>

        <div class="form-row">
          <label for="supabaseUrl">Supabase URL</label>
          <input id="supabaseUrl" type="text" placeholder="https://xxxxx.supabase.co" autocomplete="off" />
        </div>

        <div class="form-row">
          <label for="supabaseAnonKey">Supabase anon key</label>
          <input id="supabaseAnonKey" type="password" placeholder="anon public key" autocomplete="off" />
        </div>

        <button id="saveSupabaseButton" type="button">Supabase設定を保存</button>

        <div style="height: 12px;"></div>

        <div class="panel-title">通信対戦</div>

        <div class="form-row">
          <label for="joinRoomCode">参加する部屋コード</label>
          <input id="joinRoomCode" type="text" placeholder="例：A7K3Q" maxlength="5" autocomplete="off" />
        </div>

        <div class="room-actions two">
          <button id="createRoomButton" type="button">部屋を作る</button>
          <button id="joinRoomButton" type="button">部屋に参加</button>
        </div>

        <div style="height: 10px;"></div>

        <div id="connectionStatus" class="small-text">通信：未接続</div>

        <div id="roomInfo" style="display:none; margin-top: 10px;">
          <div class="room-code-box" id="roomCodeDisplay">-----</div>
          <div class="waiting-list" id="waitingPlayers"></div>

          <div class="room-actions">
            <button id="startGameButton" type="button" disabled>ゲーム開始</button>
          </div>
        </div>

        <div id="gamePlayPanel" class="game-play-panel" style="display:none;">
          <div class="panel-title">ゲーム進行</div>

          <div id="currentPlayerBox" class="current-player-box">
            現在プレイヤー情報なし
          </div>

          <div id="resultPanel" class="result-panel hidden"></div>

          <div id="rollResult" class="roll-result">
            出目：-
          </div>

          <div id="pendingActionPanel" class="pending-action-box hidden"></div>

          <div id="cardUsePanel" class="card-use-panel hidden"></div>

          <div class="action-panel">
            <button id="rollButton" type="button" disabled>ルーレットを回す</button>
            <button id="endTurnButton" type="button" disabled>ターン終了</button>
          </div>

          <div style="height: 12px;"></div>

          <div class="panel-title">資産一覧</div>
          <div id="playerSummaryList" class="player-summary-list"></div>

          <div class="panel-title" style="margin-top: 12px;">ログ</div>
          <div id="logPanel" class="log-panel"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-title">マップ</div>
        <div class="board-wrap">
          <div id="board" class="board"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-title">エリア</div>
        <div id="areaList" class="area-list"></div>

        <div style="height: 12px;"></div>

        <div class="panel-title">状態プレビュー</div>
        <pre id="statePreview" class="data-preview">まだ作成されていません。</pre>
      </section>
    </div>
  </div>

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatMoney(value) {
      const amount = Math.round(value || 0);

      if (amount >= 10000) {
        const oku = Math.floor(amount / 10000);
        const man = amount % 10000;
        return man === 0 ? `${oku}億円` : `${oku}億${man}万円`;
      }

      return `${amount}万円`;
    }

    function findPlayer(state, playerId) {

    function getCurrentPlayer(state) {
      if (!state || !state.players || state.players.length === 0) return null;
      return state.players[state.currentPlayerIndex] || null;
    }

    function getSquareName(position) {
      const square = getSquareById(position);
      return square ? square.name : `No.${position}`;
    }

    function isMyTurn() {
      if (!currentGameState || !currentRoomPlayer) return false;
      const currentPlayer = getCurrentPlayer(currentGameState);
      return !!currentPlayer && currentPlayer.id === currentRoomPlayer.id;

    function getAreaColor(areaId) {
      const colorMap = {
        central: "#f97316",
        akiba_ueno: "#8b5cf6",
        northeast: "#10b981",
        ikebukuro: "#3b82f6",
        shintoshin: "#ef4444",
        youth: "#ec4899",
        south_business: "#64748b",
        bay: "#06b6d4"
      };

      return colorMap[areaId] || "#9ca3af";
    }

    function isAreaMonopoly(state, playerId, areaId) {
      const areaLands = state.lands.filter(land => land.areaId === areaId);
      return areaLands.length > 0 && areaLands.every(land => land.ownerId === playerId);
    }

    function calculateCurrentToll(land, isMonopoly) {
      const normalToll = land.baseToll + Math.floor(land.investment * 0.3);
      return isMonopoly ? normalToll * 2 : normalToll;
    }

    function calculatePrimePassFee(currentToll, isMonopoly) {
      const rate = isMonopoly ? 0.1 : 0.05;
      return Math.max(1, Math.round(currentToll * rate));
    }

    function getAreaOwnershipCount(state, playerId, areaId) {
      return state.lands.filter(land => land.areaId === areaId && land.ownerId === playerId).length;
    }

    function getAreaLandCount(areaId) {
      return getLandsByArea(areaId).length;
    }

    function calculateInvestmentLimit(state, playerId, land) {
      const ownedCount = getAreaOwnershipCount(state, playerId, land.areaId);
      const totalCount = getAreaLandCount(land.areaId);

      if (totalCount === 4) {
        if (ownedCount <= 1) return land.price * 3;
        if (ownedCount === 2) return land.price * 4;
        if (ownedCount === 3) return land.price * 5;
        return land.price * 7;
      }

      if (totalCount === 3) {
        if (ownedCount <= 1) return land.price * 3;
        if (ownedCount === 2) return land.price * 5;
        return land.price * 7;
      }

      return land.price * 3;
    }

    function getAdditionalInvestmentLimit(state, playerId, land) {
      const limit = calculateInvestmentLimit(state, playerId, land);
      return Math.max(0, limit - land.investment);
    }

    function calculateLandAssets(state, playerId) {
      return state.lands
        .filter(land => land.ownerId === playerId)
        .reduce((sum, land) => sum + land.value, 0);
    }

    function calculateStockAssets(state, playerId) {
      return state.areas.reduce((sum, area) => {
        const count = area.stocks[playerId] || 0;
        return sum + count * area.stockPrice;
      }, 0);
    }

    function calculateTotalAssets(state, playerId) {
      const player = findPlayer(state, playerId);
      if (!player) return 0;

      return player.money + calculateLandAssets(state, playerId) + calculateStockAssets(state, playerId) - (player.loanDue || 0);
    }

    function getPassedSquares(startPosition, steps) {
      const passed = [];

      for (let i = 1; i <= steps; i++) {
        passed.push((startPosition + i) % BOARD_SIZE);
      }

      return passed;
    }

    function normalizeInvestmentAmount(value) {
      const raw = Number(value);
      if (!Number.isFinite(raw)) return 0;
      return Math.floor(raw / 100) * 100;
    }

    function normalizeBorrowAmount(value) {
      const raw = Number(value);
      if (!Number.isFinite(raw)) return 0;
      return Math.floor(raw / 100) * 100;
    }

    function calculateBorrowLimit(state, playerId) {
      const totalAssets = calculateTotalAssets(state, playerId);
      return Math.floor(Math.max(0, totalAssets * 0.5) / 100) * 100;
    }

    function calculateLoanDue(principal) {
      return Math.floor(principal * 1.2);
    }

    function getLandBySquareId(state, squareId) {
      const square = getSquareById(squareId);
      if (!square || square.type !== "land") return null;
      return findLand(state, square.landId);
    }

    function getTotalStockCount(state, playerId) {
      return state.areas.reduce((sum, area) => sum + (area.stocks[playerId] || 0), 0);
    }

    function calculateDividend(state, playerId) {
      return getTotalStockCount(state, playerId) * 1;
    }

    function calculateSettlementIncome(state, playerId) {
      const player = findPlayer(state, playerId);
      if (!player) return 200;

      const totalAssets = calculateTotalAssets(state, playerId);
      const settlementBonus = player.settlementCount * 100;

      return Math.max(200, Math.floor(200 + totalAssets * 0.05 + settlementBonus));
    }

    function hasReachedTargetAssets(state, playerId) {
      const targetAssets = state.settings?.targetAssets || 50000;
      return calculateTotalAssets(state, playerId) >= targetAssets;

    function getStockBuyPrice(area, amount) {

    function decreaseAreaStockPriceBySell(area, amount) {
      const decrease = Math.floor(amount / 10);

      area.stockPrice = Math.max(floor, area.stockPrice - decrease);

    function increaseAreaStockPriceByBuy(area) {

    function pickWeighted(items, getWeight) {
      const totalWeight = items.reduce((sum, item) => sum + getWeight(item), 0);
      if (totalWeight <= 0) return items[0] || null;

      let random = Math.random() * totalWeight;

      for (const item of items) {
        random -= getWeight(item);
        if (random <= 0) return item;
      }

      return items[items.length - 1] || null;
    }

    function getCardRarityWeights(fame) {
      if (fame >= 5) return { normal: 52, rare: 36, super_rare: 12 };
      if (fame >= 3) return { normal: 60, rare: 32, super_rare: 8 };
      if (fame >= 1) return { normal: 66, rare: 28, super_rare: 6 };
      return { normal: 70, rare: 25, super_rare: 5 };
    }

    function drawRandomCard(player) {
      const rarityWeights = getCardRarityWeights(player.fame || 0);
      const rarity = pickWeighted(
        [
          { id: "normal", weight: rarityWeights.normal },
          { id: "rare", weight: rarityWeights.rare },
          { id: "super_rare", weight: rarityWeights.super_rare }
        ],
        item => item.weight
      );

      const candidates = CARD_DEFS.filter(card => card.rarity === rarity.id);
      const cardDef = candidates[Math.floor(Math.random() * candidates.length)];

      return {
        uid: `card_${crypto.randomUUID()}`,
        id: cardDef.id,
        name: cardDef.name,
        rarity: cardDef.rarity,
        category: cardDef.category,
        description: cardDef.description
      };
    }

    function calculateHotelFee(state, playerId) {
      const totalAssets = calculateTotalAssets(state, playerId);
      if (totalAssets >= 50000) return 500;
      if (totalAssets >= 10000) return 200;
      if (totalAssets >= 3000) return 100;
      return 50;
    }

    function calculateTaxAmount(state, playerId) {
      const totalAssets = calculateTotalAssets(state, playerId);
      return Math.max(100, Math.floor(totalAssets * 0.05));
    }

    function calculateEventIncome(state) {
      return 150 + state.turnCount * 20 + [0, 50, 100, 150, 200][Math.floor(Math.random() * 5)];
    }

    function calculateEventExpense(state) {
      return 100 + state.turnCount * 15 + [0, 50, 100, 150][Math.floor(Math.random() * 4)];
    }

    function getRandomArea(state) {
      if (!state.areas || state.areas.length === 0) return null;
      return state.areas[Math.floor(Math.random() * state.areas.length)];
    }

    function getRandomOwnedLand(state, playerId) {
      const lands = state.lands.filter(land => land.ownerId === playerId);
      if (lands.length === 0) return null;
      return lands[Math.floor(Math.random() * lands.length)];
    }

    function getTakeoverCandidates(state, playerId) {
      const candidates = [];

      for (const area of state.areas) {
        const stocks = area.stocks[playerId] || 0;
        if (stocks < 51) continue;

        const primeLand = state.lands.find(land => {
          return land.areaId === area.id && land.isPrime && land.ownerId && land.ownerId !== playerId;
        });

        if (primeLand) {
          const owner = findPlayer(state, primeLand.ownerId);
          if (owner && !owner.bankrupt) candidates.push({ area, land: primeLand, owner });
        }
      }

      return candidates;
    }

    function getPrimeTakeoverCandidates(state, playerId) {
      return getTakeoverCandidates(state, playerId);
    }

    function getSpiesByOwner(state, ownerId) {
      return state.spies.filter(spy => spy.ownerId === ownerId);
    }

    function createSpyAtPosition(state, owner, position, sourceName) {
      const spy = {
        id: `spy_${crypto.randomUUID()}`,
        ownerId: owner.id,
        position,
        startPosition: position,
        passedCount: 0
      };

      state.spies.push(spy);
      state.logs.push(`${owner.name} は ${sourceName || "スパイ"} により、${getSquareName(position)} にスパイを配置しました。`);
      return spy;
    }

    function calculateSpyStealAmount(state, land) {
      const owner = findPlayer(state, land.ownerId);
      if (!owner) return 0;

      const monopoly = isAreaMonopoly(state, owner.id, land.areaId);
      const currentToll = calculateCurrentToll(land, monopoly);
      return Math.floor(currentToll / 2);
    }

    function processSpiesForOwner(state, owner) {
      if (!owner || owner.bankrupt) return;

      const remainingSpies = [];

      for (const spy of state.spies) {
        if (spy.ownerId !== owner.id) {
          remainingSpies.push(spy);
          continue;
        }

        const move = Math.floor(Math.random() * 6) + 1;
        const start = spy.position;

        spy.position = (spy.position + move) % BOARD_SIZE;
        spy.passedCount += move;

        state.logs.push(`${owner.name} のスパイが ${move} マス移動しました。${getSquareName(start)} → ${getSquareName(spy.position)}`);

        if (spy.passedCount >= BOARD_SIZE) {
          state.logs.push(`${owner.name} のスパイは1周したため消滅しました。`);
          continue;
        }

        const square = getSquareById(spy.position);

        if (!square) {
          remainingSpies.push(spy);
          continue;
        }

        if (square.type === "jail") {
          state.logs.push(`${owner.name} のスパイは刑務所マスに止まり、逮捕されました。`);
          continue;
        }

        if (square.type === "land") {
          processSpyOnLand(state, spy, owner, square);
        }

        remainingSpies.push(spy);
      }

      state.spies = remainingSpies;
    }

    function processSpyOnLand(state, spy, spyOwner, square) {
      const land = findLand(state, square.landId);
      if (!land || !land.ownerId || land.ownerId === spyOwner.id) return;

      const landOwner = findPlayer(state, land.ownerId);
      if (!landOwner || landOwner.bankrupt) return;

      const success = Math.random() < 0.7;

      if (!success) {
        state.logs.push(`${spyOwner.name} のスパイは ${land.name} で資金奪取に失敗しました。`);
        return;
      }

      const baseAmount = calculateSpyStealAmount(state, land);
      const amount = Math.min(baseAmount, Math.max(0, landOwner.money));

      if (amount <= 0) {
        state.logs.push(`${spyOwner.name} のスパイは ${land.name} に止まりましたが、${landOwner.name} の現金が不足していたため奪えませんでした。`);
        return;
      }

      landOwner.money -= amount;
      spyOwner.money += amount;

      state.logs.push(`${spyOwner.name} のスパイが ${landOwner.name} の土地 ${land.name} から ${formatMoney(amount)} を奪いました。`);
    }

    function getActivePlayers(state) {
      return state.players.filter(player => !player.bankrupt);
    }

    function isPlayerInDebt(player) {
      return player && !player.bankrupt && player.money < 0;
    }

    function getOwnedStockAreas(state, playerId) {
      return state.areas
        .filter(area => (area.stocks[playerId] || 0) > 0)
        .sort((a, b) => b.stockPrice - a.stockPrice);
    }

    function getOwnedLandsForLiquidation(state, playerId) {
      return state.lands
        .filter(land => land.ownerId === playerId)
        .sort((a, b) => a.value - b.value);
    }

    function getLandSaleValue(land) {
      return Math.floor(land.value * 0.5);
    }

    function resetLandToUnowned(land) {
      const def = getLandDefById(land.id);
      land.ownerId = null;
      land.value = def ? def.price : land.price;
      land.investment = 0;
    }

    function sellStocksForDebt(state, player) {
      while (player.money < 0) {
        const ownedAreas = getOwnedStockAreas(state, player.id);
        if (ownedAreas.length === 0) return;

        const area = ownedAreas[0];
        const owned = area.stocks[player.id] || 0;

        if (owned <= 0) {
          area.stocks[player.id] = 0;
          continue;
        }

        const shortage = Math.abs(player.money);
        const neededStocks = Math.ceil(shortage / area.stockPrice);
        const sellAmount = Math.min(owned, Math.max(10, Math.ceil(neededStocks / 10) * 10));
        const revenue = area.stockPrice * sellAmount;

        area.stocks[player.id] -= sellAmount;
        player.money += revenue;

        decreaseAreaStockPriceBySell(area, sellAmount);

        state.logs.push(`${player.name} は資産整理のため、${area.name} の株を ${sellAmount}株 売却し、${formatMoney(revenue)} を得ました。`);
        state.logs.push(`${area.name} の株価は ${formatMoney(area.stockPrice)} になりました。`);
      }
    }

    function sellLandsForDebt(state, player) {
      while (player.money < 0) {
        const ownedLands = getOwnedLandsForLiquidation(state, player.id);
        if (ownedLands.length === 0) return;

        const shortage = Math.abs(player.money);

        let landToSell = ownedLands.find(land => getLandSaleValue(land) >= shortage);
        if (!landToSell) landToSell = ownedLands[ownedLands.length - 1];

        const saleValue = getLandSaleValue(landToSell);
        const landName = landToSell.name;

        player.money += saleValue;
        resetLandToUnowned(landToSell);

        state.logs.push(`${player.name} は資産整理のため、${landName} を銀行へ売却し、${formatMoney(saleValue)} を得ました。`);
        state.logs.push(`${landName} は未所有の土地に戻りました。`);
      }
    }

    function bankruptPlayer(state, player) {
      player.bankrupt = true;
      player.money = 0;
      player.cards = [];
      player.skipTurn = false;
      player.usedCardThisTurn = false;
      player.nextMoveCard = null;
      player.freeTollActive = false;
      player.stockDiscountActive = false;
      player.loanPrincipal = 0;
      player.loanDue = 0;
      player.repaidBankSquareId = null;

      for (const area of state.areas) {
        area.stocks[player.id] = 0;
      }

      for (const land of state.lands) {
        if (land.ownerId === player.id) resetLandToUnowned(land);
      }

      state.spies = state.spies.filter(spy => spy.ownerId !== player.id);

      state.logs.push(`${player.name} は資産整理しても支払いきれず、破産しました。`);
      state.logs.push(`${player.name} の土地・株・カード・スパイ・借入はすべて整理されました。`);
    }

    function processFinancialTroubleForPlayer(state, player) {
      if (!isPlayerInDebt(player)) return;

      state.logs.push(`${player.name} の現金がマイナスになったため、資産整理を行います。`);

      sellStocksForDebt(state, player);

      if (player.money >= 0) {
        state.logs.push(`${player.name} は株の売却により支払い不足を解消しました。`);
        return;
      }

      sellLandsForDebt(state, player);

      if (player.money >= 0) {
        state.logs.push(`${player.name} は土地の売却により支払い不足を解消しました。`);
        return;
      }

      bankruptPlayer(state, player);
    }

    function checkOnlyOnePlayerLeft(state) {
      const activePlayers = getActivePlayers(state);

      if (activePlayers.length === 1 && state.players.length >= 2) {
        const winner = activePlayers[0];

        state.status = "game_over";
        state.phase = "game_over";
        state.winnerId = winner.id;
        state.pendingAction = null;
        state.actionQueue = [];

        state.logs.push(`${winner.name} 以外の全員が破産したため、${winner.name} の勝利です。`);
      }
    }

    function processFinancialTroubles(state) {
      if (!state || state.status === "game_over") return;

      for (const player of state.players) {
        processFinancialTroubleForPlayer(state, player);
      }

      checkOnlyOnePlayerLeft(state);

      if (state.status === "game_over") return;

      const currentPlayer = getCurrentPlayer(state);

      if (currentPlayer && currentPlayer.bankrupt) {
        state.pendingAction = null;
        state.actionQueue = [];
        state.phase = "after_roll";
        state.logs.push(`${currentPlayer.name} は破産したため、このターンの処理を終了します。`);
      }
    }

    function createFinalRanking(state) {
      return state.players
        .map(player => ({
          player,
          totalAssets: calculateTotalAssets(state, player.id),
          landAssets: calculateLandAssets(state, player.id),
          stockAssets: calculateStockAssets(state, player.id),
          money: player.money,
          fame: player.fame || 0,
          settlementCount: player.settlementCount || 0,
          bankrupt: !!player.bankrupt
        }))
        .sort((a, b) => {
          if (a.bankrupt !== b.bankrupt) return a.bankrupt ? 1 : -1;
          if (b.totalAssets !== a.totalAssets) return b.totalAssets - a.totalAssets;
          if (b.fame !== a.fame) return b.fame - a.fame;
          if (b.money !== a.money) return b.money - a.money;
          return a.player.name.localeCompare(b.player.name, "ja");
        });
    }

    function getGameEndReason(state) {
      const winner = findPlayer(state, state.winnerId);

      if (!winner) return "ゲームが終了しました。";

      const activePlayers = getActivePlayers(state);
      if (activePlayers.length === 1) return "他のプレイヤーが全員破産したため勝利しました。";

      return "決算マス通過時に目標資産へ到達したため勝利しました。";
    }

    function trimGameLogs(state) {
      if (!state || !Array.isArray(state.logs)) return;
      state.logs = state.logs.slice(-100);
    }

    function normalizeGameStateShape(state) {
      if (!state) return state;

      if (!state.status) state.status = "playing";
      if (!state.phase) state.phase = "before_roll";
      if (!Array.isArray(state.players)) state.players = [];
      if (!Array.isArray(state.lands)) state.lands = [];
      if (!Array.isArray(state.areas)) state.areas = [];
      if (!Array.isArray(state.spies)) state.spies = [];
      if (!Array.isArray(state.logs)) state.logs = [];
      if (!Array.isArray(state.actionQueue)) state.actionQueue = [];

      if (typeof state.turnCount !== "number") state.turnCount = 1;
      if (typeof state.currentPlayerIndex !== "number") state.currentPlayerIndex = 0;

      if (state.currentPlayerIndex < 0) state.currentPlayerIndex = 0;
      if (state.currentPlayerIndex >= state.players.length) state.currentPlayerIndex = 0;

      for (const player of state.players) normalizePlayerShape(player);
      for (const land of state.lands) normalizeLandShape(land);
      for (const area of state.areas) normalizeAreaShape(state, area);
      for (const spy of state.spies) normalizeSpyShape(spy);

      trimGameLogs(state);

      return state;
    }

    function normalizePlayerShape(player) {
      if (!player) return;

      if (!player.id) player.id = `player_${crypto.randomUUID()}`;
      if (!player.name) player.name = "プレイヤー";
      if (!player.color) player.color = "red";
      if (!player.colorValue) {
        const color = getColorDefById(player.color);
        player.colorValue = color.value;
      }

      if (typeof player.money !== "number") player.money = INITIAL_MONEY;
      if (typeof player.position !== "number") player.position = 0;
      if (!Array.isArray(player.cards)) player.cards = [];

      for (const card of player.cards) {
        if (!card.uid) card.uid = `card_${crypto.randomUUID()}`;

        const def = getCardDef(card.id);

        if (def) {
          if (!card.name) card.name = def.name;
          if (!card.rarity) card.rarity = def.rarity;
          if (!card.category) card.category = def.category;
          if (!card.description) card.description = def.description;
        }
      }

      if (typeof player.fame !== "number") player.fame = 0;
      if (typeof player.skipTurn !== "boolean") player.skipTurn = false;
      if (typeof player.bankrupt !== "boolean") player.bankrupt = false;
      if (typeof player.loanPrincipal !== "number") player.loanPrincipal = 0;
      if (typeof player.loanDue !== "number") player.loanDue = 0;
      if (typeof player.settlementCount !== "number") player.settlementCount = 0;
      if (typeof player.usedCardThisTurn !== "boolean") player.usedCardThisTurn = false;
      if (typeof player.freeTollActive !== "boolean") player.freeTollActive = false;
      if (typeof player.stockDiscountActive !== "boolean") player.stockDiscountActive = false;

      if (!("nextMoveCard" in player)) player.nextMoveCard = null;
      if (!("repaidBankSquareId" in player)) player.repaidBankSquareId = null;

      player.position = ((player.position % BOARD_SIZE) + BOARD_SIZE) % BOARD_SIZE;
    }

    function normalizeLandShape(land) {
      if (!land) return;

      const def = getLandDefById(land.id);

      if (def) {
        if (!land.name) land.name = def.name;
        if (!land.areaId) land.areaId = def.areaId;
        if (typeof land.price !== "number") land.price = def.price;
        if (typeof land.baseToll !== "number") land.baseToll = def.baseToll;
        if (typeof land.isPrime !== "boolean") land.isPrime = def.isPrime;
      }

      if (typeof land.value !== "number") land.value = typeof land.price === "number" ? land.price : 0;
      if (typeof land.investment !== "number") land.investment = 0;
      if (!("ownerId" in land)) land.ownerId = null;
    }

    function normalizeAreaShape(state, area) {
      if (!area) return;

      const def = getAreaById(area.id);

      if (def) {
        if (!area.name) area.name = def.name;
        if (typeof area.initialStockPrice !== "number") area.initialStockPrice = def.initialStockPrice;
        if (!area.growthType) area.growthType = def.growthType;
        if (!area.description) area.description = def.description;
      }

      if (typeof area.stockPrice !== "number") area.stockPrice = area.initialStockPrice || 10;
      if (!area.stocks || typeof area.stocks !== "object") area.stocks = {};

      for (const player of state.players) {
        if (typeof area.stocks[player.id] !== "number") area.stocks[player.id] = 0;
      }

      const floor = getStockFloor(area.initialStockPrice || area.stockPrice);
      if (area.stockPrice < floor) area.stockPrice = floor;
    }

    function normalizeSpyShape(spy) {
      if (!spy) return;

      if (!spy.id) spy.id = `spy_${crypto.randomUUID()}`;
      if (typeof spy.position !== "number") spy.position = 0;
      if (typeof spy.startPosition !== "number") spy.startPosition = spy.position;
      if (typeof spy.passedCount !== "number") spy.passedCount = 0;

      spy.position = ((spy.position % BOARD_SIZE) + BOARD_SIZE) % BOARD_SIZE;
    }

    function createInitialPlayers(playerInputs) {
      return playerInputs.map((input, index) => {
        const color = PLAYER_COLOR_DEFS[index] || PLAYER_COLOR_DEFS[0];

        return new Player({
          id: `player_${index + 1}`,
          name: input.name || `プレイヤー${index + 1}`,
          color: color.id,
          colorValue: color.value,
          clientId: input.clientId || "",
          money: INITIAL_MONEY,
          position: 0,
          usedCardThisTurn: false,
          nextMoveCard: null,
          freeTollActive: false,
          stockDiscountActive: false,
          repaidBankSquareId: null
        }).toJSON();
      });
    }

    function createInitialLands() {
      return Object.values(LAND_DEFS).map(def => new Land(def).toJSON());
    }

    function createInitialAreas(players) {
      return AREA_DEFS.map(def => new Area(def, players).toJSON());
    }

    function createInitialGameState(settings, playerInputs) {
      const players = createInitialPlayers(playerInputs);
      const lands = createInitialLands();
      const areas = createInitialAreas(players);

      return normalizeGameStateShape({
        gameTitle: GAME_TITLE,
        status: "playing",
        phase: "before_roll",
        roomCode: settings.roomCode || "",
        settings: {
          targetAssets: settings.targetAssets,
          maxPlayers: players.length,
          createdAt: new Date().toISOString()
        },
        turnCount: 1,
        currentPlayerIndex: 0,
        players,
        lands,
        areas,
        spies: [],
        pendingAction: null,
        actionQueue: [],
        lastRoll: null,
        winnerId: null,
        logs: ["ゲームを開始しました。"]
      });
    }

        function renderPlayerForms() {

      const container = document.getElementById("playerForms");

    function renderBoard() {
      const board = document.getElementById("board");
      board.innerHTML = "";

      const state = currentGameState;
      const currentPlayer = state ? getCurrentPlayer(state) : null;

      for (const square of MAP_SQUARES) {
        const el = document.createElement("div");
        el.className = `square ${square.type}`;

        if (currentPlayer && currentPlayer.position === square.id && !currentPlayer.bankrupt) {
          el.classList.add("current-square");
        }

        let detailHtml = "";

        if (square.type === "land") {
          const landDef = LAND_DEFS[square.landId];
          const area = getAreaById(landDef.areaId);
          let ownerText = "";

          if (state) {
            const currentLand = findLand(state, square.landId);
            if (currentLand && currentLand.ownerId) {
              const owner = findPlayer(state, currentLand.ownerId);
              ownerText = owner ? `所有：${owner.name}` : "";
            }
          }

          detailHtml = `
            <div class="land-price">
              ${formatMoney(landDef.price)} / 通行料 ${formatMoney(landDef.baseToll)}
            </div>
            <div class="square-type">
              ${area.name}${landDef.isPrime ? "・特等地" : ""}
              ${ownerText ? `<br>${escapeHtml(ownerText)}` : ""}
            </div>
          `;

          el.style.borderLeftColor = getAreaColor(landDef.areaId);
        } else {
          detailHtml = `<div class="square-type">${SQUARE_TYPE_LABELS[square.type] || square.type}</div>`;
        }

        let piecesHtml = "";

        if (state) {
          const playersHere = state.players.filter(player => !player.bankrupt && player.position === square.id);
          const spiesHere = state.spies.filter(spy => spy.position === square.id);

          if (playersHere.length > 0 || spiesHere.length > 0) {
            piecesHtml = `
              <div class="piece-wrap">
                ${playersHere.map(player => `<span class="piece" title="${escapeHtml(player.name)}" style="background:${player.colorValue}"></span>`).join("")}
                ${spiesHere.map(spy => {
                  const owner = findPlayer(state, spy.ownerId);
                  const title = owner ? `${owner.name}のスパイ` : "スパイ";
                  return `<span class="piece spy-piece" title="${escapeHtml(title)}"></span>`;
                }).join("")}
              </div>
            `;
          }
        }

        el.innerHTML = `
          <div class="square-no">No.${square.id}</div>
          <div class="square-name">${square.name}</div>
          ${detailHtml}
          ${piecesHtml}
        `;

        board.appendChild(el);
      }
    }

    function renderAreas() {

      container.innerHTML = "";

      for (const area of AREA_DEFS) {

        const floor = getStockFloor(area.initialStockPrice);

        const item = document.createElement("div");
        item.className = "area-item";

        item.innerHTML = `
          <div class="area-title" style="color:${getAreaColor(area.id)}">${area.name}</div>
          <div class="area-meta">
            初期株価：${formatMoney(area.initialStockPrice)}<br>
            株価下限：${formatMoney(floor)}<br>
            成長：${area.growthType === "fast" ? "株価上昇しやすい" : "通常"}<br>
            土地：${lands.map(land => land.name).join("、")}
          </div>
        `;

        container.appendChild(item);
      }
    }

    function collectPlayerInputs() {

      const result = [];

      for (let i = 0; i < count; i++) {

        });

      document.getElementById("statePreview").textContent = JSON.stringify(state, null, 2);

    function loadSupabaseConfig() {
      const raw = localStorage.getItem(SUPABASE_CONFIG_STORAGE_KEY);
      if (!raw) return { url: "", anonKey: "" };

      try {
        return JSON.parse(raw);
      } catch {
        return { url: "", anonKey: "" };
      }
    }

    function saveSupabaseConfig() {
      const url = document.getElementById("supabaseUrl").value.trim();
      const anonKey = document.getElementById("supabaseAnonKey").value.trim();

      if (!url || !anonKey) {
        alert("Supabase URL と anon key を入力してください。");
        return;
      }

      localStorage.setItem(SUPABASE_CONFIG_STORAGE_KEY, JSON.stringify({ url, anonKey }));
      setupSupabaseClient();
      alert("Supabase設定を保存しました。");
    }

    function setupSupabaseClient() {
      const config = loadSupabaseConfig();

      const urlInput = document.getElementById("supabaseUrl");
      const keyInput = document.getElementById("supabaseAnonKey");

      if (urlInput) urlInput.value = config.url || "";
      if (keyInput) keyInput.value = config.anonKey || "";

      if (!config.url || !config.anonKey) {
        setConnectionStatus("通信：Supabase未設定");
        return false;
      }

      if (!window.supabase || !window.supabase.createClient) {
        setConnectionStatus("通信：Supabaseライブラリ未読込");
        return false;
      }

      supabaseClient = window.supabase.createClient(config.url, config.anonKey);
      setConnectionStatus("通信：Supabase設定済み");
      return true;
    }

    function setConnectionStatus(message) {
      const el = document.getElementById("connectionStatus");
      if (el) el.textContent = message;
    }

    function getClientId() {
      let clientId = localStorage.getItem(CLIENT_ID_STORAGE_KEY);

      if (!clientId) {
        clientId = `client_${crypto.randomUUID()}`;
        localStorage.setItem(CLIENT_ID_STORAGE_KEY, clientId);
      }

      return clientId;
    }

    function generateRoomCode() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let code = "";

      for (let i = 0; i < 5; i++) {
        code += chars[Math.floor(Math.random() * chars.length)];
      }

      return code;
    }

    function getLocalPlayerName() {
      const input = document.getElementById("playerName_0");
      const name = input ? input.value.trim() : "";
      return name || "プレイヤー1";
    }

    function getColorDefById(colorId) {
      return PLAYER_COLOR_DEFS.find(color => color.id === colorId) || PLAYER_COLOR_DEFS[0];
    }

    function getColorDefBySeatNo(seatNo) {
      return PLAYER_COLOR_DEFS[seatNo - 1] || PLAYER_COLOR_DEFS[0];
    }

    async function createRoomOnline() {
      if (!setupSupabaseClient()) return;

      const roomCode = generateRoomCode();
      const maxPlayers = Number(document.getElementById("playerCount").value);
      const targetAssets = Number(document.getElementById("targetAssets").value);
      const clientId = getClientId();
      const playerName = getLocalPlayerName();
      const color = getColorDefBySeatNo(1);

      setConnectionStatus("通信：部屋作成中...");

      const { data: room, error: roomError } = await supabaseClient
        .from("rooms")
        .insert({
          room_code: roomCode,
          status: "waiting",
          settings: { targetAssets, maxPlayers, gameTitle: GAME_TITLE },
          game_state: null,
          state_version: 0,
          current_player_index: 0,
          phase: "waiting"
        })
        .select()
        .single();

      if (roomError) {
        console.error(roomError);
        alert("部屋作成に失敗しました。もう一度お試しください。");
        setConnectionStatus("通信：部屋作成失敗");
        return;
      }

      const { data: player, error: playerError } = await supabaseClient
        .from("room_players")
        .insert({
          room_id: room.id,
          seat_no: 1,
          name: playerName,
          color: color.id,
          is_host: true,
          client_id: clientId,
          connected: true
        })
        .select()
        .single();

      if (playerError) {
        console.error(playerError);
        alert("プレイヤー作成に失敗しました。");
        setConnectionStatus("通信：プレイヤー作成失敗");
        return;
      }

      const { error: updateError } = await supabaseClient
        .from("rooms")
        .update({ host_player_id: player.id })
        .eq("id", room.id);

      if (updateError) {
        console.error(updateError);
        alert("ホスト情報の保存に失敗しました。");
        return;
      }

      currentRoom = { ...room, host_player_id: player.id };
      currentRoomPlayer = player;

      await subscribeToRoom(room.id);
      await loadRoomState(room.id);

      setConnectionStatus("通信：部屋を作成しました");
    }

    async function joinRoomOnline() {
      if (!setupSupabaseClient()) return;

      const input = document.getElementById("joinRoomCode");
      const roomCode = input.value.trim().toUpperCase();
      const clientId = getClientId();
      const playerName = getLocalPlayerName();

      if (!roomCode) {
        alert("部屋コードを入力してください。");
        return;
      }

      setConnectionStatus("通信：部屋参加中...");

      const { data: room, error: roomError } = await supabaseClient
        .from("rooms")
        .select("*")
        .eq("room_code", roomCode)
        .single();

      if (roomError || !room) {
        console.error(roomError);
        alert("部屋が見つかりません。");
        setConnectionStatus("通信：部屋が見つかりません");
        return;
      }

      if (room.status !== "waiting") {
        alert("この部屋はすでにゲーム開始済みです。");
        setConnectionStatus("通信：参加不可");
        return;
      }

      const { data: players, error: playersError } = await supabaseClient
        .from("room_players")
        .select("*")
        .eq("room_id", room.id)
        .order("seat_no", { ascending: true });

      if (playersError) {
        console.error(playersError);
        alert("参加者情報の取得に失敗しました。");
        return;
      }

      const existing = players.find(player => player.client_id === clientId);

      if (existing) {
        currentRoom = room;
        currentRoomPlayer = existing;

        await subscribeToRoom(room.id);
        await loadRoomState(room.id);

        setConnectionStatus("通信：既存プレイヤーとして再参加しました");
        return;
      }

      const maxPlayers = room.settings?.maxPlayers || 5;

      if (players.length >= maxPlayers) {
        alert("この部屋は満員です。");
        setConnectionStatus("通信：満員");
        return;
      }

      const usedSeatNos = new Set(players.map(player => player.seat_no));
      let seatNo = 1;

      while (usedSeatNos.has(seatNo)) {
        seatNo++;
      }

      const color = getColorDefBySeatNo(seatNo);

      const { data: joinedPlayer, error: joinError } = await supabaseClient
        .from("room_players")
        .insert({
          room_id: room.id,
          seat_no: seatNo,
          name: playerName,
          color: color.id,
          is_host: false,
          client_id: clientId,
          connected: true
        })
        .select()
        .single();

      if (joinError) {
        console.error(joinError);
        alert("部屋への参加に失敗しました。");
        setConnectionStatus("通信：参加失敗");
        return;
      }

      currentRoom = room;
      currentRoomPlayer = joinedPlayer;

      await subscribeToRoom(room.id);
      await loadRoomState(room.id);

      setConnectionStatus("通信：部屋に参加しました");
    }

    async function subscribeToRoom(roomId) {
      if (!supabaseClient) return;

      if (roomRealtimeChannel) {
        await supabaseClient.removeChannel(roomRealtimeChannel);
        roomRealtimeChannel = null;
      }

      roomRealtimeChannel = supabaseClient
        .channel(`room_${roomId}`)
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "rooms", filter: `id=eq.${roomId}` },
          async () => { await loadRoomState(roomId); }
        )
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "room_players", filter: `room_id=eq.${roomId}` },
          async () => { await loadRoomState(roomId); }
        )
        .subscribe();
    }

    async function loadRoomState(roomId) {
      if (!supabaseClient) return;

      const { data: room, error: roomError } = await supabaseClient
        .from("rooms")
        .select("*")
        .eq("id", roomId)
        .single();

      if (roomError) {
        console.error(roomError);
        setConnectionStatus("通信：部屋情報取得失敗");
        return;
      }

      const { data: players, error: playersError } = await supabaseClient
        .from("room_players")
        .select("*")
        .eq("room_id", roomId)
        .order("seat_no", { ascending: true });

      if (playersError) {
        console.error(playersError);
        setConnectionStatus("通信：参加者取得失敗");
        return;
      }

      currentRoom = room;
      currentRoomPlayers = players;
      currentGameState = room.game_state ? normalizeGameStateShape(room.game_state) : null;

      const clientId = getClientId();
      currentRoomPlayer = players.find(player => player.client_id === clientId) || currentRoomPlayer;

      renderWaitingRoom();
      renderBoard();
      renderGameView();

      if ((room.status === "playing" || room.status === "game_over") && room.game_state) {
        document.getElementById("statePreview").textContent = JSON.stringify(currentGameState, null, 2);
        setConnectionStatus(room.status === "game_over" ? "通信：ゲーム終了" : "通信：ゲーム中");
      }
    }

    function renderWaitingRoom() {
      const roomInfo = document.getElementById("roomInfo");
      const roomCodeDisplay = document.getElementById("roomCodeDisplay");
      const waitingPlayers = document.getElementById("waitingPlayers");
      const startButton = document.getElementById("startGameButton");

      if (!currentRoom) {
        roomInfo.style.display = "none";
        return;
      }

      roomInfo.style.display = "block";
      roomCodeDisplay.textContent = `部屋コード：${currentRoom.room_code}`;
      waitingPlayers.innerHTML = "";

      const maxPlayers = currentRoom.settings?.maxPlayers || 5;

      for (let i = 1; i <= maxPlayers; i++) {
        const player = currentRoomPlayers.find(p => p.seat_no === i);
        const color = getColorDefBySeatNo(i);

        const row = document.createElement("div");
        row.className = "waiting-player";

        if (player) {
          row.innerHTML = `
            <span>
              <span class="color-chip" style="background:${color.value}"></span>
              ${escapeHtml(player.name)}
              ${player.is_host ? '<span class="status-pill">ホスト</span>' : ""}
            </span>
            <span class="small-text">参加中</span>
          `;
        } else {
          row.innerHTML = `
            <span>
              <span class="color-chip" style="background:${color.value}"></span>
              空席
            </span>
            <span class="small-text">待機中</span>
          `;
        }

        waitingPlayers.appendChild(row);
      }

      const isHost = currentRoomPlayer && currentRoomPlayer.id === currentRoom.host_player_id;
      const isFull = currentRoomPlayers.length === maxPlayers;
      const isWaiting = currentRoom.status === "waiting";

      startButton.disabled = !(isHost && isFull && isWaiting);
    }

    function createGameStateFromRoom(room, players) {
      const gamePlayers = players
        .sort((a, b) => a.seat_no - b.seat_no)
        .map(player => {
          const colorDef = getColorDefById(player.color);

          return new Player({
            id: player.id,
            name: player.name,
            color: colorDef.id,
            colorValue: colorDef.value,
            clientId: player.client_id,
            money: INITIAL_MONEY,
            position: 0,
            cards: [],
            fame: 0,
            skipTurn: false,
            bankrupt: false,
            loanPrincipal: 0,
            loanDue: 0,
            settlementCount: 0,
            usedCardThisTurn: false,
            nextMoveCard: null,
            freeTollActive: false,
            stockDiscountActive: false,
            repaidBankSquareId: null
          }).toJSON();
        });

      const lands = createInitialLands();
      const areas = createInitialAreas(gamePlayers);

      return normalizeGameStateShape({
        gameTitle: GAME_TITLE,
        status: "playing",
        phase: "before_roll",
        roomCode: room.room_code,
        settings: {
          targetAssets: room.settings?.targetAssets || 50000,
          maxPlayers: room.settings?.maxPlayers || gamePlayers.length,
          createdAt: new Date().toISOString()
        },
        turnCount: 1,
        currentPlayerIndex: 0,
        players: gamePlayers,
        lands,
        areas,
        spies: [],
        pendingAction: null,
        actionQueue: [],
        lastRoll: null,
        winnerId: null,
        logs: ["ゲームを開始しました。"]
      });
    }

    async function startOnlineGame() {
      if (!currentRoom || !currentRoomPlayer) {
        alert("部屋に参加していません。");
        return;
      }

      const isHost = currentRoomPlayer.id === currentRoom.host_player_id;

      if (!isHost) {
        alert("ゲーム開始はホストのみ実行できます。");
        return;
      }

      const maxPlayers = currentRoom.settings?.maxPlayers || 5;

      if (currentRoomPlayers.length !== maxPlayers) {
        alert("設定した人数がそろってから開始してください。");
        return;
      }

      const gameState = normalizeGameStateShape(createGameStateFromRoom(currentRoom, currentRoomPlayers));

      const { data, error } = await supabaseClient
        .from("rooms")
        .update({
          status: "playing",
          phase: "before_roll",
          current_player_index: 0,
          game_state: gameState,
          state_version: currentRoom.state_version + 1
        })
        .eq("id", currentRoom.id)
        .eq("state_version", currentRoom.state_version)
        .select()
        .single();

      if (error) {
        console.error(error);
        alert("ゲーム開始に失敗しました。もう一度お試しください。");
        return;
      }

      currentRoom = data;
      currentGameState = normalizeGameStateShape(data.game_state);

      document.getElementById("statePreview").textContent = JSON.stringify(currentGameState, null, 2);

      renderBoard();
      renderGameView();

      setConnectionStatus("通信：ゲームを開始しました");
    }

    async function saveGameStateOnline(nextState, options = {}) {
      if (!supabaseClient || !currentRoom) {
        alert("通信部屋に接続していません。");
        return false;
      }

      if (isSavingGameState) {
        console.warn("ゲーム状態を保存中のため、二重操作を無視しました。");
        return false;
      }

      isSavingGameState = true;

      try {
        normalizeGameStateShape(nextState);
        processFinancialTroubles(nextState);
        normalizeGameStateShape(nextState);
        trimGameLogs(nextState);

        const nextVersion = currentRoom.state_version + 1;

        const updatePayload = {
          game_state: nextState,
          state_version: nextVersion,
          current_player_index: nextState.currentPlayerIndex,
          phase: nextState.phase,
          status: nextState.status || "playing",
          ...options
        };

        if (nextState.status === "game_over") {
          updatePayload.phase = "game_over";
          updatePayload.status = "game_over";
        }

        const { data, error } = await supabaseClient
          .from("rooms")
          .update(updatePayload)
          .eq("id", currentRoom.id)
          .eq("state_version", currentRoom.state_version)
          .select()
          .single();

        if (error) {
          console.error(error);
          alert("ゲーム状態の更新に失敗しました。画面を最新状態に更新します。");
          await loadRoomState(currentRoom.id);
          return false;
        }

        currentRoom = data;
        currentGameState = normalizeGameStateShape(data.game_state);

        renderBoard();
        renderGameView();

        return true;
      } finally {
        isSavingGameState = false;
      }
    }

    function getNextActivePlayerIndex(state) {
      const total = state.players.length;
      let index = state.currentPlayerIndex;

      for (let i = 0; i < total; i++) {
        index = (index + 1) % total;
        const player = state.players[index];

        if (player && !player.bankrupt) return index;
      }

      return state.currentPlayerIndex;
    }

    function renderGameView() {
      const panel = document.getElementById("gamePlayPanel");
      if (!panel) return;

      if (!currentGameState || (currentGameState.status !== "playing" && currentGameState.status !== "game_over")) {
        panel.style.display = "none";
        return;
      }

      panel.style.display = "block";

      renderCurrentPlayerBox();
      renderResultPanel();
      renderRollResult();
      renderPendingActionPanel();
      renderCardUsePanel();
      renderPlayerSummaryList();
      renderActionButtons();
      renderLogPanel();
    }

    function renderCurrentPlayerBox() {
      const box = document.getElementById("currentPlayerBox");
      if (!box || !currentGameState) return;

      if (currentGameState.status === "game_over") {
        const winner = findPlayer(currentGameState, currentGameState.winnerId);

        box.innerHTML = `
          <div class="current-player-name">ゲーム終了</div>
          <div class="current-player-meta">
            優勝：${winner ? escapeHtml(winner.name) : "不明"}<br>
            最終ターン数：${currentGameState.turnCount}
          </div>
        `;

        return;
      }

      const player = getCurrentPlayer(currentGameState);
      if (!player) {
        box.textContent = "現在プレイヤー情報なし";
        return;
      }

      const totalAssets = calculateTotalAssets(currentGameState, player.id);
      const squareName = getSquareName(player.position);
      const myTurnText = isMyTurn() ? "あなたの手番です" : "他のプレイヤーの手番です";
      const bankruptText = player.bankrupt ? "破産" : myTurnText;

      box.innerHTML = `
        <div class="current-player-name">
          <span class="color-chip" style="background:${player.colorValue}"></span>
          ${escapeHtml(player.name)}
        </div>
        <div class="current-player-meta">
          ターン数：${currentGameState.turnCount}<br>
          現在地：${squareName}<br>
          現金：${formatMoney(player.money)}<br>
          総資産：${formatMoney(totalAssets)}<br>
          状態：${bankruptText}
        </div>
      `;
    }

    function renderResultPanel() {
      const panel = document.getElementById("resultPanel");
      if (!panel || !currentGameState) return;

      if (currentGameState.status !== "game_over") {
        panel.classList.add("hidden");
        panel.innerHTML = "";
        return;
      }

      const winner = findPlayer(currentGameState, currentGameState.winnerId);
      const ranking = createFinalRanking(currentGameState);
      const reason = getGameEndReason(currentGameState);

      const rows = ranking.map((item, index) => {
        const rank = index + 1;
        const player = item.player;
        const rowClass = player.bankrupt ? "rank-bankrupt" : rank === 1 ? "rank-1" : "";

        return `
          <tr class="${rowClass}">
            <td>${rank}位</td>
            <td>
              <span class="color-chip" style="background:${player.colorValue}"></span>
              ${escapeHtml(player.name)}
              ${player.bankrupt ? "（破産）" : ""}
            </td>
            <td>${formatMoney(item.totalAssets)}</td>
            <td>${formatMoney(item.money)}</td>
            <td>${formatMoney(item.landAssets)}</td>
            <td>${formatMoney(item.stockAssets)}</td>
            <td>${item.fame}</td>
            <td>${item.settlementCount}</td>
          </tr>
        `;
      }).join("");

      panel.classList.remove("hidden");

      panel.innerHTML = `
        <div class="result-title">ゲーム終了</div>
        <div class="result-winner">優勝：${winner ? escapeHtml(winner.name) : "不明"}</div>
        <div class="pending-action-body">${escapeHtml(reason)}</div>

        <table class="ranking-table">
          <thead>
            <tr>
              <th>順位</th>
              <th>プレイヤー</th>
              <th>総資産</th>
              <th>現金</th>
              <th>土地資産</th>
              <th>株式資産</th>
              <th>名声</th>
              <th>決算</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>

        <div class="game-over-note">
          同じ総資産の場合は、名声ポイント、現金、名前順で順位を判定します。
        </div>
      `;
    }

    function renderRollResult() {
      const el = document.getElementById("rollResult");
      if (!el || !currentGameState) return;

      if (currentGameState.status === "game_over") {
        el.textContent = "ゲーム終了";
        return;
      }

      if (!currentGameState.lastRoll) {
        el.textContent = "出目：-";
        return;
      }

      const roll = currentGameState.lastRoll;
      const player = currentGameState.players.find(item => item.id === roll.playerId);
      const name = player ? player.name : "プレイヤー";

      if (roll.cardMove === "rura") {
        el.textContent = `${name}：ルーラカードで決算マスへ移動`;
        return;
      }

      if (roll.cardMove === "airport_warp") {
        el.textContent = `${name}：空港ワープカードで移動`;
        return;
      }

      el.textContent = `${name} の出目：${roll.value}`;
    }

    function renderPlayerSummaryList() {
      const container = document.getElementById("playerSummaryList");
      if (!container || !currentGameState) return;

      container.innerHTML = "";

      for (let i = 0; i < currentGameState.players.length; i++) {
        const player = currentGameState.players[i];
        const totalAssets = calculateTotalAssets(currentGameState, player.id);
        const landAssets = calculateLandAssets(currentGameState, player.id);
        const stockAssets = calculateStockAssets(currentGameState, player.id);
        const squareName = getSquareName(player.position);
        const statusText = player.bankrupt ? "破産" : i === currentGameState.currentPlayerIndex ? "手番" : "通常";

        const card = document.createElement("div");
        card.className = "player-summary-card";

        if (i === currentGameState.currentPlayerIndex && !player.bankrupt) {
          card.classList.add("current-turn-card");
        }

        card.innerHTML = `
          <div class="player-summary-head">
            <span>
              <span class="color-chip" style="background:${player.colorValue}"></span>
              ${escapeHtml(player.name)}
            </span>
            <span>${statusText}</span>
          </div>
          <div class="player-summary-body">
            現在地：${squareName}<br>
            現金：${formatMoney(player.money)}<br>
            土地資産：${formatMoney(landAssets)}<br>
            株式資産：${formatMoney(stockAssets)}<br>
            返済予定額：${formatMoney(player.loanDue || 0)}<br>
            総資産：${formatMoney(totalAssets)}<br>
            名声：${player.fame || 0}<br>
            手札：${player.cards.length}枚<br>
            スパイ：${getSpiesByOwner(currentGameState, player.id).length}体
          </div>
        `;

        container.appendChild(card);
      }
    }

    function renderActionButtons() {
      const rollButton = document.getElementById("rollButton");
      const endTurnButton = document.getElementById("endTurnButton");

      if (!rollButton || !endTurnButton || !currentGameState) return;

      if (currentGameState.status === "game_over") {
        rollButton.disabled = true;
        endTurnButton.disabled = true;
        return;
      }

      const canOperate = isMyTurn();
      const phase = currentGameState.phase;
      const currentPlayer = getCurrentPlayer(currentGameState);

      rollButton.disabled = !(canOperate && phase === "before_roll" && currentPlayer && !currentPlayer.bankrupt);
      endTurnButton.disabled = !(canOperate && phase === "after_roll");
    }

    function renderLogPanel() {
      const panel = document.getElementById("logPanel");
      if (!panel || !currentGameState) return;

      const logs = currentGameState.logs || [];
      const recentLogs = logs.slice(-30).reverse();

      if (recentLogs.length === 0) {
        panel.innerHTML = `<div class="small-text">ログはまだありません。</div>`;
        return;
      }

      panel.innerHTML = recentLogs.map(log => `<div class="log-line">${escapeHtml(log)}</div>`).join("");
    }

    function renderPendingActionPanel() {
      const panel = document.getElementById("pendingActionPanel");
      if (!panel || !currentGameState) return;

      if (currentGameState.status === "game_over") {
        panel.classList.add("hidden");
        panel.innerHTML = "";
        return;
      }

      const action = currentGameState.pendingAction;

      if (!action) {
        panel.classList.add("hidden");
        panel.innerHTML = "";
        return;
      }

      panel.classList.remove("hidden");

      if (!isPendingActionForMe(action)) {
        panel.innerHTML = `
          <div class="pending-action-title">他プレイヤーの処理待ち</div>
          <div class="pending-action-body">
            ${escapeHtml(getPendingActionPlayerName(action))} が処理中です。<br>
            この内容は本人の画面だけに表示されます。
          </div>
        `;
        return;
      }

      if (action.type === "buy_land") return renderBuyLandAction(panel, action);
      if (action.type === "invest_land") return renderInvestLandAction(panel, action);
      if (action.type === "stock_trade") return renderStockTradeAction(panel, action);
      if (action.type === "borrow_bank") return renderBorrowBankAction(panel, action);
      if (action.type === "airport_choice") return renderAirportChoiceAction(panel, action);

      if (!panel || !currentGameState) return;

      if (currentGameState.status === "game_over") {
        panel.classList.add("hidden");
        panel.innerHTML = "";
        return;
      }

      const player = getCurrentPlayer(currentGameState);

      if (!player || !isMyTurn()) {
        panel.classList.add("hidden");
        panel.innerHTML = "";
        return;
      }

      panel.classList.remove("hidden");

      if (!player.cards || player.cards.length === 0) {
        panel.innerHTML = `
          <div class="pending-action-title">手札</div>
          <div class="pending-action-body">手札はありません。</div>
        `;
        return;
      }

      const canUseNow = currentGameState.phase === "before_roll" && !player.usedCardThisTurn;

        const usable = canUseCardNow(currentGameState, player, card);
        const reason = usable ? "" : getCardDisabledReason(card);

        return `

      panel.innerHTML = `
        <div class="pending-action-title">手札</div>
